<script>
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  var tabs={overview:0,pipeline:1,engagement:2,metrics:3};
  document.querySelectorAll('.tab-btn')[tabs[id]].classList.add('active');
}
 
function showPanel(prefix,roleId){
  document.querySelectorAll('.rp-'+prefix).forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('[data-pfx="'+prefix+'"]').forEach(t=>t.classList.remove('active'));
  var panel=document.getElementById(prefix+'-'+roleId);
  if(panel) panel.classList.add('active');
  var tab=document.querySelector('[data-pfx="'+prefix+'"][data-role="'+roleId+'"]');
  if(tab) tab.classList.add('active');
}
 
function pct(a,b){ if(!b) return null; return Math.round(a/b*100); }
 
function arrowCls(p){
  if(p===null) return 'arr-neutral';
  if(p>=60) return 'arr-green';
  if(p>=30) return 'arr-yellow';
  return 'arr-red';
}
 
function scoreChip(val){
  if(val===null||val===undefined||val==='') return '&mdash;';
  var v=parseInt(val);
  var cls=v===100?'iq-100':v>=80?'iq-high':v>=50?'iq-mid':v>0?'iq-low':'iq-zero';
  return '<span class="iq-score '+cls+'">'+v+'</span>';
}
 
function statusDotCls(s){ return s==='hold'?'dot-amber':s==='closed'?'dot-red':'dot-green'; }
function statusBadgeHtml(s){
  if(s==='hold') return '<span class="status-badge sbadge-amber">On Hold</span>';
  if(s==='closed') return '<span class="status-badge sbadge-red">Closed</span>';
  return '<span class="status-badge sbadge-green">Active</span>';
}
 
function makeTabs(roles, prefix){
  return roles.map(function(r,i){
    return '<button class="role-tab'+(i===0?' active':'')+'" data-pfx="'+prefix+'" data-role="'+r.id+'" onclick="showPanel(\''+prefix+'\',\''+r.id+'\')">'+r.short_name+'</button>';
  }).join('');
}
 
function renderOverview(d){
  var roles=d.roles, s=d.summary;
  var cards=roles.map(function(r){
    return '<div class="status-card" onclick="switchTab(\'pipeline\')">'
      +'<div class="status-card-top"><h3>'+r.name+'</h3><div class="status-dot '+statusDotCls(r.status)+'"></div></div>'
      +statusBadgeHtml(r.status)
      +'<p>HM: '+r.hiring_manager+'<br>Recruiter: '+r.recruiter+'<br>Stage: '+r.current_stage+'<br>Active candidates: '+r.active_candidates+' &middot; Open '+r.days_open+' days</p>'
      +'<div class="go">View pipeline &rarr;</div></div>';
  }).join('');
 
  var gridCols=roles.length<=3?'repeat('+roles.length+',minmax(0,1fr))':'repeat(3,minmax(0,1fr))';
 
  document.getElementById('tab-overview').innerHTML=
    '<div class="section-label">Role status</div>'
    +'<div class="status-grid" style="grid-template-columns:'+gridCols+'">'+cards+'</div>'
    +'<div class="section-label" style="margin-top:2.5rem;">YTD summary</div>'
    +'<div class="kpi-grid kpi-3">'
      +'<div class="kpi"><div class="label">Avg. days to fill</div><div class="metric-big">'+(s.avg_days_to_fill||'&mdash;')+'</div><div class="metric-sub">Across active roles</div></div>'
      +'<div class="kpi"><div class="label">Interview pass rate</div><div class="metric-big">'+(s.pass_rate_pct!==undefined?s.pass_rate_pct+'%':'&mdash;')+'</div><div class="metric-sub">Recruiter screen &rarr; offer</div></div>'
      +'<div class="kpi"><div class="label">Offers extended</div><div class="metric-big">'+(s.total_offers||0)+'</div>'
        +'<div class="offer-rate-row"><span class="offer-rate-label">Acceptance rate</span><span class="offer-rate-val">'+(s.offer_acceptance_pct!==undefined?s.offer_acceptance_pct+'%':'&mdash;')+'</span></div></div>'
    +'</div>'
    +'<div class="timestamp">Data as of '+d.meta.generated+' &middot; Source: '+d.meta.source_note+'</div>';
}
 
function renderPipeline(d){
  var roles=d.roles, stages=d.pipeline.stages;
  var thCells='<th class="job-col">Job</th>';
  stages.forEach(function(s,i){
    var w=s.split(' '), mid=Math.ceil(w.length/2);
    thCells+='<th class="stage-col">'+w.slice(0,mid).join(' ')+'<br>'+w.slice(mid).join(' ')+'</th>';
    if(i<stages.length-1) thCells+='<th class="arrow-col"></th>';
  });
  thCells+='<th class="sm-col">Hire<br>Rate</th>';
 
  var totals=stages.map(function(_,i){ return roles.reduce(function(sum,r){ return sum+(r.pipeline[i]||0); },0); });
  var tCells='<td class="job-col total">'+roles.length+' role'+(roles.length!==1?'s':'')+' total</td>';
  totals.forEach(function(c,i){
    tCells+='<td><span class="stage-num">'+c+'</span></td>';
    if(i<totals.length-1){ var p=pct(totals[i+1],totals[i]); tCells+='<td class="arrow-cell"><span class="'+arrowCls(p)+'">'+(p!==null?p+'%':'&mdash;')+'&rarr;</span></td>'; }
  });
  var hr=pct(totals[totals.length-1],totals[0]);
  tCells+='<td class="hire-rate">'+(hr!==null?hr+'%':'&mdash;')+'</td>';
 
  var rRows=roles.map(function(r){
    var cells='<td class="job-col">'+r.name+'</td>';
    r.pipeline.forEach(function(c,i){
      cells+='<td><span class="stage-num">'+c+'</span></td>';
      if(i<r.pipeline.length-1){ var p=pct(r.pipeline[i+1],r.pipeline[i]); cells+='<td class="arrow-cell"><span class="'+arrowCls(p)+'">'+(p!==null?p+'%':'&mdash;')+'&rarr;</span></td>'; }
    });
    var h=pct(r.pipeline[r.pipeline.length-1],r.pipeline[0]);
    cells+='<td class="hire-rate">'+(h!==null?h+'%':'&mdash;')+'</td>';
    return '<tr>'+cells+'</tr>';
  }).join('');
 
  var deiHtml='';
  if(d.dei&&d.dei.female){
    var f=d.dei.female;
    var dStages=f.stages.map(function(s,i){
      var fl=i===f.flag_index;
      return '<div class="dei-stage'+(fl?' flagged':'')+'"><span class="dei-stage-name">'+s+'</span><span class="dei-stage-pct">'+f.pct[i]+'%</span></div>'+(i<f.stages.length-1?'<span class="dei-chevron">&rsaquo;</span>':'');
    }).join('');
    var tCls=f.focus==='process'?'tag-process':'tag-sourcing';
    var tTxt=f.focus==='process'?'Process focus':'Sourcing focus';
    deiHtml='<div class="section-label">Diversity signal</div>'
      +'<div class="dei-card"><div class="dei-row">'
      +'<div class="dei-row-label">Female<br>Representation</div>'
      +'<div class="dei-funnel">'+dStages+'</div>'
      +'<div class="dei-note-col"><span class="dei-focus-tag '+tCls+'">'+tTxt+'</span><div class="dei-note-text">'+f.note+'</div></div>'
      +'</div></div>';
  }
 
  document.getElementById('tab-pipeline').innerHTML=
    '<div class="section-label">Pass-through by role</div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0 16px;overflow:hidden;">'
    +'<table class="pipeline-table"><thead><tr>'+thCells+'</tr></thead>'
    +'<tbody><tr class="total-row">'+tCells+'</tr>'+rRows+'</tbody></table></div>'
    +deiHtml
    +'<div class="timestamp">Data as of '+d.meta.generated+' &middot; Source: '+d.meta.source_note+'</div>';
}
 
function renderEngagement(d){
  var roles=d.roles, eng=d.engagement;
  var sla=eng.sla_48hr_pct||0;
  var slaCls=sla>=80?'sla-fill-green':'sla-fill-red';
  var pillCls=sla>=80?'sla-pill-green':'sla-pill-red';
 
  var pendRows=(eng.scorecards||[]).map(function(sc){
    var done=sc.pct_done||0;
    var fCls=done<30?'completion-fill-red':done<70?'completion-fill-amber':'completion-fill-red';
    return '<tr><td class="due-name">'+sc.name+'</td><td style="font-size:12px;color:var(--text-faint)">'+sc.roles+'</td>'
      +'<td><span class="due-chip">'+sc.pending+'</span></td><td>'+sc.total+'</td>'
      +'<td><div class="completion-wrap"><div class="completion-track"><div class="'+fCls+'" style="width:'+done+'%"></div></div><span class="completion-pct">'+done+'%</span></div></td></tr>';
  }).join('');
 
  var odRows=(eng.overdue||[]).map(function(o){
    return '<tr><td>'+o.name+'</td><td style="font-size:12px;color:var(--text-faint)">'+(o.roles||'')+'</td>'
      +'<td><span class="badge slow-due">'+o.days_late+'d overdue</span></td></tr>';
  }).join('');
 
  var skillTabs=makeTabs(roles,'skill');
  var skillPanels=roles.map(function(r,i){
    var bh=r.bh_skills;
    if(!bh) return '<div class="role-panel rp-skill'+(i===0?' active':'')+'" id="skill-'+r.id+'"><div style="padding:1.4rem;color:var(--text-faint)">No BrightHire skill data for this role.</div></div>';
    var cov=(bh.covered||[]).map(function(s){ return '<div class="bh-row"><span class="bh-skill-label">'+s.skill+'</span><div class="bh-track"><div class="bh-fill-green" style="width:'+s.pct+'%"></div></div><span class="bh-pct-green">'+s.pct+'%</span></div>'; }).join('');
    var gaps=(bh.gaps||[]).map(function(s){ var c=s.pct>=30?'amber':'red'; return '<div class="bh-row"><span class="bh-skill-label">'+s.skill+'</span><div class="bh-track"><div class="bh-fill-'+c+'" style="width:'+Math.max(s.pct,0.5)+'%"></div></div><span class="bh-pct-'+c+'">'+s.pct+'%</span></div>'; }).join('');
    return '<div class="role-panel rp-skill'+(i===0?' active':'')+'" id="skill-'+r.id+'">'
      +'<div class="bh-card-desc">'+(bh.description||'Skills from the job description. Each bar shows % of interviews where that skill was assessed.')+'</div>'
      +'<div class="bh-role-meta">'+r.name+' &middot; '+bh.interviews+'</div>'
      +'<div class="bh-split"><div class="bh-group"><div class="bh-group-head"><div class="bh-group-dot" style="background:var(--lawn)"></div><span class="bh-group-label green">Well covered (&ge;80%)</span></div>'+(cov||'<div style="color:var(--text-faint);font-size:13px;padding:4px 0">No skills at &ge;80%</div>')+'</div>'
      +'<div class="bh-group"><div class="bh-group-head"><div class="bh-group-dot" style="background:var(--orange-dust)"></div><span class="bh-group-label gap">Coverage gaps (&lt;80%)</span></div>'+(gaps||'<div style="color:var(--text-faint);font-size:13px;padding:4px 0">No gaps &mdash; great coverage!</div>')+'</div></div></div>';
  }).join('');
 
  var iqHdr='<tr><th>Interviewer</th>'
    +'<th class="iq-overall-h"><span class="tip" data-tip="Composite average of all 8 quality metric scores.">Overall &#x24D8;</span></th>'
    +'<th><span class="tip" data-tip="% started on time (interviewer speaking within 5 min of scheduled start).">On-time &#x24D8;</span></th>'
    +'<th><span class="tip" data-tip="% where candidate spoke 40-75% of the time.">Talk ratio &#x24D8;</span></th>'
    +'<th><span class="tip" data-tip="% where interviewer\'s longest monologue was under 2 minutes.">Monologue &#x24D8;</span></th>'
    +'<th><span class="tip" data-tip="% where interviewer avoided protected-class topics (EEOC compliance).">EEOC &#x24D8;</span></th>'
    +'<th><span class="tip" data-tip="% where interviewer invited candidate questions in last 15 minutes.">Q. opp &#x24D8;</span></th>'
    +'<th><span class="tip" data-tip="% where interviewer stated a structured agenda within first 10 minutes.">Agenda &#x24D8;</span></th>'
    +'<th><span class="tip" data-tip="% of scorecards submitted within 24 hours.">FB time &#x24D8;</span></th>'
    +'<th><span class="tip" data-tip="% of interviews where feedback was submitted within 7 days.">FB rate &#x24D8;</span></th></tr>';
 
  var qualTabs=makeTabs(roles,'quality');
  var qualPanels=roles.map(function(r,i){
    var rows=(r.bh_quality||[]).map(function(q){
      return '<tr><td>'+q.name+'<span class="iq-count">'+q.count+' interview'+(q.count!==1?'s':'')+'</span></td>'
        +'<td class="iq-overall-c">'+scoreChip(q.overall)+'</td>'
        +'<td>'+scoreChip(q.on_time)+'</td><td>'+scoreChip(q.talk)+'</td><td>'+scoreChip(q.mono)+'</td>'
        +'<td>'+scoreChip(q.eeoc)+'</td><td>'+scoreChip(q.q_opp)+'</td><td>'+scoreChip(q.agenda)+'</td>'
        +'<td>'+scoreChip(q.fb_time)+'</td><td>'+scoreChip(q.fb_rate)+'</td></tr>';
    }).join('');
    return '<div class="role-panel rp-quality'+(i===0?' active':'')+'" id="quality-'+r.id+'">'
      +'<div class="bh-role-meta">'+r.name+'</div>'
      +'<div class="iq-wrap"><table class="iq-table"><thead>'+iqHdr+'</thead><tbody>'
      +(rows||'<tr><td colspan="10" style="padding:1rem;color:var(--text-faint)">No data available</td></tr>')
      +'</tbody></table></div></div>';
  }).join('');
 
  var obsItems=(eng.observations||[]).map(function(o){ return '<div class="obs-item">'+o+'</div>'; }).join('');
  var actItems=(eng.recommendations||[]).map(function(r){ return '<div class="act-item">'+r+'</div>'; }).join('');
 
  document.getElementById('tab-engagement').innerHTML=
    '<div class="section-label">Scorecard performance (48-hr SLA)</div>'
    +'<div class="sla-panel"><div class="sla-group">'
    +'<div class="sla-header"><span class="sla-label">On-time submission rate</span><span class="sla-pill '+pillCls+'">'+sla+'% on time</span></div>'
    +'<div class="sla-track"><div class="'+slaCls+'" style="width:'+sla+'%"></div></div>'
    +(eng.sla_ok_names?'<div class="sla-names">'+eng.sla_ok_names+'</div>':'')
    +'</div>'
    +(pendRows?'<hr class="sla-divider"><div class="sla-subhead">Outstanding scorecards</div><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px;"><table class="due-table"><thead><tr><th>Interviewer</th><th>Role(s)</th><th>Pending</th><th>Total</th><th>Completion</th></tr></thead><tbody>'+pendRows+'</tbody></table></div>':'')
    +(odRows?'<hr class="sla-divider"><div class="sla-subhead">Overdue submissions</div><table class="interviewer-table" style="margin-top:8px;"><thead><tr><th>Interviewer</th><th>Role(s)</th><th>Status</th></tr></thead><tbody>'+odRows+'</tbody></table>':'')
    +'</div>'
    +'<div class="divider"></div>'
    +'<div class="section-label">Interview skill coverage &middot; BrightHire</div>'
    +'<div class="bh-card"><div class="bh-card-header"><span class="bh-card-title">JD skill coverage across interviews</span><div class="role-tabs">'+skillTabs+'</div></div>'+skillPanels+'</div>'
    +'<div class="divider"></div>'
    +'<div class="section-label">Interview quality &middot; BrightHire</div>'
    +'<div class="bh-card"><div class="bh-card-header"><span class="bh-card-title">Interviewer quality scores</span><div class="role-tabs">'+qualTabs+'</div></div>'
    +'<div class="bh-card-desc">BrightHire scores each interview across 8 structural quality dimensions. Hover column headers for definitions.</div>'
    +qualPanels+'</div>'
    +'<div class="divider"></div>'
    +'<div class="obs-act-card"><div class="obs-col"><div class="obs-head">Observations</div>'+obsItems+'</div>'
    +'<div class="act-col"><div class="act-head">Recommended actions</div>'+actItems+'</div></div>'
    +'<div class="timestamp">Data as of '+d.meta.generated+' &middot; Source: '+d.meta.source_note+'</div>';
}
 
function renderMetrics(d){
  var m=d.metrics;
  if(!m){ document.getElementById('tab-metrics').innerHTML='<div style="padding:2rem;color:var(--text-faint)">No metrics data available.</div>'; return; }
  var alertCls=(m.hm_screen_decline_pct||0)>=15?'kpi-alert':'';
  var flags=(m.flags||[]).map(function(f){ return '<div class="flag-box" style="margin-bottom:1.75rem;"><div class="flag-header">'+f.header+'</div><div class="flag-body">'+f.body+'</div>'+(f.meta?'<div class="flag-meta">'+f.meta+'</div>':'')+'</div>'; }).join('');
  var dRows=(m.declines||[]).map(function(dec){ return '<tr><td>'+dec.interviewer+'</td><td style="font-size:12px;color:var(--text-faint)">'+dec.roles+'</td><td><span class="badge '+(dec.stage_type||'slow')+'">'+dec.stage+'</span></td><td>'+dec.count+'</td><td style="font-size:12px;color:var(--text-faint)">'+dec.candidates+'</td></tr>'; }).join('');
  document.getElementById('tab-metrics').innerHTML=
    '<div class="section-label">Decline summary</div>'
    +'<div class="kpi-grid kpi-3" style="margin-bottom:1.4rem;">'
    +'<div class="kpi"><div class="label">Total interview declines</div><div class="metric-big">'+(m.total_declines||0)+'</div><div class="metric-sub">YTD across all roles</div></div>'
    +'<div class="kpi"><div class="label">Interviewers responsible</div><div class="metric-big">'+(m.interviewers_with_declines||0)+'</div></div>'
    +'<div class="kpi '+alertCls+'"><div class="label">HM Screen decline rate</div><div class="metric-big">'+(m.hm_screen_decline_pct||0)+'%</div></div>'
    +'</div>'+flags
    +(dRows?'<div class="section-label">Declines by interviewer</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2rem;"><table class="interviewer-table"><thead><tr><th>Interviewer</th><th>Role(s)</th><th>Stage</th><th>Declines</th><th>Candidates affected</th></tr></thead><tbody>'+dRows+'</tbody></table></div>':'')
    +'<div class="timestamp">Data as of '+d.meta.generated+' &middot; Source: '+d.meta.source_note+'</div>';
}
 
function initTooltips(){
  var popup=null;
  document.addEventListener('mouseover',function(e){
    var tip=e.target.closest('.tip');
    if(!tip) return;
    if(popup) popup.remove();
    var text=tip.getAttribute('data-tip');
    if(!text) return;
    popup=document.createElement('div');
    popup.className='tip-popup';
    popup.textContent=text;
    document.body.appendChild(popup);
    var r=tip.getBoundingClientRect();
    var left=r.left+window.scrollX+r.width/2-120;
    if(left+240>window.innerWidth-8) left=window.innerWidth-248;
    if(left<8) left=8;
    popup.style.top=(r.bottom+window.scrollY+8)+'px';
    popup.style.left=left+'px';
  });
  document.addEventListener('mouseout',function(e){
    if(e.target.closest('.tip')&&popup){popup.remove();popup=null;}
  });
}
 
function init(){
  if(!window.PORCH_DATA){
    document.body.innerHTML='<div style="padding:3rem;font-family:Helvetica Neue,sans-serif;color:#232F46"><h2 style="font-weight:400">No data loaded</h2><p style="margin-top:1rem;color:#4a5c72">Run build.py to generate a populated dashboard.</p></div>';
    return;
  }
  var d=window.PORCH_DATA;
  document.getElementById('report-title').textContent='The PORCH Report \u2014 '+d.meta.stakeholder;
  document.getElementById('header-period').textContent=d.meta.period;
  document.getElementById('header-range').textContent=d.meta.date_range;
  document.getElementById('header-roles').textContent=d.roles.map(function(r){return r.short_name;}).join(' \u00b7 ');
  renderOverview(d);
  renderPipeline(d);
  renderEngagement(d);
  renderMetrics(d);
  initTooltips();
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
