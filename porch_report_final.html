function renderEngagement(data) {
  const sc = data.scorecards || {};
  const allPeople = (sc.all_people || []).slice().sort((a, b) => a.name.localeCompare(b.name));
  const bh = (data.bh_quality || []).slice().sort((a, b) => a.name.localeCompare(b.name));
  const skills = data.bh_skills || [];

  // ── Derived values used across sections ──────────────────────────────────
  const SLA_HRS = 48;
  const withSub    = allPeople.filter(p => p.avg_hrs > 0);
  const onTrack    = withSub.filter(p => p.avg_hrs < SLA_HRS).sort((a, b) => a.avg_hrs - b.avg_hrs);
  const overSla    = withSub.filter(p => p.avg_hrs >= SLA_HRS).sort((a, b) => b.avg_hrs - a.avg_hrs);
  const SLOW_HRS   = 120;  // 5 days — threshold for the named list
  const slowSubs   = withSub.filter(p => p.avg_hrs >= SLOW_HRS).sort((a, b) => b.avg_hrs - a.avg_hrs);
  const slaPct     = withSub.length ? Math.round(onTrack.length / withSub.length * 100) : null;
  const notSubmitted   = allPeople.reduce((s, p) => s + (p.still_due || 0), 0);
  const notSubPeople   = allPeople.filter(p => (p.still_due || 0) > 0).length;

  // BrightHire offenders (5+ interviews, overall <80, 3+ signals below 80)
  const QCOLS = [
    ['on_time', 'On-time start', 'Did the interviewer start the interview within 5 minutes of the scheduled time?'],
    ['talk_ratio', 'Talk ratio', 'Ideal ratio is ~30% interviewer / 70% candidate talk time. High scores mean the candidate had space to answer.'],
    ['monologue', 'Monologue', 'Flags when the interviewer spoke for 2+ consecutive minutes without letting the candidate respond.'],
    ['eeoc', 'EEOC compliance', 'Whether legally protected topics (age, race, religion, family status, etc.) were avoided during the interview.'],
    ['q_opp', 'Question opportunity', 'Did the interviewer give the candidate time and prompting to ask their own questions?'],
    ['agenda', 'Agenda setting', 'Did the interviewer open by explaining the structure and purpose of the interview?'],
    ['fb_time', 'Feedback timeliness', 'How quickly the interviewer submitted their BrightHire feedback after the interview ended.'],
    ['fb_rate', 'Feedback rate', 'What percentage of interviews had feedback submitted at all — regardless of timing.'],
  ];
  const MIN_INT = 5, THRESH = 80;
  const offenders = bh
    .filter(r => (r.count || 0) >= MIN_INT && (r.overall ?? 100) < THRESH)
    .map(r => {
      const low = QCOLS
        .map(([k, lbl]) => ({ k, lbl, v: r[k] }))
        .filter(m => m.v !== null && m.v !== undefined && m.v < THRESH)
        .sort((a, b) => a.v - b.v);
      return { ...r, _low: low };
    })
    .filter(r => r._low.length >= 3)
    .sort((a, b) => a.overall - b.overall);
  const totalScored = bh.filter(r => (r.count || 0) >= MIN_INT).length;

  // ── What to know (top callout) ───────────────────────────────────────────
  const auto = engagementInsights(sc, bh, data);
  const eObs = [...auto.obs];

  // ── Early exit if no data ────────────────────────────────────────────────
  const lbHtml = loadBalanceSection(data);
  if (!allPeople.length && !bh.length && !skills.length) {
    document.getElementById('tab-engagement').innerHTML = lbHtml + empty();
    return;
  }

  let html = '';

  // ── 1. What to know ──────────────────────────────────────────────────────
  {
    let body;
    if (eObs.length) {
      body = '<div class="callout-card">' + eObs.map(o => '<div class="callout-item"><span>' + o + '</span></div>').join('') + '</div>';
    } else {
      body = '<div class="callout-card">' +
        '<div class="callout-item"><span style="color:var(--text-secondary);font-style:italic">No significant engagement issues flagged for this department this period.</span></div>' +
        '</div>';
    }
    html += sectionShell('What to know', body, 'Key items a leader should review before scrolling through the data below.');
  }

  // ── 2. Load balance (prepended at top, Engineering-only) ─────────────────
  // lbHtml is already computed above; inserted via innerHTML assignment at end.

  // ── 3. Scorecard performance ─────────────────────────────────────────────
  if (allPeople.length) {
    // Headline pills
    let body = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">' +
      '<span class="sla-pill sla-pill-green">' + (slaPct !== null ? slaPct : '—') + '% submitted within 48 hours</span>' +
      '<span class="sla-pill sla-pill-red">' + (slaPct !== null ? 100 - slaPct : '—') + '% submitted after 48 hours</span>' +
      '</div>';
    if (notSubmitted) {
      body += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">' +
        'Additionally, ' + notSubmitted + ' scorecard' + (notSubmitted !== 1 ? 's' : '') +
        ' across ' + notSubPeople + ' interviewer' + (notSubPeople !== 1 ? 's' : '') +
        ' were never submitted this period (shown per person below).</div>';
    } else {
      body += '<div style="margin-bottom:16px"></div>';
    }
    // Named list: only people who took longer than 5 days
    if (slowSubs.length) {
      body += '<div class="sc-accordion"><div class="sc-group">';
      body += '<button class="sc-group-btn" onclick="toggleGroup(this)">' +
        '<span>Took longer than 5 days to submit<span class="sc-group-count">' + slowSubs.length + ' panelist' + (slowSubs.length !== 1 ? 's' : '') + '</span></span>' +
        '<span class="sc-arrow">▾</span>' +
        '</button>' +
        '<div class="sc-group-body" style="display:block">' +
        '<div class="sc-table-wrap">' +
        '<table class="sc-table"><thead><tr>' +
        '<th>Interviewer</th>' +
        '<th style="text-align:right">Submitted</th>' +
        '<th>Avg. time</th>' +
        '<th style="text-align:right">Not submitted</th>' +
        '</tr></thead><tbody>';
      slowSubs.forEach(p => {
        const t = (p.avg_hrs / 24).toFixed(1) + ' days';
        const ns = (p.still_due || 0)
          ? '<span style="display:inline-block;min-width:28px;text-align:center;background:#eef0f3;color:#4b5563;border-radius:999px;padding:2px 8px;font-weight:700">' + p.still_due + '</span>'
          : '—';
        body += '<tr>' +
          '<td>' + p.name + '</td>' +
          '<td style="text-align:right">' + p.submitted + '</td>' +
          '<td>' + t + '</td>' +
          '<td style="text-align:right">' + ns + '</td>' +
          '</tr>';
      });
      body += '</tbody></table></div></div></div></div>';
    } else {
      body += '<div style="font-size:13px;color:var(--text-secondary);font-style:italic;padding:8px 0">No panelists took longer than 5 days to submit this period.</div>';
    }
    // Also show never-submitted if there are people in that bucket but not in slowSubs
    const neverOnly = allPeople.filter(p => (p.still_due || 0) > 0 && (p.avg_hrs || 0) < SLOW_HRS);
    if (neverOnly.length) {
      body += '<div style="margin-top:12px;font-size:12px;color:var(--text-secondary);padding:10px 12px;background:#f9fafb;border-radius:8px;border:1px solid var(--border)">' +
        '<strong>' + neverOnly.map(p => p.name).join(', ') + '</strong> — submitted within 5 days on average but ' +
        'have ' + neverOnly.reduce((s, p) => s + p.still_due, 0) + ' scorecard' + (neverOnly.reduce((s, p) => s + p.still_due, 0) !== 1 ? 's' : '') + ' still unsubmitted.' +
        '</div>';
    }
    html += sectionShell('Scorecard performance', body, '48-hour SLA: scorecards should be submitted within 48 hours of the interview. Individuals listed took longer than 5 days on average.');
  }

  // ── 4. BrightHire quality ─────────────────────────────────────────────────
  if (bh.length) {
    let body;
    if (offenders.length) {
      const rows = offenders.map(r => {
        const worst = r._low.slice(0, 3).map(m =>
          '<span style="display:inline-block;margin:2px 6px 2px 0;font-size:12px">' +
          '<span style="color:var(--text-secondary)">' + m.lbl + '</span> ' + scoreChip(m.v) +
          '</span>'
        ).join('');
        return '<tr>' +
          '<td style="vertical-align:top"><div style="font-weight:600">' + r.name + '</div>' +
            '<div style="font-size:11px;color:var(--text-secondary)">' + r.count + ' interview' + (r.count !== 1 ? 's' : '') + '</div></td>' +
          '<td style="vertical-align:top;text-align:center">' + scoreChip(r.overall) + '</td>' +
          '<td style="vertical-align:top">' + worst + '</td>' +
          '</tr>';
      }).join('');
      // BrightHire score key
      const keyItems = QCOLS.map(([k, lbl, desc]) =>
        '<div style="position:relative;display:inline-block;margin:3px 6px 3px 0" class="bh-key-item">' +
          '<span style="font-size:11px;font-weight:600;color:#374151;cursor:default;border-bottom:1px dotted #9ca3af">' + lbl + '</span>' +
          '<div class="bh-key-tooltip">' + desc + '</div>' +
        '</div>'
      ).join('');
      body = '<div class="bh-card">' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">' +
          '<span class="sla-pill sla-pill-red">' + offenders.length + ' interviewer' + (offenders.length !== 1 ? 's' : '') + ' need attention</span>' +
          '<span class="sla-pill sla-pill-green">' + Math.max(totalScored - offenders.length, 0) + ' in good standing</span>' +
        '</div>' +
        '<div style="font-size:12.5px;color:var(--text-secondary);margin-bottom:14px;line-height:1.5">' +
          'Interviewers with 5+ interviews whose overall BrightHire score fell below 80 and who were flagged on three or more quality signals. Weakest signals shown — everyone else is meeting the bar.' +
        '</div>' +
        '<div class="table-wrap" style="border:0;margin:0">' +
        '<table class="iq-table"><thead><tr>' +
          '<th>Interviewer</th><th style="text-align:center">Overall</th><th>Weakest signals</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
        '<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">' +
          '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:8px">Signal key — hover for details</div>' +
          '<div style="line-height:2">' + keyItems + '</div>' +
        '</div>' +
        '</div>';
    } else {
      body = '<div class="bh-card"><div class="empty-state" style="padding:24px">' +
        '<div style="font-size:28px;margin-bottom:8px">✓</div>' +
        '<p style="margin:0;color:var(--text-secondary)">No interviewers fell below the quality bar this period ' +
        '(5+ interviews, overall under 80, three or more weak signals).</p></div></div>';
    }
    html += sectionShell('Interview quality · BrightHire', body, 'Interviewers whose BrightHire quality signals suggest coaching — strongest performers are not listed.');
  }

  // ── 5. BrightHire skill coverage ─────────────────────────────────────────
  if (skills.length) {
    const groupId = 'skills-tab-group';
    let body = '<div class="bh-card" id="' + groupId + '">' +
      '<div class="bh-card-header">' +
      '<span class="bh-card-title">JD skill coverage across interviews</span>' +
      '<div class="bh-role-tabs">';
    skills.forEach((role, idx) => {
      const roleId = 'sk-' + role.role.replace(/[^a-zA-Z0-9]/g, '-');
      body += '<button class="bh-role-tab' + (idx === 0 ? ' active' : '') + '" data-role="' + roleId + '" onclick="showSkillsRole(\'' + groupId + '\',\'' + roleId + '\')">' + role.role + '</button>';
    });
    body += '</div></div>';
    skills.forEach((role, idx) => {
      const roleId = 'sk-' + role.role.replace(/[^a-zA-Z0-9]/g, '-');
      const covered = role.skills.filter(s => s.pct >= 80);
      const gaps = role.skills.filter(s => s.pct < 80);
      body += '<div class="bh-role-panel' + (idx === 0 ? ' active' : '') + '" id="' + roleId + '">' +
        '<div class="bh-card-desc">These are skills listed in the ' + role.role + ' job description. Each bar shows the percentage of interviews where that skill was assessed.</div>' +
        '<div class="bh-role-meta">' + role.role + ' · ' + role.num_candidates + ' candidate' + (role.num_candidates !== 1 ? 's' : '') + ' · ' + role.total_interviews + ' interview' + (role.total_interviews !== 1 ? 's' : '') + '</div>' +
        '<div class="bh-split">' +
        '<div class="bh-group"><div class="bh-group-head"><div class="bh-group-dot" style="background:var(--lawn)"></div><span class="bh-group-label green">Well covered (≥80%)</span></div>';
      body += covered.length ? covered.map(s =>
        '<div class="bh-row"><span class="bh-skill-label" title="' + s.name + '">' + s.name + '</span>' +
        '<div class="bh-track"><div class="bh-fill-green" style="width:' + s.pct + '%"></div></div>' +
        '<span class="bh-pct-green">' + s.pct + '%</span></div>'
      ).join('') : '<div style="font-size:13px;color:var(--text-secondary);font-style:italic;padding:8px 0">No skills at ≥80% coverage yet.</div>';
      body += '</div><div class="bh-group"><div class="bh-group-head"><div class="bh-group-dot" style="background:#f59e0b"></div><span class="bh-group-label gap">Coverage gaps (&lt;80%)</span></div>';
      body += gaps.length ? gaps.map(s => {
        const fillCls = s.tier === 'amber' ? 'bh-fill-amber' : 'bh-fill-red';
        const pctCls = s.tier === 'amber' ? 'bh-pct-amber' : 'bh-pct-red';
        return '<div class="bh-row"><span class="bh-skill-label" title="' + s.name + '">' + s.name + '</span>' +
          '<div class="bh-track"><div class="' + fillCls + '" style="width:' + Math.max(s.pct, 0.5) + '%"></div></div>' +
          '<span class="' + pctCls + '">' + s.pct + '%</span></div>';
      }).join('') : '<div style="font-size:13px;color:var(--text-secondary);font-style:italic;padding:8px 0">All skills well covered!</div>';
      body += '</div></div></div>';
    });
    body += '</div>';
    html += sectionShell('Interview skill coverage · BrightHire', body, 'Shows whether required JD skills are being consistently assessed across interviews.');
  }

  // ── 6. Insights — signal-card format matching the Metrics tab ────────────
  {
    const signals = [];

    // Load balance signals
    const ep = (data.full_panel || data.eng_panel || []);
    if (ep.length) {
      const act    = ep.filter(i => (i.completed || 0) > 0);
      const unused = ep.length - act.length;
      const done   = act.reduce((s, i) => s + (i.completed || 0), 0);
      const t20n   = Math.max(1, Math.ceil(act.length * 0.2));
      const t20done = act.slice().sort((a, b) => b.completed - a.completed)
        .slice(0, t20n).reduce((s, i) => s + i.completed, 0);
      const t20pct = done ? Math.round(t20done / done * 100) : 0;
      const utilPct = Math.round(act.length / ep.length * 100);
      if (unused >= 5) {
        signals.push({
          color: '#b45309', bg: '#fffbeb', border: '#fde68a',
          title: unused + ' of ' + ep.length + ' eligible interviewers were never used this period',
          body: utilPct + '% panel utilization means there\'s a bench sitting idle. Before adding headcount to the panel or burning out your regulars, check who in the untapped group is trained and available — there\'s likely capacity here that just hasn\'t been activated.'
        });
      }
      if (t20pct >= 45) {
        signals.push({
          color: t20pct >= 55 ? '#991b1b' : '#b45309',
          bg:    t20pct >= 55 ? '#fff1f2' : '#fffbeb',
          border:t20pct >= 55 ? '#fecdd3' : '#fde68a',
          title: 'Top ' + t20n + ' interviewers are carrying ' + t20pct + '% of all interviews',
          body: 'That\'s a heavy load on a small group. If any of them take time off, go on a big project, or leave, your scheduling pipeline takes an immediate hit. Spreading load across more of the panel reduces that fragility — and usually makes the panel more invested too.'
        });
      }
    }

    // Scorecard timeliness
    if (slaPct !== null && (100 - slaPct) >= 25) {
      signals.push({
        color: '#b45309', bg: '#fffbeb', border: '#fde68a',
        title: overSla.length + ' panelists submitted after the 48-hour window — ' + (100 - slaPct) + '% of the team',
        body: 'Late scorecards slow down debrief conversations and leave candidates waiting on decisions. The ask is simple: submit within 48 hours while the interview is still fresh. For anyone in the list above who took 5+ days, a direct nudge usually fixes it — most late submissions are habit, not intent.'
      });
    }
    if (notSubmitted > 0) {
      signals.push({
        color: '#991b1b', bg: '#fff1f2', border: '#fecdd3',
        title: notSubmitted + ' scorecard' + (notSubmitted !== 1 ? 's' : '') + ' were never submitted this period',
        body: 'Unsubmitted scorecards mean there\'s no documented decision for those interviews — which creates a gap in the hiring record and makes debriefs harder. Across ' + notSubPeople + ' interviewer' + (notSubPeople !== 1 ? 's' : '') + ', this is worth a quick follow-up to close the loop.'
      });
    }

    // BrightHire quality
    if (offenders.length) {
      signals.push({
        color: '#b45309', bg: '#fffbeb', border: '#fde68a',
        title: offenders.length + ' interviewer' + (offenders.length !== 1 ? 's' : '') + ' show consistent quality gaps across multiple signals',
        body: 'These aren\'t one-off bad days — the patterns show up across 5+ interviews. The weakest signals (listed in the table above) are usually coachable: talk ratio and monologue are the easiest to address with a short conversation and a recording review. Pairing the interviewer with a stronger panelist for a few rounds is often enough to shift the behavior.'
      });
    }

    // Skill coverage
    if (skills.length) {
      const roleGaps = skills.map(role => ({
        role: role.role,
        gaps: role.skills.filter(s => s.pct < 80).sort((a, b) => a.pct - b.pct)
      })).filter(r => r.gaps.length);
      if (roleGaps.length) {
        const topRole = roleGaps.sort((a, b) => b.gaps.length - a.gaps.length)[0];
        signals.push({
          color: '#b45309', bg: '#fffbeb', border: '#fde68a',
          title: 'Key JD skills aren\'t being assessed consistently across interviews',
          body: topRole.role + ' has ' + topRole.gaps.length + ' skill' + (topRole.gaps.length !== 1 ? 's' : '') + ' assessed in under 80% of interviews — including "' + topRole.gaps[0].name + '" (' + topRole.gaps[0].pct + '%). This usually means the interview guide isn\'t explicit enough about which panelist covers which skill. A quick mapping exercise across the panel closes this without adding interviews.'
        });
      }
    }

    // Clean state
    if (!signals.length) {
      signals.push({
        color: '#1B8751', bg: '#f0fdf4', border: '#bbf7d0',
        title: 'No major engagement issues flagged this period',
        body: 'Scorecard timeliness, BrightHire quality, and panel utilization are all within a reasonable range. Keep an eye on the load balance if panel size changes.'
      });
    }

    const sigHtml = signals.map(s =>
      '<div style="border-left:4px solid ' + s.border + ';background:' + s.bg + ';border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:12px">' +
        '<div style="font-weight:700;font-size:13px;color:' + s.color + ';margin-bottom:6px">' + s.title + '</div>' +
        '<div style="font-size:13px;color:#374151;line-height:1.55">' + s.body + '</div>' +
      '</div>'
    ).join('');
    html += sectionShell('Insights and recommendations', sigHtml, 'What the data above suggests and where to focus.');
  }

  html += '<div class="timestamp">Generated ' + D.meta.generated_date + ' · Source: Greenhouse · BrightHire · ModernLoop</div>';
  document.getElementById('tab-engagement').innerHTML = lbHtml + html;
}
// ════════════════════════════════════════════════════════════════
// INTERVIEW METRICS TAB
// ════════════════════════════════════════════════════════════════
function renderMetrics(data) {
  const s     = data.stats || {};
  const coord = data.coordination || {};
  const all   = (data.all_interviewers || []).slice().sort((a,b) => (b.declines||0)-(a.declines||0));
  if (!s.total_declines && !all.length && !(coord.facilitated)) {
    document.getElementById('tab-metrics').innerHTML = empty('No metrics data for this department.');
    return;
  }
  let html = '';

  // ─── derived ──────────────────────────────────────────────────────────
  const coordFac       = coord.facilitated || 0;
  const coordRsc       = coord.rescheduled || 0;
  const coordCan       = coord.canceled || 0;
  const coordChg       = coord.changed || 0;
  const coordDisr      = coord.disruptions || (coordRsc + coordCan + coordChg);
  const coordDisrRate  = coord.disruption_rate || (coordFac ? Math.round(coordDisr/coordFac*100) : 0);
  const coordIntv      = coord.interviewer_driven_reschedules || 0;
  const coordLate      = coord.late_declines || 0;
  const coordVeryLate  = coord.very_late_declines || 0;
  const coordSameDay   = coord.same_day_declines || 0;
  const coordUniqCand  = coord.unique_candidates_affected || 0;
  const coordTotalCand = coord.total_unique_candidates || 0;
  const coordHrsLost   = coord.est_coord_hrs_lost || 0;
  const coordReasons   = coord.reschedule_reasons || [];
  const intvPct        = coordRsc ? Math.round(coordIntv/coordRsc*100) : 0;

  const dpool          = declinePool(data);
  const dTotal         = totalDeclines(data);
  const dActive        = dpool.filter(i=>(i.completed||0)>0);
  const dDecliners     = dpool.filter(i=>(i.declines||0)>0);
  const repeatDecliners = dDecliners.filter(i=>(i.declines||0)>=3);
  const oneOffDecliners = dDecliners.filter(i=>(i.declines||0)<3);
  const repeatDecl     = repeatDecliners.reduce((s,i)=>s+(i.declines||0),0);
  const repeatShare    = dTotal ? Math.round(repeatDecl/dTotal*100) : 0;
  const activeCount    = dActive.length;
  const declinerShare  = activeCount ? Math.round(dDecliners.length/activeCount*100) : 0;
  const declAsIntPct   = coordFac ? Math.round(dTotal/coordFac*100) : 0;
  const latePct        = dTotal ? Math.round(coordLate/dTotal*100) : 0;
  const veryLatePct    = dTotal ? Math.round(coordVeryLate/dTotal*100) : 0;
  const cancelRate     = coordFac ? Math.round((coord.canceled_primary||coordCan)/coordFac*100) : 0;

  // ─── WHAT TO KNOW (top navy callout box) ────────────────────────────────
  {
    const items = [];

    if (coordFac > 0 && coordHrsLost > 0) {
      items.push('Approximately <strong>' + coordHrsLost + ' coordinator hours</strong> were spent reworking disrupted interviews this period. Reschedules, cancellations, and panel changes each require coordinators to rebuild loops, find replacement panelists, and resend invites.');
    }

    if (coordDisrRate >= 50) {
      items.push('<strong>' + coordDisrRate + '% disruption rate</strong> — more than half of facilitated interviews required a change. At this level, coordinators spend as much time fixing loops as scheduling new ones.');
    } else if (coordDisrRate >= 35) {
      items.push('<strong>' + coordDisrRate + '% disruption rate</strong> — more than 1 in 3 interviews required a reschedule, cancellation, or panel change this period.');
    }

    if (coordLate > 0) {
      const sameDaySuffix = coordVeryLate > 0 ? ', including ' + coordVeryLate + ' same-day.' : '.';
      items.push('<strong>' + coordLate + ' late decline' + (coordLate!==1?'s':'') + '</strong> (' + latePct + '% of all declines) came with less than 24 hours notice — each forces coordinators to scramble for a replacement panelist under time pressure' + sameDaySuffix);
    }

    if (dTotal > 0) {
      const highDeclinersCount = dDecliners.filter(i => {
        const t = (i.completed||0)+(i.declines||0);
        return t > 0 && Math.round(i.declines/t*100) >= 35;
      }).length;
      if (highDeclinersCount > 0) {
        items.push('<strong>' + highDeclinersCount + ' interviewer' + (highDeclinersCount!==1?'s':'') + '</strong> declined at a rate of 35% or higher this period. These individuals are listed in the table below.');
      }
    }

    if (items.length === 0 && coordFac > 0) {
      items.push('Coordination load was well-managed this period — disruption rate was ' + coordDisrRate + '% and no significant decline patterns were flagged.');
    }

    if (items.length > 0) {
      const body = '<div class="callout-card">' +
        items.map(i => '<div class="callout-item"><span>' + i + '</span></div>').join('') +
        '</div>';
      html += sectionShell('What to know', body, 'Key scheduling and decline signals a hiring manager should be aware of this period.');
    }
  }

  // ─── SECTION 1: COORDINATION LOAD ────────────────────────────────────
  let coordBody = '';
  if (coordFac === 0) {
    coordBody = empty('No coordination data for this department.');
  } else {
    // 3 headline cards — coordinator time woven into disruption rate subtext
    coordBody +=
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px">' +
        '<div class="stat-card"><div class="stat-label">Interview events scheduled</div>' +
          '<div class="stat-value">' + fmt(coordFac) + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">across ' + fmt(coordTotalCand) + ' unique candidates</div></div>' +
        '<div class="stat-card"><div class="stat-label">Disruption rate</div>' +
          '<div class="stat-value' + (coordDisrRate>=50?' amber':'') + '">' + coordDisrRate + '%</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + fmt(coordDisr) + ' disruptions' +
            (coordHrsLost>0 ? ' · ~' + coordHrsLost + ' hrs coordinator rework' : '') +
          '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Candidates affected</div>' +
          '<div class="stat-value' + (coordUniqCand>10?' amber':'') + '">' + fmt(coordUniqCand) + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' +
            (coordTotalCand ? 'of ' + fmt(coordTotalCand) + ' candidates had an interview rescheduled or canceled' : 'had an interview rescheduled or canceled') +
          '</div></div>' +
      '</div>';

    // Disruption breakdown bar
    if (coordDisr > 0) {
      const coordCanPri = coord.canceled_primary  || 0;
      const coordRscPri = coord.rescheduled_primary || 0;
      const coordChgPri = coord.changed_primary  || 0;
      const rows = [
        {label:'Rescheduled', count:coordRscPri, sub:intvPct?intvPct+'% interviewer-driven':null, color:'#BA6029'},
        {label:'Canceled', count:coordCanPri, sub:'interview removed from calendar', color:'#6B7480'},
        {label:'Panel change only', count:coordChgPri, sub:'interviewer swapped, not rescheduled', color:'#9ca3af'},
      ].filter(r=>r.count>0);
      coordBody += '<div style="border-top:1px solid var(--border);padding-top:20px">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:14px">Where the ' + fmt(coordDisr) + ' disruptions came from</div>' +
        '<div style="display:flex;height:28px;border-radius:8px;overflow:hidden;margin-bottom:16px">';
      const barTotal = rows.reduce((s,x)=>s+x.count,0)||1;
      rows.forEach(r => {
        const w = Math.round(r.count/barTotal*100);
        coordBody += '<div style="width:'+w+'%;background:'+r.color+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700">'+(w>=10?w+'%':'')+'</div>';
      });
      coordBody += '</div><div style="display:flex;flex-wrap:wrap;gap:14px 28px">';
      rows.forEach(r => {
        const pct = coordDisr ? Math.round(r.count/coordDisr*100) : 0;
        coordBody += '<div style="display:flex;align-items:flex-start;gap:8px">' +
          '<span style="width:11px;height:11px;border-radius:3px;background:'+r.color+';flex-shrink:0;margin-top:3px"></span>' +
          '<div><span style="font-size:13px;font-weight:600;color:var(--dusk)">'+r.label+' — '+fmt(r.count)+' ('+pct+'%)</span>' +
          (r.sub?'<div style="font-size:12px;color:var(--text-secondary)">'+r.sub+'</div>':'')+'</div></div>';
      });
      coordBody += '</div></div>';
    }
  }
  html += sectionShell('Coordination load', coordBody, 'Interview volume, scheduling disruptions, and candidate experience impact this period.');

  // ─── SECTION 2: INTERVIEWER DECLINE BEHAVIOR ─────────────────────────
  {
    let declBody = '';

    // 4 mini-stats in one row
    const repeatBar =
      '<div style="display:flex;height:8px;border-radius:5px;overflow:hidden;margin:5px 0 6px">' +
      '<div style="width:'+repeatShare+'%;background:#b45309"></div>' +
      '<div style="width:'+(100-repeatShare)+'%;background:#cdd7e2"></div></div>';

    declBody +=
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">' +
        // Total declines
        '<div style="background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:14px">' +
          '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Total declines</div>' +
          '<div style="font-size:24px;font-weight:700;color:var(--dusk)">' + fmt(dTotal) + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + declAsIntPct + '% of all interviews</div>' +
        '</div>' +
        // Who declined
        '<div style="background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:14px">' +
          '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Interviewers who declined</div>' +
          '<div style="font-size:24px;font-weight:700;color:var(--dusk)">' + dDecliners.length + ' <span style="font-size:14px;font-weight:400">of ' + activeCount + '</span></div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + declinerShare + '% of active interviewers declined at least once</div>' +
        '</div>' +
        // Late declines
        '<div style="background:' + (coordLate>0?'#fff7ed':'#fafafa') + ';border:1px solid ' + (coordLate>0?'#fed7aa':'var(--border)') + ';border-radius:8px;padding:14px">' +
          '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Late declines (&lt;24 hr)</div>' +
          '<div style="font-size:24px;font-weight:700;color:' + (coordLate>0?'#b45309':'var(--lawn)') + '">' + coordLate + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + latePct + '% of all declines</div>' +
        '</div>' +
        // Very late
        '<div style="background:' + (coordVeryLate>0?'#fff1f2':'#fafafa') + ';border:1px solid ' + (coordVeryLate>0?'#fecdd3':'var(--border)') + ';border-radius:8px;padding:14px">' +
          '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Very late (&lt;4 hr)</div>' +
          '<div style="font-size:24px;font-weight:700;color:' + (coordVeryLate>0?'#991b1b':'var(--lawn)') + '">' + coordVeryLate + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + veryLatePct + '% of all declines</div>' +
        '</div>' +
      '</div>';

    // High-decliner table: ≥35% decline rate
    const highDecliners = dDecliners.filter(i => {
      const total = (i.completed||0)+(i.declines||0);
      return total > 0 && Math.round(i.declines/total*100) >= 35;
    }).sort((a,b) => {
      const ra = a.declines/((a.completed||0)+a.declines);
      const rb = b.declines/((b.completed||0)+b.declines);
      return rb - ra;
    });
    const highDeclTotal = highDecliners.reduce((s,i)=>s+(i.declines||0),0);
    const highDeclShare = dTotal ? Math.round(highDeclTotal/dTotal*100) : 0;

    if (highDecliners.length > 0) {
      declBody += '<div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:20px">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:12px">Interviewers with a decline rate above 35%</div>' +
        '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">' +
          '<strong style="color:#b45309">' + highDeclShare + '%</strong> of all declines came from these ' +
          '<strong style="color:var(--dusk)">' + highDecliners.length + ' interviewer' + (highDecliners.length!==1?'s':'') + '</strong>.' +
        '</div>' +
        '<div class="table-wrap" style="margin-bottom:0"><table class="interviewer-table" style="width:100%">' +
        '<colgroup><col style="width:60%"><col style="width:20%"><col style="width:20%"></colgroup>' +
        '<thead><tr>' +
          '<th>Interviewer</th>' +
          '<th style="text-align:right">Decline rate</th>' +
          '<th style="text-align:right">Volume</th>' +
        '</tr></thead><tbody>' +
        highDecliners.map(i => {
          const total = (i.completed||0)+(i.declines||0);
          const dr = Math.round(i.declines/total*100);
          const clr = dr>=60?'#991b1b':dr>=40?'#b45309':'var(--dusk)';
          return '<tr>' +
            '<td style="font-weight:500">' + i.name + '</td>' +
            '<td style="text-align:right;font-weight:700;color:'+clr+'">' + dr + '%</td>' +
            '<td style="text-align:right;color:var(--text-secondary)">' + i.declines + ' of ' + total + '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div></div>';
    }

    // Late decline impact note
    if (coordLate > 0 || coordVeryLate > 0) {
      declBody +=
        '<div style="border-top:1px solid var(--border);padding-top:20px">' +
        '<div style="font-size:13px;color:var(--text-secondary);line-height:1.65;padding:12px 14px;background:#fafafa;border-radius:8px;border:1px solid var(--border)">' +
          'Every late decline forces coordinators to rebuild the interview loop under time pressure — finding a replacement panelist, rescheduling the candidate, and resending calendar invites.' +
          (coordVeryLate>0 ? ' The <strong style="color:#991b1b">'+coordVeryLate+' same-day declines</strong> are the highest-risk: at that point the candidate is likely already blocked time and may experience the no-show directly.' : '') +
          ' This is one of the highest-leverage behaviors a hiring manager can address — setting a clear expectation that panelists honor committed slots (and if they can\'t, give maximum notice) directly protects candidate experience.' +
        '</div></div>';
    }

    html += sectionShell('Interviewer decline behavior', declBody, 'Who declined, how often, and when — and what it costs the process.');
  }

  // ─── SECTION 3: WHAT THIS MEANS ──────────────────────────────────────
  const signals = [];
  const coordCanPrimary = coord.canceled_primary || 0;
  const coordRscPrimary = coord.rescheduled_primary || 0;

  // ── Disruption rate ────────────────────────────────────────────────
  if (coordFac > 0 && coordDisrRate >= 35) {
    const drvrNote = intvPct >= 50
      ? intvPct + '% of reschedules were interviewer-initiated — the team is canceling on candidates more than candidates are canceling on us.'
      : 'Both interviewers and candidates are contributing to the churn.';
    signals.push({
      color: coordDisrRate >= 60 ? '#991b1b' : '#b45309',
      bg:    coordDisrRate >= 60 ? '#fff1f2' : '#fffbeb',
      border:coordDisrRate >= 60 ? '#fecdd3' : '#fde68a',
      title: fmt(coordDisr) + ' of ' + fmt(coordFac) + ' interview sessions were disrupted (' + coordDisrRate + '%)',
      body: "That's a lot of rebuilding for your coordinators — every change means a new calendar invite, a new panelist to find, and a candidate left waiting. " + drvrNote + " If your team is consistently too busy to honor their interview slots, the loop may need fewer panelists or better protected time."
    });
  }

  // ── High cancellation rate ─────────────────────────────────────────
  if (coordFac > 0 && cancelRate >= 20) {
    signals.push({
      color:'#b45309', bg:'#fffbeb', border:'#fde68a',
      title: coordCanPrimary + ' sessions were outright canceled — not rescheduled',
      body: 'Cancellations (' + cancelRate + '% of the total) are a harder hit than reschedules — there\'s no makeup interview, just a gap in the process. This can mean candidate withdrawals, earlier-stage rejections, or interviewers who dropped without a replacement. Worth a quick look with your recruiter to understand what\'s driving it.'
    });
  }

  // ── Late declines ──────────────────────────────────────────────────
  if (coordVeryLate >= 3) {
    signals.push({
      color:'#991b1b', bg:'#fff1f2', border:'#fecdd3',
      title: coordVeryLate + ' declines came in with less than 4 hours notice',
      body: 'At that point the candidate has likely already blocked their calendar — and in some cases may not even find out until they show up. When someone on your team genuinely can\'t make an interview, the earlier they flag it the better. A same-day drop should come with a personal heads-up so the candidate experience doesn\'t take a hit. This is worth a direct reminder to your panelists.'
    });
  } else if (coordLate >= 5) {
    signals.push({
      color:'#b45309', bg:'#fffbeb', border:'#fde68a',
      title: coordLate + ' declines came in under 24 hours — ' + latePct + '% of all declines',
      body: 'Last-minute drops put coordinators in a scramble to find a replacement before the candidate\'s slot disappears. The ask for your team is simple: if something comes up, flag it as early as possible. The difference between a 48-hour heads-up and a 4-hour one is huge for the coordinator and the candidate.'
    });
  }

  // ── Decline concentration ──────────────────────────────────────────
  if (repeatShare >= 50 && repeatDecliners.length >= 2) {
    signals.push({
      color:'#b45309', bg:'#fffbeb', border:'#fde68a',
      title: repeatShare + '% of all declines came from just ' + repeatDecliners.length + ' people',
      body: 'Most of your team is fine — this is concentrated in a small group who are repeatedly declining. A one-on-one conversation with each of them is usually enough to understand what\'s getting in the way: overloaded calendars, unclear expectations, or interviews they don\'t feel qualified to run. Addressing it directly is faster and more effective than any team-wide change.'
    });
  }

  // ── High-decline-rate interviewers ─────────────────────────────────
  const highDeclCount = dDecliners.filter(i => {
    const t = (i.completed||0)+(i.declines||0);
    return t > 0 && Math.round(i.declines/t*100) >= 35;
  }).length;
  if (highDeclCount > 0 && repeatDecliners.length < 2) {
    signals.push({
      color:'#b45309', bg:'#fffbeb', border:'#fde68a',
      title: highDeclCount + ' interviewer' + (highDeclCount!==1?'s are':'is') + ' declining more than 1 in 3 assigned interviews',
      body: 'See the table above for names and rates. A decline rate above 35% usually means the interviewer is over-committed, unclear on expectations, or not confident in the interview type they\'ve been assigned. A direct conversation to understand the blocker is the right first step.'
    });
  }

  // ── Clean state ────────────────────────────────────────────────────
  if (!signals.length && coordFac > 0) {
    signals.push({
      color:'#1B8751', bg:'#f0fdf4', border:'#bbf7d0',
      title:'No major scheduling or decline issues this period',
      body:'Disruption rate was ' + coordDisrRate + '% and no significant late-decline or concentration patterns were detected. Keep it up.'
    });
  }
  if (signals.length) {
    const sigHtml = signals.map(s =>
      '<div style="background:'+s.bg+';border:1px solid '+s.border+';border-radius:8px;padding:14px 16px;margin-bottom:12px">' +
        '<div style="font-size:13px;font-weight:700;color:'+s.color+';margin-bottom:5px">'+s.title+'</div>' +
        '<div style="font-size:13px;color:var(--text-secondary);line-height:1.6">'+s.body+'</div>' +
      '</div>'
    ).join('');
    html += sectionShell('What this means', sigHtml, 'Key signals a hiring manager should act on this period.');
  }

  html += '<div class="timestamp">Generated ' + D.meta.generated_date + ' · Source: ModernLoop decline + facilitation exports</div>';
  document.getElementById('tab-metrics').innerHTML = html;
}
init();
</script>
</body>
</html>
