<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The PORCH Report</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --lawn:#1B8751;--lawn-light:#d4edda;--dusk:#232F46;--plaster:#F0F2F5;--white:#fff;
  --border:#e1e4e8;--text-secondary:#6b7280;--amber:#f59e0b;--red:#ef4444;--zero:#9ca3af;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--plaster);color:var(--dusk);font-size:14px;line-height:1.5}
.header{background:var(--dusk);color:var(--white);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.header-left{display:flex;align-items:center;gap:12px}.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--lawn)}
.report-title{font-size:17px;font-weight:700;letter-spacing:-.3px}.report-meta{font-size:12px;color:rgba(255,255,255,.55);margin-top:1px}
.dept-selector-wrap{display:flex;align-items:center;gap:10px}.dept-label{font-size:12px;color:rgba(255,255,255,.6)}
.dept-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:var(--white);padding:7px 32px 7px 12px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;appearance:none;min-width:200px}
.dept-select option{background:var(--dusk);color:var(--white)}
.tab-nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:0}
.tab-btn{padding:14px 20px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);border-bottom:2px solid transparent;transition:all .15s}
.tab-btn:hover{color:var(--dusk)}.tab-btn.active{color:var(--lawn);border-bottom-color:var(--lawn);font-weight:600}
.page{padding:28px 32px;max-width:1200px;margin:0 auto}.tab-panel{display:none}.tab-panel.active{display:block}
.stats-grid,.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-bottom:28px}.kpi-3{grid-template-columns:repeat(3,1fr)}
.stat-card,.section-card,.kpi,.status-card,.bh-card,.callout-card,.recaction-card,.flag-box,.sla-panel{background:var(--white);border:1px solid var(--border);border-radius:10px}
.stat-card,.kpi{padding:20px}.kpi-alert{border-color:#fecaca;background:#fff7f7}
.stat-value,.metric-big{font-size:28px;font-weight:700;color:var(--dusk);line-height:1;margin-bottom:6px}.metric-big{font-size:32px}
.stat-value.green{color:var(--lawn)}.stat-value.amber{color:#d97706}
.stat-label,.label,.metric-sub{font-size:12px;color:var(--text-secondary);font-weight:500}.label{text-transform:uppercase;letter-spacing:.3px}.metric-sub{margin-top:8px}
.section-card{padding:24px;margin-bottom:20px}.section-title,.section-label{font-size:15px;font-weight:700;color:var(--dusk);margin-bottom:16px}
.section-label{text-transform:uppercase;letter-spacing:.45px;font-size:12px;color:var(--text-secondary)}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);background:var(--white);margin-bottom:22px}
.data-table,.interviewer-table,.iq-table{border-collapse:collapse;font-size:13px}.data-table th,.interviewer-table th,.iq-table th{text-align:left;background:var(--plaster);color:var(--text-secondary);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table td,.interviewer-table td,.iq-table td{border-bottom:1px solid #f3f4f6;vertical-align:middle}.data-table tr:hover td,.interviewer-table tr:hover td,.iq-table tr:hover td{background:#fafafa}
.score-chip,.iq-chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;min-width:40px;text-align:center}
.score-100{background:#d1fae5;color:#065f46}.score-high{background:#dcfce7;color:#166534}.score-mid{background:#fef3c7;color:#92400e}.score-low{background:#fee2e2;color:#991b1b}.score-zero{background:#f3f4f6;color:#6b7280}.score-null{background:#f9fafb;color:#d1d5db}
.reason-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}.reason-pill{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 18px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:120px}.reason-pill .rp-pct{font-size:22px;font-weight:700;color:var(--dusk)}.reason-pill .rp-label{font-size:11px;color:var(--text-secondary);text-align:center}.reason-pill.top{border-color:var(--lawn)}.reason-pill.top .rp-pct{color:var(--lawn)}
.callout{display:flex;align-items:center;gap:16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:16px 20px;margin-bottom:20px}.callout-icon{font-size:28px}.callout-value{font-size:22px;font-weight:700;color:var(--lawn)}.callout-label{font-size:12px;color:var(--text-secondary)}.callout.warn{background:#fffbeb;border-color:#fde68a}.callout.warn .callout-value{color:#d97706}
.reason-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:var(--plaster);color:var(--text-secondary)}.reason-tag.ooo{background:#dbeafe;color:#1d4ed8}.reason-tag.too-many{background:#fee2e2;color:#991b1b}.reason-tag.conflict{background:#fef3c7;color:#92400e}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-secondary)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.status-card{padding:20px;cursor:pointer}.status-card:hover{box-shadow:0 8px 24px rgba(35,47,70,.08);transform:translateY(-1px)}
.status-card-top{display:flex;justify-content:space-between;align-items:center}.status-card h3{font-size:16px}.status-card p{margin:12px 0;color:var(--text-secondary)}
.status-dot{width:12px;height:12px;border-radius:50%}.dot-green{background:var(--lawn)}.dot-amber{background:var(--amber)}.dot-red{background:var(--red)}
.status-badge,.sla-pill{display:inline-block;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;margin-top:10px}.sbadge-green,.sla-pill-green{background:#dcfce7;color:#166534}.sbadge-amber,.sla-pill-warn{background:#fef3c7;color:#92400e}.sbadge-red,.sla-pill-red{background:#fee2e2;color:#991b1b}
.go{font-size:12px;color:var(--lawn);font-weight:700}.divider{height:1px;background:var(--border);margin:28px 0}
.obs-list{list-style:none;display:flex;flex-direction:column;gap:8px}.obs-list li{padding:10px 14px;border-radius:6px;font-size:13px}.obs-list.obs li{background:#f0f9ff;border-left:3px solid #0ea5e9}.obs-list.rec li{background:#f0fdf4;border-left:3px solid var(--lawn)}
.callout-card,.recaction-card{padding:16px 18px;margin-bottom:22px}.callout-item,.recaction-item{padding:9px 0;border-bottom:1px solid #f3f4f6}.callout-item:last-child,.recaction-item:last-child{border-bottom:none}.recaction-arrow{color:var(--lawn);font-weight:800;margin-right:8px}
.sc-group{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;background:white}.sc-group-btn{width:100%;display:flex;justify-content:space-between;padding:12px 14px;border:0;background:#fafafa;font-weight:700;cursor:pointer}.sc-group-count{color:var(--text-secondary);font-weight:500;margin-left:8px}.due-chip{background:#fee2e2;color:#991b1b;border-radius:999px;padding:2px 8px;font-weight:700}
.bh-card{overflow:hidden;margin-bottom:20px}.bh-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}.bh-card-title{font-weight:700}.bh-card-meta{font-size:12px;color:var(--text-secondary)}
.iq-count{display:block;font-size:11px;color:var(--text-secondary)}.tip{border-bottom:1px dotted #999;cursor:help}.tip-popup{position:absolute;z-index:999;background:#111827;color:white;font-size:12px;line-height:1.4;padding:8px 10px;border-radius:8px;width:240px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.bh-tip-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#94a3b8;color:#fff;font-size:9px;font-weight:700;font-style:normal;cursor:help;margin-left:4px;vertical-align:middle;line-height:1;flex-shrink:0}
.bh-tip-icon:hover{background:var(--dusk)}
#bh-global-tooltip{position:fixed;z-index:9999;background:#111827;color:#fff;font-size:12px;line-height:1.5;padding:10px 12px;border-radius:8px;width:230px;box-shadow:0 8px 24px rgba(0,0,0,.28);pointer-events:none;display:none}
.flag-box{padding:16px 18px;background:#fff7ed;border-color:#fed7aa}.flag-header{font-weight:800;color:#9a3412;margin-bottom:8px}.flag-body{font-size:13px;color:#7c2d12}
.role-rate-row{display:grid;grid-template-columns:170px 1fr 52px 100px;align-items:center;gap:10px;margin:10px 0}.role-rate-track{height:18px;border-radius:6px;background:var(--plaster);overflow:hidden}.role-rate-fill-green,.role-rate-fill-amber,.role-rate-fill-red{height:100%;border-radius:6px}.role-rate-fill-green{background:var(--lawn)}.role-rate-fill-amber{background:#fbbf24}.role-rate-fill-red{background:#f87171}.role-rate-pct{text-align:right;font-weight:700}
.timestamp{margin-top:24px;color:var(--text-secondary);font-size:11px}.footer{text-align:center;padding:24px;color:var(--text-secondary);font-size:11px;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:768px){.header{padding:10px 16px;height:auto;gap:12px;flex-direction:column;align-items:flex-start}.tab-nav{padding:0 16px;overflow-x:auto}.page{padding:20px 16px}.two-col,.status-grid,.kpi-3{grid-template-columns:1fr}.role-rate-row{grid-template-columns:1fr}.role-rate-pct{text-align:left}}

/* BrightHire skill coverage */
.bh-card-desc{padding:14px 18px;font-size:13px;color:var(--text-secondary);line-height:1.6;background:var(--plaster);border-bottom:1px solid var(--border)}
.bh-role-tabs{display:flex;gap:6px;flex-wrap:wrap}
.bh-role-tab{border:1px solid var(--border);background:var(--white);color:var(--text-secondary);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer}
.bh-role-tab.active{background:var(--lawn);border-color:var(--lawn);color:var(--white)}
.bh-role-panel{display:none;padding:0 18px 18px}
.bh-role-panel.active{display:block}
.bh-role-meta{font-size:12px;color:var(--text-secondary);margin:14px 0;font-weight:600}
.bh-split{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.bh-group{border:1px solid var(--border);border-radius:10px;padding:14px;background:var(--white)}
.bh-group-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.bh-group-dot{width:9px;height:9px;border-radius:50%}
.bh-group-label{font-size:12px;font-weight:800;color:var(--text-secondary)}
.bh-group-label.green{color:var(--lawn)}
.bh-group-label.gap{color:#92400e}
.bh-row{display:grid;grid-template-columns:minmax(120px,180px) 1fr 42px;align-items:center;gap:10px;margin:10px 0}
.bh-skill-label{font-size:12px;color:var(--dusk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bh-track{height:16px;border-radius:999px;background:var(--plaster);overflow:hidden}
.bh-fill-green,.bh-fill-amber,.bh-fill-red{height:100%;border-radius:999px}
.bh-fill-green{background:var(--lawn)}.bh-fill-amber{background:#fbbf24}.bh-fill-red{background:#f87171}
.bh-pct-green,.bh-pct-amber,.bh-pct-red{font-size:12px;font-weight:800;text-align:right}
.bh-pct-green{color:var(--lawn)}.bh-pct-amber{color:#92400e}.bh-pct-red{color:#991b1b}
@media(max-width:768px){.bh-split{grid-template-columns:1fr}.bh-row{grid-template-columns:1fr}.bh-pct-green,.bh-pct-amber,.bh-pct-red{text-align:left}}

/* Scorecard accordion table */
:root{--table-th-padding:6px 8px;--table-td-padding:7px 8px}
.data-table,.interviewer-table,.iq-table{width:100%;border-collapse:collapse;table-layout:auto;font-size:13px}
.data-table th,.interviewer-table th,.iq-table th{padding:var(--table-th-padding)!important;font-size:11px!important;font-weight:600;color:var(--text-secondary);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--plaster);text-transform:uppercase;letter-spacing:.4px}
.data-table td,.interviewer-table td,.iq-table td{padding:var(--table-td-padding)!important;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.sc-accordion{width:760px;max-width:100%}
.sc-group{width:100%!important;max-width:100%;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--white);margin-bottom:12px}
.sc-group-btn{width:100%;min-height:52px;display:flex;align-items:center;justify-content:space-between;padding:12px 14px!important;border:0;background:#fafafa;font-size:15px;font-weight:800;cursor:pointer}
.sc-group-count{color:var(--text-secondary);font-weight:600;margin-left:8px}
.sc-group-body{background:var(--white)}
.sc-table-wrap{display:block!important;width:100%!important;max-width:100%;overflow-x:auto;border:0!important;border-top:1px solid var(--border)!important;border-radius:0!important;background:var(--white);margin:0}
.sc-table{width:100%!important;border-collapse:collapse;table-layout:fixed;font-size:13px}
.sc-table th{padding:7px 10px!important;font-size:11px!important;font-weight:700;color:var(--text-secondary);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--plaster);text-transform:uppercase;letter-spacing:.45px}
.sc-table td{padding:8px 10px!important;border-bottom:1px solid #f3f4f6;vertical-align:middle;white-space:nowrap}
.sc-table th:nth-child(1),.sc-table td:nth-child(1){width:40%}
.sc-table th:nth-child(2),.sc-table td:nth-child(2){width:14%;text-align:right}
.sc-table th:nth-child(3),.sc-table td:nth-child(3){width:22%}
.sc-table th:nth-child(4),.sc-table td:nth-child(4){width:24%;text-align:right}
.sc-table tr:last-child td{border-bottom:none}
.due-chip{display:inline-block;min-width:28px;text-align:center;background:#fee2e2;color:#991b1b;border-radius:999px;padding:2px 8px;font-weight:800}
@media(max-width:820px){.sc-accordion{width:100%}}

/* Section Shell */
.section-shell{position:relative;background:var(--white);border:1px solid #d8dde6;border-left:6px solid var(--lawn);border-radius:16px;overflow:hidden;margin-bottom:28px;box-shadow:0 8px 22px rgba(35,47,70,.07)}
.section-shell-header{padding:18px 22px 16px;border-bottom:1px solid #dfe4ec;background:#ffffff}
.section-shell-title{font-size:13px;font-weight:700;color:var(--dusk);text-transform:uppercase;letter-spacing:.65px;display:flex;align-items:center;gap:8px}
.section-shell-subtitle{margin-top:5px;font-size:12.5px;color:var(--text-secondary);line-height:1.45;max-width:760px}
.section-shell-body{padding:20px 22px 22px;background:#fff}

/* Section accent colors */
/* "What to know" and "What to do" — navy header treatment, bookends each tab */
.section-shell[data-section*="What to know"],.section-shell[data-section*="What to do"]{border-left:6px solid #232F46!important}
.section-shell[data-section*="What to know"] .section-shell-header,.section-shell[data-section*="What to do"] .section-shell-header{background:#232F46!important;border-bottom:none!important;padding:15px 22px!important}
.section-shell[data-section*="What to know"] .section-shell-title,.section-shell[data-section*="What to do"] .section-shell-title{color:#ffffff!important;letter-spacing:.7px!important;font-size:12px!important}
.section-shell[data-section*="What to know"] .section-shell-title::before,.section-shell[data-section*="What to do"] .section-shell-title::before{display:none!important}
.section-shell[data-section*="What to know"] .section-shell-subtitle,.section-shell[data-section*="What to do"] .section-shell-subtitle{color:rgba(255,255,255,.55)!important;margin-top:4px!important}
.section-shell[data-section="Scorecard performance"]{border-left-color:#974859!important}
.section-shell[data-section="Scorecard performance"] .section-shell-title::before{content:"✓";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#974859;color:white;font-size:12px;font-weight:900}
.section-shell[data-section*="Interview quality"],.section-shell[data-section*="quality"]{border-left-color:#85AFCC!important}
.section-shell[data-section*="Interview quality"] .section-shell-title::before,.section-shell[data-section*="quality"] .section-shell-title::before{content:"◇";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#85AFCC;color:white;font-size:12px;font-weight:900}
.section-shell[data-section*="Interview skill"],.section-shell[data-section*="skill"]{border-left-color:#BA6029!important}
.section-shell[data-section*="Interview skill"] .section-shell-title::before,.section-shell[data-section*="skill"] .section-shell-title::before{content:"◆";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#BA6029;color:white;font-size:10px;font-weight:900}
/* "Recommended" kept for legacy compatibility — new name is "What to do" above */
.section-shell[data-section="Decline summary"]{border-left-color:#974859!important}
.section-shell[data-section="Decline summary"] .section-shell-title::before{content:"↓";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#974859;color:white;font-size:12px;font-weight:900}
.section-shell[data-section="High decline flags"]{border-left-color:#CCA5A3!important}
.section-shell[data-section="High decline flags"] .section-shell-title::before{content:"⚑";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#CCA5A3;color:#5a1f1f;font-size:12px;font-weight:900}
.section-shell[data-section="Declines by interviewer"]{border-left-color:#85AFCC!important}
.section-shell[data-section="Declines by interviewer"] .section-shell-title::before{content:"≡";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#85AFCC;color:white;font-size:12px;font-weight:900}
.section-shell[data-section="Coordination load"]{border-left-color:#BA6029!important}
.section-shell[data-section="Coordination load"] .section-shell-title::before{content:"⟳";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#BA6029;color:white;font-size:12px;font-weight:900}

/* "What to know" items — clean rows, amber left strip only, no nested boxes */
.section-shell[data-section*="What to know"] .callout-card{display:flex!important;flex-direction:column!important;gap:0!important;background:transparent!important;border:none!important;padding:0!important;border-radius:0!important}
.section-shell[data-section*="What to know"] .callout-item{display:flex!important;align-items:center!important;gap:12px!important;background:transparent!important;border:none!important;border-bottom:1px solid #f3f4f6!important;border-radius:0!important;padding:12px 14px!important;font-size:14px!important;font-weight:500!important;line-height:1.5!important;color:#232F46!important;box-shadow:none!important}
.section-shell[data-section*="What to know"] .callout-item:last-child{border-bottom:none!important}
.section-shell[data-section*="What to know"] .callout-item::before{content:"!"!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;width:20px!important;height:20px!important;min-width:20px!important;border-radius:50%!important;background:#F6BF56!important;color:#5a3b00!important;font-weight:800!important;font-size:12px!important;line-height:1!important;position:static!important;flex-shrink:0!important}

/* "What to do" items — clean rows, green left strip only, no nested boxes */
.section-shell[data-section*="What to do"] .recaction-card{background:transparent!important;border:none!important;padding:0!important;border-radius:0!important}
.section-shell[data-section*="What to do"] .recaction-item{display:flex!important;align-items:center!important;background:transparent!important;border:none!important;border-bottom:1px solid #f3f4f6!important;border-radius:0!important;padding:12px 14px!important;margin-bottom:0!important}
.section-shell[data-section*="What to do"] .recaction-item:last-child{border-bottom:none!important}

/* Table styling inside shells */
.section-shell .table-wrap,.section-shell .sc-table-wrap,.section-shell .sla-panel,.section-shell .bh-card{background:#ffffff!important;border:1px solid #d1d9e6!important;border-radius:10px!important;overflow:hidden!important;box-shadow:none!important}
.section-shell table th,.section-shell .data-table th,.section-shell .interviewer-table th,.section-shell .iq-table th,.section-shell .sc-table th{background:#f5f7fa!important;color:#6b7280!important;border-bottom:1px solid #d1d9e6!important}
.section-shell table td,.section-shell .data-table td,.section-shell .interviewer-table td,.section-shell .iq-table td,.section-shell .sc-table td{background:#ffffff!important;border-bottom:1px solid #eef2f7!important}
.section-shell table tbody tr:hover td{background:#f8fafc!important}
.section-shell .sc-group{border:1px solid #d1d9e6!important;border-radius:10px!important;box-shadow:none!important;background:#ffffff!important}
.section-shell .sc-group-btn{background:#ffffff!important}.section-shell .sc-group-btn:hover{background:#f8fafc!important}
.section-shell .sc-group-body{background:#ffffff!important}
.section-shell .sc-table th{background:#f4f6f8!important;padding:8px 12px!important}
.section-shell .sc-table td{padding:9px 12px!important}

/* SLA pills */
.sla-pill.sla-pill-green,.section-shell .sla-pill.sla-pill-green{background:#ADD9B8!important;color:#1f3b2b!important}
.sla-pill.sla-pill-red,.section-shell .sla-pill.sla-pill-red{background:#CCA5A3!important;color:#5a1f1f!important}

<header class="header">

<main class="page">

  <div class="tab-panel" id="tab-engagement"></div>
  <div class="tab-panel" id="tab-metrics"></div>
</main>

<footer class="footer" id="footer"></footer>

<script>
let currentDept = null;
const D = window.PORCH_DATA;

function init() {
  if (!D) { document.body.innerHTML = '<p style="padding:40px;color:red">No data found. Run build.py first.</p>'; return; }
  document.getElementById('hdr-title').textContent = D.meta.title || 'The PORCH Report';
  document.getElementById('hdr-meta').textContent = [D.meta.quarter, D.meta.period].filter(Boolean).join(' · ');
  document.getElementById('footer').textContent = 'Generated ' + D.meta.generated_date + ' · The PORCH Report';

  // Global floating tooltip for BrightHire column headers
  const tt = document.createElement('div');
  tt.id = 'bh-global-tooltip';
  document.body.appendChild(tt);
  document.addEventListener('mouseover', function(e) {
    const icon = e.target.closest('.bh-tip-icon');
    if (!icon) return;
    tt.textContent = icon.dataset.tip || '';
    tt.style.display = 'block';
  });
  document.addEventListener('mousemove', function(e) {
    if (tt.style.display === 'none') return;
    const x = e.clientX, y = e.clientY;
    const pad = 14;
    const tw = 230;
    const left = (x + pad + tw > window.innerWidth) ? x - tw - pad : x + pad;
    const top = Math.min(y - 10, window.innerHeight - 120);
    tt.style.left = left + 'px';
    tt.style.top = top + 'px';
  });
  document.addEventListener('mouseout', function(e) {
    if (!e.target.closest('.bh-tip-icon')) return;
    tt.style.display = 'none';
  });

  const sel = document.getElementById('dept-select');
  sel.innerHTML = '';
  (D.departments || []).forEach(dept => {
    const o = document.createElement('option');
    o.value = o.textContent = dept;
    sel.appendChild(o);
  });
  if (D.departments && D.departments.length) selectDept(D.departments[0]);
}

function selectDept(dept) {
  currentDept = dept;
  document.getElementById('dept-select').value = dept;
  const data = (D.data || {})[dept] || {};
  renderOverview(data);
  renderEngagement(data);
  renderMetrics(data);
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + id);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
}

function switchToTab(id) {
  const btn = [...document.querySelectorAll('.tab-btn')].find(b =>
    b.textContent.toLowerCase().includes(id === 'metrics' ? 'metrics' : 'engagement')
  );
  showTab(id, btn);
}

function fmt(n) { return (n === null || n === undefined || n === '') ? '—' : Number(n).toLocaleString(); }

function empty(msg) {
  return '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">—</div><p>' + (msg || 'No data for this department.') + '</p></div>';
}

function scoreChip(val) {
  if (val === null || val === undefined || val === '') return '<span class="score-chip score-null">—</span>';
  const n = Number(val);
  let cls = 'score-low';
  if (n === 100) cls = 'score-100';
  else if (n >= 80) cls = 'score-high';
  else if (n >= 60) cls = 'score-mid';
  else if (n === 0) cls = 'score-zero';
  return '<span class="score-chip ' + cls + '">' + n + '</span>';
}

function iqChip(v) { return scoreChip(v); }

function reasonTag(reason) {
  const r = (reason || '').toLowerCase();
  let cls = '';
  if (r.includes('office')) cls = 'ooo';
  else if (r.includes('too many')) cls = 'too-many';
  else if (r.includes('conflict')) cls = 'conflict';
  return '<span class="reason-tag ' + cls + '">' + (reason || 'Other') + '</span>';
}

function sectionShell(title, body, subtitle) {
  return '<section class="section-shell" data-section="' + title + '">' +
    '<div class="section-shell-header">' +
    '<div class="section-shell-title">' + title + '</div>' +
    (subtitle ? '<div class="section-shell-subtitle">' + subtitle + '</div>' : '') +
    '</div>' +
    '<div class="section-shell-body">' + body + '</div>' +
    '</section>';
}

function obsActHtml(obs, rec) {
  obs = obs || []; rec = rec || [];
  return '<div class="two-col">' +
    '<div class="section-card"><div class="section-title">Observations</div>' +
    (obs.length ? '<ul class="obs-list obs">' + obs.map(o => '<li>' + o + '</li>').join('') + '</ul>' : empty('No observations.')) +
    '</div>' +
    '<div class="section-card"><div class="section-title">Recommended actions</div>' +
    (rec.length ? '<ul class="obs-list rec">' + rec.map(r => '<li>' + r + '</li>').join('') + '</ul>' : empty('No recommendations.')) +
    '</div></div>';
}

function engagementInsights(sc, bh) {
  sc = sc || {}; bh = bh || [];
  const obs = [], rec = [];
  const people = sc.all_people || [];
  const stillDue = people.reduce((s, p) => s + (p.still_due || 0), 0);
  if (stillDue > 0) {
    obs.push(stillDue + ' scorecards are still outstanding.');
    rec.push('Follow up with interviewers who have open scorecards before new loops are added.');
  }
  const lowAgenda = bh.filter(r => (r.agenda !== null && r.agenda !== undefined ? r.agenda : 100) < 50);
  if (lowAgenda.length) {
    obs.push(lowAgenda.length + ' BrightHire-tracked interviewer' + (lowAgenda.length !== 1 ? 's' : '') + ' scored below 50 on agenda-setting.');
    rec.push('Use BrightHire clips to coach interviewers on setting a clear agenda in the first 10 minutes.');
  }
  return { obs, rec };
}

function metricsInsights(data) {
  data = data || {};
  const obs = [], rec = [];
  const s     = data.stats || {};
  const all   = data.all_interviewers || [];
  const coord = data.coordination || {};

  // Overall decline rate
  const dr = s.decline_rate_pct || 0;
  if (dr >= 20) {
    obs.push('Overall decline rate is ' + dr + '% — above the 20% concern threshold.');
    rec.push('Investigate the root causes behind the elevated decline rate and consider redistributing load among high-decline interviewers.');
  } else if (dr >= 12) {
    obs.push('Decline rate is ' + dr + '% — approaching levels that could slow candidate throughput.');
  }

  // High individual decliners
  const high = all.filter(i => i.declines >= 3 && i.declines / ((i.completed || 0) + i.declines) > 0.3);
  if (high.length) {
    const names = high.slice(0, 3).map(i => i.name.split(' ')[0]).join(', ');
    obs.push(high.length + ' interviewer' + (high.length !== 1 ? 's' : '') + ' had 3+ declines and a rate above 30%' + (high.length <= 3 ? ' (' + names + ')' : '') + '.');
    rec.push('Review scheduling patterns for high-decline interviewers — consider temporary load reduction or calendar sync check.');
  }

  // Top decline reason
  const reasons = data.decline_reasons || [];
  const top = reasons[0];
  if (top && top.pct >= 35) {
    obs.push('"' + top.reason + '" is the top decline reason at ' + top.pct + '% of all declines this period.');
    const rl = top.reason.toLowerCase();
    if (rl.includes('conflict')) {
      rec.push('Address calendar conflicts proactively — review loop scheduling density and ensure interviewers have visibility on upcoming loops before accepting.');
    } else if (rl.includes('ooo') || rl.includes('out of office') || rl.includes('vacation') || rl.includes('away')) {
      rec.push('Flag upcoming OOO periods earlier in the scheduling workflow to avoid disrupting loops close to interview day.');
    } else if (rl.includes('time') || rl.includes('reschedule') || rl.includes('declined')) {
      rec.push('Work with interviewers to surface availability issues earlier — consider a standing loop calendar or opt-in availability block.');
    }
  }

  // Avg lead time
  const avgLT = data.avg_lead_time_hrs;
  if (avgLT !== null && avgLT !== undefined && avgLT < 24) {
    obs.push('Average decline lead time is only ' + avgLT + ' hrs — interviewers are declining with less than 24 hours notice on average.');
    rec.push('Set an expectation that declines must be submitted at least 48 hours in advance. Flag repeat short-notice decliners for manager follow-up.');
  }

  // Coordination: reschedule rate
  const rescPct = coord.reschedule_pct || 0;
  const fac = coord.facilitated || 0;
  const can = coord.canceled || 0;
  if (rescPct >= 20) {
    obs.push(rescPct + '% of facilitated interviews required rescheduling — above the 20% threshold.');
    rec.push('Audit reschedule reasons — if interviewer-driven, address availability norms; if candidate-driven, review whether scheduling lead times are sufficient.');
  }
  if (fac > 0 && can > 0 && (can / fac) > 0.15) {
    obs.push(can + ' interviews were canceled outright (' + Math.round(can / fac * 100) + '% of facilitated) — a signal worth investigating.');
  }

  return { obs, rec };
}

function toggleGroup(btn) {
  const body = btn.parentElement.querySelector('.sc-group-body');
  const arrow = btn.querySelector('.sc-arrow');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  arrow.textContent = open ? '▸' : '▾';
}

function showSkillsRole(groupId, roleId) {
  const group = document.getElementById(groupId);
  if (!group) return;
  group.querySelectorAll('.bh-role-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.role === roleId);
  });
  group.querySelectorAll('.bh-role-panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === roleId);
  });
}

// ════════════════════════════════════════════════════════════════
// SUMMARY TAB
// ════════════════════════════════════════════════════════════════
function renderOverview(data) {
  const s   = data.stats || {};
  const sc  = data.scorecards || {};
  const bh  = data.bh_quality || [];
  const all = data.all_interviewers || [];

  // ── Derived numbers ─────────────────────────────────────────
  const allPeople  = sc.all_people || [];
  const withSub    = allPeople.filter(p => p.avg_hrs > 0);
  const withinSla  = withSub.filter(p => p.avg_hrs <= 48);
  const breaching  = withSub.filter(p => p.avg_hrs > 48);
  const slaPct     = withSub.length ? Math.round(withinSla.length / withSub.length * 100) : null;
  const stillDue   = allPeople.reduce((sum, p) => sum + (p.still_due || 0), 0);
  const declineRate = s.decline_rate_pct || 0;
  const decliners  = all.filter(i => i.declines > 0);
  const avgLoad    = s.avg_intw_per_week;

  // BrightHire lookup by name
  const bhMap = {};
  bh.forEach(r => { bhMap[r.name] = r; });

  // ── 1. Top-line stat cards ───────────────────────────────────
  let html = '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">' +
    '<div class="stat-card"><div class="stat-label">Interviews completed</div>' +
    '<div class="stat-value">' + fmt(s.total_completed) + '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary)">' + fmt(s.active_interviewers) + ' active interviewers · ' + (D.meta.quarter || '') + '</div></div>' +

    '<div class="stat-card' + (declineRate > 20 ? ' kpi-alert' : '') + '"><div class="stat-label">Decline rate</div>' +
    '<div class="stat-value">' + declineRate + '%</div>' +
    '<div style="font-size:12px;color:var(--text-secondary)">' + fmt(s.total_declines) + ' declines · ' + decliners.length + ' interviewer' + (decliners.length !== 1 ? 's' : '') + '</div></div>' +

    '<div class="stat-card' + ((slaPct !== null && slaPct < 50) ? ' kpi-alert' : '') + '"><div class="stat-label">Scorecard SLA</div>' +
    '<div class="stat-value">' + (slaPct !== null ? slaPct + '%' : '—') + '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary)">' + (slaPct !== null ? withinSla.length + ' of ' + withSub.length + ' panelists within 48 hrs' : 'No scorecard data') + '</div></div>' +

    '<div class="stat-card"><div class="stat-label">Avg. interview load</div>' +
    '<div class="stat-value">' + (avgLoad !== null && avgLoad !== undefined ? avgLoad.toFixed(1) : '—') + '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary)">interviews per interviewer / week</div></div>' +
    '</div>';

  // ── 2. Roles this period ────────────────────────────────────
  const openings = data.job_openings || [];
  if (openings.length) {
    const openCount   = openings.filter(o => o.status === 'Open').length;
    const hiredCount  = openings.filter(o => o.status === 'Hired').length;
    const otherCount  = openings.length - openCount - hiredCount;

    const statusBadge = o => {
      if (o.status === 'Open')  return '<span style="display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;background:#dbeafe;color:#1e40af">Open</span>';
      if (o.status === 'Hired') return '<span style="display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;background:#dcfce7;color:#166534">Filled</span>';
      return '<span style="display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;background:#f3f4f6;color:#6b7280">' + o.status + '</span>';
    };

    let rolesBody = '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">' +
      '<span class="sla-pill sla-pill-green">' + openings.length + ' total opening' + (openings.length !== 1 ? 's' : '') + '</span>' +
      (openCount  ? '<span class="sla-pill" style="background:#dbeafe;color:#1e40af">' + openCount + ' still open</span>' : '') +
      (hiredCount ? '<span class="sla-pill sla-pill-green">' + hiredCount + ' filled</span>' : '') +
      (otherCount ? '<span class="sla-pill sla-pill-warn">' + otherCount + ' other</span>' : '') +
      '</div>';

    rolesBody += '<div class="table-wrap" style="margin-bottom:0"><table class="data-table" style="width:100%"><thead><tr>' +
      '<th>Role</th>' +
      '<th>Team / Pillar</th>' +
      '<th>Hiring Manager</th>' +
      '<th>Opened</th>' +
      '<th>Closed</th>' +
      '<th>Status</th>' +
      '<th>Hired</th>' +
      '</tr></thead><tbody>';

    openings.forEach(o => {
      rolesBody += '<tr>' +
        '<td style="font-weight:500">' + o.job + (o.opening_id ? '<span style="font-size:11px;color:#9ca3af;margin-left:6px">' + o.opening_id + '</span>' : '') + '</td>' +
        '<td style="color:var(--text-secondary)">' + (o.team || '—') + '</td>' +
        '<td style="color:var(--text-secondary)">' + (o.hiring_manager || '—') + '</td>' +
        '<td style="color:var(--text-secondary);white-space:nowrap">' + (o.open_date || '—') + '</td>' +
        '<td style="color:var(--text-secondary);white-space:nowrap">' + (o.close_date || '—') + '</td>' +
        '<td>' + statusBadge(o) + '</td>' +
        '<td style="color:var(--text-secondary)">' + (o.hired_candidate || '—') + '</td>' +
        '</tr>';
    });

    rolesBody += '</tbody></table></div>';
    html += sectionShell('Roles this period', rolesBody, 'All Greenhouse openings active during ' + (D.meta.period || 'this period') + '.');
  }

  // ── 3. Quarter at a Glance ───────────────────────────────────
  // Status badge helper
  const badgeHtml = (label, bg) => {
    const fg = bg === '#ADD9B8' ? '#1f3b2b' : bg === '#F6BF56' ? '#5a3b00' : bg === '#CCA5A3' ? '#5a1f1f' : '#6b7280';
    return '<span style="display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;background:' + bg + ';color:' + fg + '">' + label + '</span>';
  };

  // Engagement highlights
  const engHighlights = [];
  if (slaPct !== null) {
    engHighlights.push(slaPct + '% of panelists submitted scorecards within the 48-hr SLA (' + withinSla.length + ' of ' + withSub.length + ').');
  } else {
    engHighlights.push('No scorecard data available for this department.');
  }
  if (stillDue > 0) {
    engHighlights.push(stillDue + ' scorecard' + (stillDue !== 1 ? 's' : '') + ' still outstanding — follow up before new loops are added.');
  } else if (slaPct !== null) {
    engHighlights.push('All submitted scorecards are accounted for — no outstanding items.');
  }
  const engBadge = slaPct === null ? badgeHtml('No data', '#f3f4f6') :
    slaPct >= 75 ? badgeHtml('On track', '#ADD9B8') :
    slaPct >= 50 ? badgeHtml('In progress', '#F6BF56') :
    badgeHtml('Needs attention', '#CCA5A3');

  // Metrics highlights
  const metricsHighlights = [];
  if (s.total_declines > 0) {
    metricsHighlights.push(declineRate + '% decline rate — ' + fmt(s.total_declines) + ' decline' + (s.total_declines !== 1 ? 's' : '') + ' across ' + decliners.length + ' interviewer' + (decliners.length !== 1 ? 's' : '') + '.');
    const topReason = (data.decline_reasons || [])[0];
    if (topReason) metricsHighlights.push('Top decline reason: ' + topReason.reason + ' (' + topReason.pct + '% of declines).');
  } else {
    metricsHighlights.push('No declines recorded this quarter.');
  }
  const metBadge = s.total_declines === 0 ? badgeHtml('On track', '#ADD9B8') :
    declineRate > 25 ? badgeHtml('Needs attention', '#CCA5A3') :
    declineRate > 15 ? badgeHtml('In progress', '#F6BF56') :
    badgeHtml('On track', '#ADD9B8');

  const domainRow = (title, tabId, badge, highlights, last) =>
    '<div style="display:flex;align-items:flex-start;gap:14px;padding:16px 0;' + (last ? '' : 'border-bottom:1px solid var(--border)') + '">' +
    '<div style="flex:1">' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
    '<span style="font-size:13px;font-weight:700;color:var(--dusk)">' + title + '</span>' +
    badge +
    '</div>' +
    '<ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px">' +
    highlights.map(h =>
      '<li style="font-size:13px;color:var(--text-secondary);line-height:1.5;display:flex;gap:7px">' +
      '<span style="color:var(--lawn);font-weight:700;flex-shrink:0">•</span>' + h + '</li>'
    ).join('') +
    '</ul></div>' +
    '<button onclick="switchToTab(\'' + tabId + '\')" style="font-size:12px;color:var(--lawn);font-weight:700;background:none;border:none;cursor:pointer;white-space:nowrap;padding:0;flex-shrink:0;margin-top:2px">Details →</button>' +
    '</div>';

  const qNotes = (data.quarterly_notes || '').trim();
  const qNotesId = 'qnotes-' + (currentDept || 'dept').replace(/\s+/g, '-');

  let qagBody = '<div style="padding:0 2px">' +
    domainRow('Interviewer Engagement', 'engagement', engBadge, engHighlights, false) +
    domainRow('Interview Metrics', 'metrics', metBadge, metricsHighlights, false);

  // Quarterly context — always shown; editable inline (temporary, for live use)
  qagBody += '<div style="padding:16px 0 2px 0">' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
    '<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary)">Quarterly Context</span>' +
    '<span style="font-size:11px;color:#9ca3af;font-style:italic">— edits are temporary; add to config.yaml to persist</span>' +
    '</div>' +
    '<div id="' + qNotesId + '" contenteditable="true" ' +
    'style="font-size:13px;color:' + (qNotes ? 'var(--dusk)' : '#9ca3af') + ';line-height:1.65;white-space:pre-wrap;min-height:48px;padding:10px 12px;border-radius:8px;border:1px dashed #d1d9e6;background:#fafbfc;outline:none;cursor:text" ' +
    'data-placeholder="Click here to add quarterly context — e.g. key hiring themes, org changes, or anything that adds colour to the numbers above." ' +
    'onfocus="if(this.dataset.empty){this.style.color=\'var(--dusk)\';this.textContent=\'\';delete this.dataset.empty}" ' +
    'onblur="if(!this.textContent.trim()){this.style.color=\'#9ca3af\';this.textContent=this.dataset.placeholder;this.dataset.empty=\'1\'}">' +
    (qNotes ? qNotes : '<span style="pointer-events:none">Click here to add quarterly context — e.g. key hiring themes, org changes, or anything that adds colour to the numbers above.</span>') +
    '</div>' +
    '</div>';

  if (!qNotes) {
    // Mark placeholder state so blur handler knows it is empty
    qagBody = qagBody.replace('id="' + qNotesId + '"', 'id="' + qNotesId + '" data-empty="1"');
  }
  qagBody += '</div>';

  html += sectionShell('Quarter at a glance', qagBody, 'Key highlights from each domain — click Details to dig in.');

  // ── 3. Top & Flagged Interviewers ───────────────────────────
  if (all.length) {
    // Composite scoring: volume 40% + inverted decline rate 35% + BH 25%
    // If BH is absent, redistribute weight: volume 53% + inverted decline 47%
    const maxVol = Math.max(...all.map(i => i.completed || 0)) || 1;

    const scored = all.map(i => {
      const vol   = i.completed || 0;
      const total = vol + (i.declines || 0);
      const dr    = total > 0 ? i.declines / total : 0;
      const inv   = 1 - dr;
      const bhRec = bhMap[i.name];
      const bhVal = (bhRec && bhRec.overall !== null && bhRec.overall !== undefined) ? bhRec.overall / 100 : null;
      const score = bhVal !== null
        ? (vol / maxVol) * 0.40 + inv * 0.35 + bhVal * 0.25
        : (vol / maxVol) * 0.53 + inv * 0.47;
      const drPct = total > 0 ? Math.round(dr * 100) : 0;
      return { ...i, _score: score, _dr: drPct, _bh: bhRec ? bhRec.overall : null };
    });

    // Top 5 by composite — quality gate: exclude if DR >25% OR (BH data exists and BH <65)
    // This prevents high-volume interviewers with poor quality from dominating the list
    const tops = scored
      .filter(i => {
        if ((i.completed || 0) < 1) return false;
        if (i._dr > 25) return false;                             // too many declines
        if (i._bh !== null && i._bh < 65) return false;          // poor BH quality
        return true;
      })
      .sort((a, b) => b._score - a._score)
      .slice(0, 5);

    // Flagged: data-driven — high decline rate (>25% AND 3+ declines) OR low BH score (<60)
    // sc.flagged_people = outstanding scorecards — shown as informational tag only, not primary filter
    const scDueMap = {};
    (sc.all_people || []).forEach(p => { if ((p.still_due || 0) > 0) scDueMap[p.name] = p.still_due; });

    const flagged = all.filter(i => {
      const tot   = (i.completed || 0) + (i.declines || 0);
      const drPct = tot > 0 ? Math.round((i.declines / tot) * 100) : 0;
      const bhRec = bhMap[i.name];
      const bhVal = bhRec ? bhRec.overall : null;
      return (drPct > 25 && (i.declines || 0) >= 3) || (bhVal !== null && bhVal < 60);
    }).map(i => {
      const tot   = (i.completed || 0) + (i.declines || 0);
      const drPct = tot > 0 ? Math.round((i.declines / tot) * 100) : 0;
      const bhRec = bhMap[i.name];
      const bhVal = bhRec ? bhRec.overall : null;
      const flags = [];
      if (drPct > 25 && (i.declines || 0) >= 3) flags.push('High decline rate');
      if (bhVal !== null && bhVal < 60)          flags.push('Low BrightHire score');
      if (scDueMap[i.name])                      flags.push(scDueMap[i.name] + ' scorecard' + (scDueMap[i.name] !== 1 ? 's' : '') + ' due');
      return { ...i, _dr: drPct, _bh: bhVal, _flags: flags };
    }).sort((a, b) => {
      const aHighDr = (a._dr > 25 && (a.declines || 0) >= 3) ? 1 : 0;
      const bHighDr = (b._dr > 25 && (b.declines || 0) >= 3) ? 1 : 0;
      if (aHighDr !== bHighDr) return bHighDr - aHighDr;
      return b._dr - a._dr;
    });

    // Render top performers table
    if (tops.length) {
      const topRows = tops.map((i, idx) => {
        const drColor = i._dr > 30 ? '#974859' : i._dr > 15 ? '#BA6029' : 'var(--text-secondary)';
        return '<tr>' +
          '<td style="font-size:12px;color:var(--text-secondary);width:24px">' + (idx + 1) + '</td>' +
          '<td style="font-weight:500">' + i.name + '</td>' +
          '<td style="font-size:12px;color:var(--text-secondary)">' + (i.team || '—').replace('Pillar - ', '') + '</td>' +
          '<td style="text-align:right;font-weight:600">' + fmt(i.completed) + '</td>' +
          '<td style="text-align:right;font-weight:600;color:' + drColor + '">' + i._dr + '%</td>' +
          '<td style="text-align:right">' + (i._bh !== null ? scoreChip(i._bh) : '<span class="score-chip score-null">—</span>') + '</td>' +
          '<td style="text-align:right;font-size:12px;font-weight:700;color:var(--lawn)">' + Math.round(i._score * 100) + '</td>' +
          '</tr>';
      }).join('');

      html += sectionShell('Top interviewers',
        '<div class="table-wrap" style="margin-bottom:0">' +
        '<table class="data-table"><thead><tr>' +
        '<th style="width:24px">#</th><th>Name</th><th>Team</th>' +
        '<th style="text-align:right">Completed</th>' +
        '<th style="text-align:right">Decline Rate</th>' +
        '<th style="text-align:right">BH Score</th>' +
        '<th style="text-align:right">Score</th>' +
        '</tr></thead><tbody>' + topRows + '</tbody></table></div>',
        'Ranked by composite score (volume 40% · decline rate 35% · BrightHire 25%). Only interviewers with decline rate ≤25% and BrightHire score ≥65 qualify.'
      );
    }

    // Render flagged interviewers
    if (flagged.length) {
      const flagRows = flagged.map(i =>
        '<tr>' +
        '<td style="font-weight:500">' + i.name + '</td>' +
        '<td style="font-size:12px;color:var(--text-secondary)">' + (i.team || '—').replace('Pillar - ', '') + '</td>' +
        '<td style="text-align:right;font-weight:600">' + fmt(i.completed) + '</td>' +
        '<td style="text-align:right;font-weight:700;color:#974859">' + i._dr + '%</td>' +
        '<td style="text-align:right">' + (i._bh !== null ? scoreChip(i._bh) : '<span class="score-chip score-null">—</span>') + '</td>' +
        '<td>' + i._flags.map(f =>
          '<span style="display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;background:#fee2e2;color:#991b1b;margin-right:4px">' + f + '</span>'
        ).join('') + '</td>' +
        '</tr>'
      ).join('');

      html += sectionShell('Flagged interviewers',
        '<div class="table-wrap" style="margin-bottom:0">' +
        '<table class="data-table"><thead><tr>' +
        '<th>Name</th><th>Team</th>' +
        '<th style="text-align:right">Completed</th>' +
        '<th style="text-align:right">Decline Rate</th>' +
        '<th style="text-align:right">BH Score</th>' +
        '<th>Flags</th>' +
        '</tr></thead><tbody>' + flagRows + '</tbody></table></div>',
        'Interviewers with decline rate >25% (3+ declines), BrightHire score <60, or outstanding scorecard flags.'
      );
    } else if (tops.length) {
      html += sectionShell('Flagged interviewers',
        '<div class="empty-state"><div style="font-size:32px;margin-bottom:10px">✓</div><p>No flagged interviewers this quarter.</p></div>',
        'Interviewers with high decline rates, low BrightHire scores, or outstanding scorecard flags.'
      );
    }
  }

  html += '<div class="timestamp">Generated ' + D.meta.generated_date + ' · Source: ModernLoop + BrightHire + Greenhouse</div>';
  document.getElementById('tab-overview').innerHTML = html;
}

// ════════════════════════════════════════════════════════════════
// INTERVIEWER ENGAGEMENT TAB
// ════════════════════════════════════════════════════════════════
function renderEngagement(data) {
  const sc = data.scorecards || {};
  const allPeople = (sc.all_people || []).slice().sort((a, b) => a.name.localeCompare(b.name));
  const bh = (data.bh_quality || []).slice().sort((a, b) => a.name.localeCompare(b.name));

  if (!allPeople.length && !bh.length) {
    document.getElementById('tab-engagement').innerHTML = empty();
    return;
  }

  const auto = engagementInsights(sc, bh);
  const eObs = [...auto.obs, ...(data.observations    || [])];
  const eRec = [...auto.rec, ...(data.recommendations || [])];
  let html = '';

  // What to know
  {
    let body;
    if (eObs.length) {
      body = '<div class="callout-card">' + eObs.map(o => '<div class="callout-item">' + o + '</div>').join('') + '</div>' +
        '<div style="margin-top:16px;font-size:12px;color:#9ca3af;text-align:right;font-style:italic">See recommended actions below ↓</div>';
    } else {
      body = '<div class="callout-card">' +
        '<div class="callout-item" style="color:var(--text-secondary);font-style:italic">✓ No significant engagement issues flagged for this department this period.</div>' +
        '</div>';
    }
    html += sectionShell('What to know', body, 'Key items a leader should be aware of this quarter.');
  }

  // Scorecard performance
  if (allPeople.length) {
    const excellent = allPeople.filter(p => p.avg_hrs > 0 && p.avg_hrs <= 48);
    const breaching = allPeople.filter(p => p.avg_hrs > 48 || p.still_due > 0);
    const withSub = allPeople.filter(p => p.avg_hrs > 0);
    const slaPct = withSub.length ? Math.round(excellent.length / withSub.length * 100) : null;
    const outstanding = allPeople.reduce((s, p) => s + (p.still_due || 0), 0);

    let body = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">' +
      '<span class="sla-pill sla-pill-green">≤48 hrs · ' + (slaPct !== null ? slaPct : '—') + '% within SLA</span>' +
      '<span class="sla-pill sla-pill-red">≥48 hrs · ' + (slaPct !== null ? 100 - slaPct : '—') + '% breaching</span>' +
      (outstanding ? '<span class="sla-pill sla-pill-warn">⚠ ' + outstanding + ' scorecard' + (outstanding !== 1 ? 's' : '') + ' still outstanding</span>' : '') +
      '</div>';

    const groups = [
      { label: 'Breaching SLA (≥48 hrs)', people: breaching, open: true },
      { label: 'Within SLA (≤48 hrs)', people: excellent, open: false }
    ].filter(g => g.people.length);

    body += '<div class="sc-accordion">';
    groups.forEach(g => {
      body += '<div class="sc-group">' +
        '<button class="sc-group-btn" onclick="toggleGroup(this)">' +
        '<span>' + g.label + '<span class="sc-group-count">' + g.people.length + ' panelists</span></span>' +
        '<span class="sc-arrow">' + (g.open ? '▾' : '▸') + '</span>' +
        '</button>' +
        '<div class="sc-group-body" style="display:' + (g.open ? 'block' : 'none') + '">' +
        '<div class="sc-table-wrap">' +
        '<table class="sc-table"><thead><tr>' +
        '<th>Interviewer</th>' +
        '<th style="text-align:right">Submitted</th>' +
        '<th>Avg. time</th>' +
        '<th style="text-align:right">Outstanding</th>' +
        '</tr></thead><tbody>';
      g.people.forEach(p => {
        const t = p.avg_hrs ? (p.avg_hrs < 24 ? p.avg_hrs.toFixed(1) + ' hrs' : (p.avg_hrs / 24).toFixed(1) + ' days') : '—';
        body += '<tr>' +
          '<td>' + p.name + '</td>' +
          '<td style="text-align:right">' + p.submitted + '</td>' +
          '<td>' + t + '</td>' +
          '<td style="text-align:right">' + (p.still_due ? '<span class="due-chip">' + p.still_due + '</span>' : '—') + '</td>' +
          '</tr>';
      });
      body += '</tbody></table></div></div></div>';
    });
    body += '</div>';
    html += sectionShell('Scorecard performance', body, 'Tracks submitted scorecards, SLA adherence, and outstanding follow-ups.');
  }

  // BrightHire quality table
  if (bh.length) {
    const bhTips = {
      on_time: 'On-time start: % of interviews that started within 2 minutes of the scheduled time. Chronic lateness signals poor candidate experience.',
      talk_ratio: 'Talk ratio: % of talk time belonging to the interviewer. Best practice is 30–50% — interviewers should listen more than they speak.',
      monologue: 'Monologue rate: % of interviews with an interviewer monologue >2 min. Long uninterrupted talking crowds out candidate responses.',
      eeoc: 'EEOC compliance: % of interviews with no legally sensitive or prohibited questions detected (e.g. age, family status, religion).',
      q_opp: 'Question opportunity: % of interviews where the candidate was given a clear chance to ask their own questions — a key candidate experience signal.',
      agenda: 'Agenda setting: % of interviews that opened with a stated agenda or purpose, helping candidates know what to expect.',
      fb_time: 'Feedback timeliness: % of scorecards submitted within 24 hours of the interview completing. Fast feedback reduces bias.',
      fb_rate: 'Feedback rate: % of assigned interviews that received a submitted scorecard. Missing scorecards block hiring decisions.',
      overall: 'Overall BrightHire score: composite of all structural quality signals. Scores above 75 are strong; below 60 warrants coaching.'
    };
    const cols = [
      ['on_time', 'On-time'], ['talk_ratio', 'Talk ratio'], ['monologue', 'Monologue'], ['eeoc', 'EEOC'],
      ['q_opp', 'Q. opp'], ['agenda', 'Agenda'], ['fb_time', 'FB time'], ['fb_rate', 'FB rate']
    ];
    const tipIcon = key => '<i class="bh-tip-icon" data-tip="' + (bhTips[key] || '') + '">i</i>';
    let body = '<div class="bh-card">' +
      '<div class="bh-card-header">' +
      '<span class="bh-card-title">Interviewer quality scores</span>' +
      '<span class="bh-card-meta">Scores are % standards met · hover <i class="bh-tip-icon" style="cursor:default;pointer-events:none">i</i> icons for details</span>' +
      '</div>' +
      '<div class="table-wrap" style="border:0;margin:0">' +
      '<table class="iq-table"><thead><tr>' +
      '<th>Interviewer</th><th>Overall' + tipIcon('overall') + '</th>' +
      cols.map(c => '<th>' + c[1] + tipIcon(c[0]) + '</th>').join('') +
      '</tr></thead><tbody>';
    bh.forEach(r => {
      body += '<tr><td>' + r.name + '<span class="iq-count">' + r.count + ' interview' + (r.count !== 1 ? 's' : '') + '</span></td>' +
        '<td>' + iqChip(r.overall) + '</td>' +
        cols.map(c => '<td>' + iqChip(r[c[0]]) + '</td>').join('') +
        '</tr>';
    });
    const avg = key => {
      const vals = bh.map(r => r[key]).filter(v => v !== null && v !== undefined);
      return vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : null;
    };
    body += '<tr style="background:rgba(240,242,245,0.5);font-style:italic;font-size:13px">' +
      '<td style="color:#6b7280">Dept average</td><td>' + iqChip(avg('overall')) + '</td>' +
      cols.map(c => '<td>' + iqChip(avg(c[0])) + '</td>').join('') +
      '</tr></tbody></table></div></div>';
    html += sectionShell('Interview quality · BrightHire', body, 'BrightHire structural quality signals across interviewer conversations.');
  }

  // BrightHire skill coverage
  const skills = data.bh_skills || [];
  if (skills.length) {
    const groupId = 'skills-tab-group';
    let body = '<div class="bh-card" id="' + groupId + '">' +
      '<div class="bh-card-header">' +
      '<span class="bh-card-title">JD skill coverage across interviews</span>' +
      '<div class="bh-role-tabs">';
    skills.forEach((role, idx) => {
      const roleId = 'sk-' + role.role.replace(/[^a-zA-Z0-9]/g, '-');
      body += '<button class="bh-role-tab' + (idx === 0 ? ' active' : '') + '" data-role="' + roleId + '" onclick="showSkillsRole(\'' + groupId + '\',\'' + roleId + '\')">' + role.role + '</button>';
    });
    body += '</div></div>';
    skills.forEach((role, idx) => {
      const roleId = 'sk-' + role.role.replace(/[^a-zA-Z0-9]/g, '-');
      const covered = role.skills.filter(s => s.pct >= 80);
      const gaps = role.skills.filter(s => s.pct < 80);
      body += '<div class="bh-role-panel' + (idx === 0 ? ' active' : '') + '" id="' + roleId + '">' +
        '<div class="bh-card-desc">These are skills listed in the ' + role.role + ' job description. Each bar shows the percentage of interviews where that skill was assessed.</div>' +
        '<div class="bh-role-meta">' + role.role + ' · ' + role.num_candidates + ' candidate' + (role.num_candidates !== 1 ? 's' : '') + ' · ' + role.total_interviews + ' interview' + (role.total_interviews !== 1 ? 's' : '') + '</div>' +
        '<div class="bh-split">' +
        '<div class="bh-group"><div class="bh-group-head"><div class="bh-group-dot" style="background:var(--lawn)"></div><span class="bh-group-label green">Well covered (≥80%)</span></div>';
      body += covered.length ? covered.map(s =>
        '<div class="bh-row"><span class="bh-skill-label" title="' + s.name + '">' + s.name + '</span>' +
        '<div class="bh-track"><div class="bh-fill-green" style="width:' + s.pct + '%"></div></div>' +
        '<span class="bh-pct-green">' + s.pct + '%</span></div>'
      ).join('') : '<div style="font-size:13px;color:var(--text-secondary);font-style:italic;padding:8px 0">No skills at ≥80% coverage yet.</div>';
      body += '</div><div class="bh-group"><div class="bh-group-head"><div class="bh-group-dot" style="background:#f59e0b"></div><span class="bh-group-label gap">Coverage gaps (&lt;80%) — coach needed</span></div>';
      body += gaps.length ? gaps.map(s => {
        const fillCls = s.tier === 'amber' ? 'bh-fill-amber' : 'bh-fill-red';
        const pctCls = s.tier === 'amber' ? 'bh-pct-amber' : 'bh-pct-red';
        return '<div class="bh-row"><span class="bh-skill-label" title="' + s.name + '">' + s.name + '</span>' +
          '<div class="bh-track"><div class="' + fillCls + '" style="width:' + Math.max(s.pct, 0.5) + '%"></div></div>' +
          '<span class="' + pctCls + '">' + s.pct + '%</span></div>';
      }).join('') : '<div style="font-size:13px;color:var(--text-secondary);font-style:italic;padding:8px 0">All skills well covered!</div>';
      body += '</div></div></div>';
    });
    body += '</div>';
    html += sectionShell('Interview skill coverage · BrightHire', body, 'Shows whether required JD skills are being consistently assessed across interviews.');
  }

  // What to do
  {
    let body;
    if (eRec.length) {
      body = '<div class="recaction-card">' +
        eRec.map(r => '<div class="recaction-item"><span class="recaction-arrow">→</span>' + r + '</div>').join('') +
        '</div>';
    } else {
      body = '<div class="recaction-card">' +
        '<div class="recaction-item" style="color:var(--text-secondary);font-style:italic">No specific actions identified at this time — engagement looks stable.</div>' +
        '</div>';
    }
    html += sectionShell('What to do', body, 'Suggested next steps based on scorecard and BrightHire signals.');
  }

  html += '<div class="timestamp">Generated ' + D.meta.generated_date + ' · Source: Greenhouse interviewer engagement export · BrightHire interview quality</div>';
  document.getElementById('tab-engagement').innerHTML = html;
}

// ════════════════════════════════════════════════════════════════
// INTERVIEW METRICS TAB
// ════════════════════════════════════════════════════════════════
function renderMetrics(data) {
  const s = data.stats || {};
  const avgLT = data.avg_lead_time_hrs;
  const all = (data.all_interviewers || []).slice().sort((a, b) => (b.declines || 0) - (a.declines || 0));

  if (!s.total_declines && !all.length) {
    document.getElementById('tab-metrics').innerHTML = empty('No decline data for this department.');
    return;
  }

  const decliners = all.filter(i => i.declines > 0);
  const ltDays = avgLT ? (avgLT / 24).toFixed(1) : null;
  let html = '';

  // What to know — auto-generated signals + config observations
  const mAuto = metricsInsights(data);
  const mObs  = [...mAuto.obs,  ...(data.observations    || [])];
  const mRec  = [...mAuto.rec,  ...(data.recommendations || [])];

  let metricsCalloutsBody;
  if (mObs.length) {
    metricsCalloutsBody = '<div class="callout-card">' +
      mObs.map(o => '<div class="callout-item">' + o + '</div>').join('') +
      '</div>' +
      '<div style="margin-top:16px;font-size:12px;color:#9ca3af;text-align:right;font-style:italic">See recommended actions below ↓</div>';
  } else {
    metricsCalloutsBody = '<div class="callout-card">' +
      '<div class="callout-item" style="color:var(--text-secondary);font-style:italic">✓ No significant issues flagged for this department this period.</div>' +
      '</div>';
  }
  html += sectionShell('What to know', metricsCalloutsBody, 'Key items a leader should be aware of this quarter.');

  // Coordination load
  const coord = data.coordination || {};
  const coordFac   = coord.facilitated  || 0;
  const coordRes   = coord.rescheduled  || 0;
  const coordCan   = coord.canceled     || 0;
  const coordChg   = coord.changed      || 0;
  const coordResPct = coord.reschedule_pct || (coordFac ? Math.round(coordRes / coordFac * 100) : 0);
  const coordTimeLost = coordRes * 10;  // 10 min per reschedule
  const coordReasons = coord.reschedule_reasons || [];

  let coordinationBody = '<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:0">' +
    '<div class="kpi"><div class="label">Interviews Facilitated</div>' +
      '<div class="metric-big">' + (coordFac || '—') + '</div>' +
      '<div class="metric-sub">' + (D.meta.period || 'This period') + '</div></div>' +
    '<div class="kpi"><div class="label">Reschedule Events</div>' +
      '<div class="metric-big' + (coordResPct >= 20 ? ' amber' : '') + '">' + (coordRes || '—') + '</div>' +
      '<div class="metric-sub">' + (coordFac ? coordResPct + '% of facilitated interviews' : 'No facilitated data') + '</div></div>' +
    '<div class="kpi"><div class="label">Cancellations</div>' +
      '<div class="metric-big">' + (coordCan || '—') + '</div>' +
      '<div class="metric-sub">Interviews canceled this period</div></div>' +
    '<div class="kpi"><div class="label">Est. Time Lost</div>' +
      '<div class="metric-big">' + (coordRes ? (coordTimeLost >= 60 ? Math.round(coordTimeLost / 60) + 'h ' + (coordTimeLost % 60 ? coordTimeLost % 60 + 'm' : '') : coordTimeLost + ' min') : '—') + '</div>' +
      '<div class="metric-sub">~10 min per reschedule event</div></div>' +
    '</div>';

  // Reschedule reasons breakdown (if data exists)
  if (coordReasons.length) {
    coordinationBody += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">' +
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:12px">Reschedule reasons</div>';
    coordReasons.slice(0, 6).forEach(r => {
      const barCls = r.pct >= 50 ? 'role-rate-fill-amber' : 'role-rate-fill-red';
      coordinationBody += '<div class="role-rate-row">' +
        '<div style="font-size:13px;color:var(--dusk);width:220px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + r.reason + '">' + r.reason + '</div>' +
        '<div class="role-rate-track"><div class="' + barCls + '" style="width:' + r.pct + '%"></div></div>' +
        '<div class="role-rate-pct" style="color:var(--text-secondary)">' + r.pct + '%</div>' +
        '<div style="font-size:12px;color:var(--text-secondary);width:80px;text-align:right">' + r.count + ' event' + (r.count !== 1 ? 's' : '') + '</div>' +
        '</div>';
    });
    coordinationBody += '</div>';
  }

  html += sectionShell('Coordination load', coordinationBody, 'Facilitated interview volume, reschedule events, and coordination overhead.');

  // ── Interviewer Load Balance — Engineering only ──────────────────────────
  const engPanel = data.eng_panel || [];
  if (engPanel.length) {
    const epActive   = engPanel.filter(i => (i.completed || 0) > 0);
    const epUnused   = engPanel.filter(i => (i.completed || 0) === 0);
    const totalDone  = epActive.reduce((s, i) => s + i.completed, 0);
    const avgActive  = epActive.length ? Math.round(totalDone / epActive.length) : 0;
    const medianArr  = epActive.map(i => i.completed).sort((a, b) => a - b);
    const median     = medianArr.length ? medianArr[Math.floor(medianArr.length / 2)] : 0;
    const utilPct    = Math.round(epActive.length / engPanel.length * 100);

    // Pareto: top 20%
    const top20n    = Math.max(1, Math.ceil(epActive.length * 0.2));
    const top20     = epActive.slice().sort((a, b) => b.completed - a.completed).slice(0, top20n);
    const top20done = top20.reduce((s, i) => s + i.completed, 0);
    const top20pct  = totalDone ? Math.round(top20done / totalDone * 100) : 0;

    // Distribution buckets (include 0 at top)
    const dBuckets = [
      { label: '25+',   min: 25, max: Infinity, color: '#ef4444' },
      { label: '15–24', min: 15, max: 24,        color: '#f59e0b' },
      { label: '8–14',  min: 8,  max: 14,        color: '#1B8751' },
      { label: '4–7',   min: 4,  max: 7,         color: '#1B8751' },
      { label: '1–3',   min: 1,  max: 3,         color: '#6ee7b7' },
      { label: '0 (untapped)', min: 0, max: 0,   color: '#d1d5db' },
    ];
    const bucketed = dBuckets.map(b => ({
      label: b.label, color: b.color,
      count: engPanel.filter(i => {
        const c = i.completed || 0;
        return b.min === 0 ? c === 0 : c >= b.min && c <= b.max;
      }).length,
    }));
    const maxBucket = Math.max(...bucketed.map(b => b.count), 1);

    // Top 10 by load
    const top10  = epActive.slice().sort((a, b) => b.completed - a.completed).slice(0, 10);
    const maxTop = top10[0] ? top10[0].completed : 1;

    // Team breakdown
    const teamMap = {};
    engPanel.forEach(i => {
      // Shorten team names: strip "Pillar - " and "Foundational Team - "
      const shortTeam = (i.team || 'Unknown')
        .replace('Pillar - ', '').replace('Foundational Team - ', 'FT: ');
      if (!teamMap[shortTeam]) teamMap[shortTeam] = { total: 0, active: 0, completed: 0 };
      teamMap[shortTeam].total++;
      teamMap[shortTeam].completed += (i.completed || 0);
      if ((i.completed || 0) > 0) teamMap[shortTeam].active++;
    });
    const teamRows = Object.entries(teamMap)
      .sort((a, b) => b[1].completed - a[1].completed);
    const maxTeamCompleted = Math.max(...teamRows.map(t => t[1].completed), 1);

    let lbBody = '';

    // KPI strip
    lbBody += '<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">' +
      '<div class="kpi"><div class="label">Trained panel size</div>' +
        '<div class="metric-big">' + engPanel.length + '</div>' +
        '<div class="metric-sub">Eligible interviewers in Eng</div></div>' +
      '<div class="kpi"><div class="label">Active this period</div>' +
        '<div class="metric-big' + (utilPct < 70 ? ' amber' : '') + '">' + epActive.length + '</div>' +
        '<div class="metric-sub">' + utilPct + '% utilised · ' + epUnused.length + ' untapped</div></div>' +
      '<div class="kpi"><div class="label">Avg load (active)</div>' +
        '<div class="metric-big">' + avgActive + '</div>' +
        '<div class="metric-sub">interviews · median ' + median + '</div></div>' +
      '<div class="kpi"><div class="label">Load concentration</div>' +
        '<div class="metric-big' + (top20pct >= 55 ? ' amber' : '') + '">' + top20pct + '%</div>' +
        '<div class="metric-sub">done by top 20% (' + top20n + ' people)</div></div>' +
      '</div>';

    // Row 1: distribution + top 10
    lbBody += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:28px">';

    // Distribution (top = heaviest)
    lbBody += '<div>' +
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:14px">Completed interviews — distribution across panel</div>';
    bucketed.forEach(b => {
      const barW = Math.round(b.count / maxBucket * 100);
      const labelStyle = b.label.startsWith('0') ? 'color:#9ca3af' : 'color:var(--dusk)';
      lbBody += '<div style="display:grid;grid-template-columns:100px 1fr 36px;align-items:center;gap:10px;margin-bottom:10px">' +
        '<div style="font-size:12px;font-weight:600;text-align:right;' + labelStyle + '">' + b.label + '</div>' +
        '<div style="background:#f3f4f6;border-radius:4px;height:22px;overflow:hidden">' +
          '<div style="height:100%;background:' + b.color + ';width:' + barW + '%;border-radius:4px;transition:width .3s"></div>' +
        '</div>' +
        '<div style="font-size:12px;font-weight:600;' + labelStyle + '">' + b.count + '</div>' +
        '</div>';
    });
    lbBody += '</div>';

    // Top 10
    lbBody += '<div>' +
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:14px">Heaviest contributors — top 10</div>';
    top10.forEach(i => {
      const barW   = Math.round((i.completed / maxTop) * 100);
      const share  = totalDone ? Math.round(i.completed / totalDone * 100) : 0;
      lbBody += '<div style="display:grid;grid-template-columns:130px 1fr 44px;align-items:center;gap:10px;margin-bottom:10px">' +
        '<div style="font-size:12px;font-weight:500;color:var(--dusk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + i.name + '">' + i.name + '</div>' +
        '<div style="background:#f3f4f6;border-radius:4px;height:22px;overflow:hidden">' +
          '<div style="height:100%;background:var(--lawn);width:' + barW + '%;border-radius:4px;transition:width .3s"></div>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--text-secondary);font-weight:600;text-align:right">' + i.completed + '</div>' +
        '</div>';
    });
    lbBody += '</div>';
    lbBody += '</div>'; // end row 1

    // Row 2: team/pillar breakdown table
    lbBody += '<div style="border-top:1px solid var(--border);padding-top:20px">' +
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:14px">Load by team / pillar</div>' +
      '<div class="table-wrap" style="margin-bottom:0"><table class="data-table" style="width:100%"><thead><tr>' +
      '<th>Team / Pillar</th>' +
      '<th style="text-align:right">Panel</th>' +
      '<th style="text-align:right">Active</th>' +
      '<th style="text-align:right">Untapped</th>' +
      '<th style="text-align:right">Utilised</th>' +
      '<th>Interviews</th>' +
      '</tr></thead><tbody>';

    teamRows.forEach(([team, d]) => {
      const util = Math.round(d.active / d.total * 100);
      const barW = Math.round(d.completed / maxTeamCompleted * 100);
      const utilBadge = util < 60
        ? '<span style="color:#d97706;font-weight:700">' + util + '%</span>'
        : '<span style="color:var(--lawn);font-weight:700">' + util + '%</span>';
      lbBody += '<tr>' +
        '<td style="font-weight:500">' + team + '</td>' +
        '<td style="text-align:right">' + d.total + '</td>' +
        '<td style="text-align:right">' + d.active + '</td>' +
        '<td style="text-align:right;color:' + (d.total - d.active > 5 ? '#d97706' : 'var(--text-secondary)') + '">' + (d.total - d.active) + '</td>' +
        '<td style="text-align:right">' + utilBadge + '</td>' +
        '<td><div style="display:flex;align-items:center;gap:8px">' +
          '<div style="background:#f3f4f6;border-radius:3px;height:14px;width:80px;overflow:hidden">' +
            '<div style="height:100%;background:var(--lawn);width:' + barW + '%;border-radius:3px"></div>' +
          '</div>' +
          '<span style="font-size:12px;color:var(--text-secondary)">' + d.completed + '</span>' +
        '</div></td>' +
        '</tr>';
    });

    lbBody += '</tbody></table></div></div>';

    html += sectionShell('Interviewer load balance', lbBody,
      'Full Engineering panel utilisation — ' + engPanel.length + ' trained interviewers, ' + epActive.length + ' active, ' + epUnused.length + ' untapped this period.');
  }

  // Decline summary
  const summaryBody = '<div class="kpi-grid kpi-3" style="margin-bottom:0">' +
    '<div class="kpi"><div class="label">Total interview declines</div><div class="metric-big">' + fmt(s.total_declines) + '</div><div class="metric-sub">' + (D.meta.quarter || 'This quarter') + ' · ' + currentDept + '</div></div>' +
    '<div class="kpi"><div class="label">Interviewers responsible</div><div class="metric-big">' + decliners.length + '</div><div class="metric-sub">' + (decliners.slice(0, 3).map(i => i.name.split(' ')[0]).join(' · ') || '—') + '</div></div>' +
    '<div class="kpi"><div class="label">Avg. decline lead time</div><div class="metric-big">' + (ltDays ? ltDays + 'd' : '—') + '</div><div class="metric-sub">' + (avgLT ? avgLT + ' hrs avg — how far in advance interviewers cancel' : 'No lead time data') + '</div></div>' +
    '</div>';
  html += sectionShell('Decline summary', summaryBody, 'A quick view of decline volume, ownership, and lead time.');

  // High decline flags
  const highDecliners = all.filter(i => {
    const total = (i.completed || 0) + (i.declines || 0);
    return total > 0 && (i.declines / total) > 0.3 && i.declines >= 3;
  });
  if (highDecliners.length) {
    const highBody = '<div class="flag-box" style="margin-bottom:0">' +
      '<div class="flag-header">High decline rate — ' + highDecliners.length + ' interviewer' + (highDecliners.length !== 1 ? 's' : '') + ' flagged</div>' +
      '<div class="flag-body">' + highDecliners.map(i => {
        const total = (i.completed || 0) + (i.declines || 0);
        const dr = Math.round(i.declines / total * 100);
        return i.name + ' — ' + i.declines + ' decline' + (i.declines !== 1 ? 's' : '') + ' out of ' + total + ' scheduled (' + dr + '% decline rate)';
      }).join('<br>') + '</div></div>';
    html += sectionShell('High decline flags', highBody, 'Interviewers with both meaningful volume and elevated decline rates.');
  }

  // Declines by interviewer
  if (decliners.length) {
    const tableBody = '<div class="table-wrap">' +
      '<table class="interviewer-table"><thead><tr>' +
      '<th>Interviewer</th><th>Team</th>' +
      '<th style="text-align:right">Declines</th>' +
      '<th style="text-align:right">Decline rate</th>' +
      '<th style="text-align:right">Completed</th>' +
      '</tr></thead><tbody>' +
      decliners.map(i => {
        const total = (i.completed || 0) + (i.declines || 0);
        const dr = total ? Math.round(i.declines / total * 100) : 0;
        return '<tr>' +
          '<td>' + i.name + '</td>' +
          '<td style="font-size:12px;color:var(--text-secondary)">' + (i.team || '—') + '</td>' +
          '<td style="text-align:right">' + i.declines + '</td>' +
          '<td style="text-align:right">' + dr + '%</td>' +
          '<td style="text-align:right;color:var(--text-secondary)">' + i.completed + '</td>' +
          '</tr>';
      }).join('') +
      '</tbody></table></div>';

    // Decline reasons bar chart — appended inside same section shell
    const reasons = data.decline_reasons || [];
    let reasonsHtml = '';
    if (reasons.length) {
      reasonsHtml = '<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.55px;color:var(--text-secondary);margin-bottom:14px">Decline reasons</div>';
      reasons.forEach(r => {
        const barCls = r.pct >= 50 ? 'role-rate-fill-green' : r.pct >= 25 ? 'role-rate-fill-amber' : 'role-rate-fill-red';
        reasonsHtml += '<div class="role-rate-row">' +
          '<div style="font-size:13px;color:var(--dusk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + r.reason + '</div>' +
          '<div class="role-rate-track"><div class="' + barCls + '" style="width:' + r.pct + '%"></div></div>' +
          '<div class="role-rate-pct" style="font-size:13px;font-weight:600;min-width:48px">' + r.pct + '%</div>' +
          '<div style="font-size:12px;color:var(--text-secondary);white-space:nowrap">' + r.count + ' decline' + (r.count !== 1 ? 's' : '') + '</div>' +
          '</div>';
      });
      reasonsHtml += '</div>';
    }

    html += sectionShell('Declines by interviewer', tableBody + reasonsHtml, 'Breaks down decline volume and rate by individual interviewer.');
  }

  // What to do — auto-generated + config recommendations
  let metricsRecommendationsBody;
  if (mRec.length) {
    metricsRecommendationsBody = '<div class="recaction-card">' +
      mRec.map(r => '<div class="recaction-item"><span class="recaction-arrow">→</span>' + r + '</div>').join('') +
      '</div>';
  } else {
    metricsRecommendationsBody = '<div class="recaction-card">' +
      '<div class="recaction-item" style="color:var(--text-secondary);font-style:italic">No specific actions identified at this time — metrics look stable.</div>' +
      '</div>';
  }
  html += sectionShell('What to do', metricsRecommendationsBody, 'Suggested next steps based on interview metrics.');

  html += '<div class="timestamp">Generated ' + D.meta.generated_date + ' · Source: ModernLoop decline + facilitation exports</div>';
  document.getElementById('tab-metrics').innerHTML = html;
}

init();
</script>
</body>
</html>
