<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The InnerView Report</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --lawn:#1B8751;--lawn-light:#d4edda;--dusk:#232F46;--plaster:#F0F2F5;--white:#fff;
  --border:#e1e4e8;--text-secondary:#6b7280;--amber:#f59e0b;--red:#ef4444;--zero:#9ca3af;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--plaster);color:var(--dusk);font-size:14px;line-height:1.5}
.header{background:var(--dusk);color:var(--white);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.header-left{display:flex;align-items:center;gap:12px}.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--lawn)}
.report-title{font-size:17px;font-weight:700;letter-spacing:-.3px}.report-meta{font-size:12px;color:rgba(255,255,255,.55);margin-top:1px}
.dept-selector-wrap{display:flex;align-items:center;gap:10px}.dept-label{font-size:12px;color:rgba(255,255,255,.6)}
.dept-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:var(--white);padding:7px 32px 7px 12px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;appearance:none;min-width:200px}
.dept-select option{background:var(--dusk);color:var(--white)}
.tab-nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:0}
.tab-btn{padding:14px 20px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);border-bottom:2px solid transparent;transition:all .15s}
.tab-btn:hover{color:var(--dusk)}.tab-btn.active{color:var(--lawn);border-bottom-color:var(--lawn);font-weight:600}
.page{padding:28px 32px;max-width:1200px;margin:0 auto}.tab-panel{display:none}.tab-panel.active{display:block}
.stats-grid,.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-bottom:28px}.kpi-3{grid-template-columns:repeat(3,1fr)}.kpi-4{grid-template-columns:repeat(4,1fr)}
.stat-card,.section-card,.kpi,.status-card,.bh-card,.callout-card,.recaction-card,.flag-box,.sla-panel{background:var(--white);border:1px solid var(--border);border-radius:10px}
.stat-card,.kpi{padding:20px}.kpi-alert{border-color:#fecaca;background:#fff7f7}
.stat-value,.metric-big{font-size:28px;font-weight:700;color:var(--dusk);line-height:1;margin-bottom:6px}.metric-big{font-size:32px}
.stat-value.green{color:var(--lawn)}.stat-value.amber{color:#d97706}
.stat-label,.label,.metric-sub{font-size:12px;color:var(--text-secondary);font-weight:500}.label{text-transform:uppercase;letter-spacing:.3px}.metric-sub{margin-top:8px}
.section-card{padding:24px;margin-bottom:20px}.section-title,.section-label{font-size:15px;font-weight:700;color:var(--dusk);margin-bottom:16px}
.section-label{text-transform:uppercase;letter-spacing:.45px;font-size:12px;color:var(--text-secondary)}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);background:var(--white);margin-bottom:22px}
.data-table,.interviewer-table,.iq-table{border-collapse:collapse;font-size:13px}.data-table th,.interviewer-table th,.iq-table th{text-align:left;background:var(--plaster);color:var(--text-secondary);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table td,.interviewer-table td,.iq-table td{border-bottom:1px solid #f3f4f6;vertical-align:middle}.data-table tr:hover td,.interviewer-table tr:hover td,.iq-table tr:hover td{background:#fafafa}
.score-chip,.iq-chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;min-width:40px;text-align:center}
.score-100{background:#d1fae5;color:#065f46}.score-high{background:#dcfce7;color:#166534}.score-mid{background:#fef3c7;color:#92400e}.score-low{background:#fee2e2;color:#991b1b}.score-zero{background:#f3f4f6;color:#6b7280}.score-null{background:#f9fafb;color:#d1d5db}
.reason-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}.reason-pill{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 18px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:120px}.reason-pill .rp-pct{font-size:22px;font-weight:700;color:var(--dusk)}.reason-pill .rp-label{font-size:11px;color:var(--text-secondary);text-align:center}.reason-pill.top{border-color:var(--lawn)}.reason-pill.top .rp-pct{color:var(--lawn)}
.callout{display:flex;align-items:center;gap:16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:16px 20px;margin-bottom:20px}.callout-icon{font-size:28px}.callout-value{font-size:22px;font-weight:700;color:var(--lawn)}.callout-label{font-size:12px;color:var(--text-secondary)}.callout.warn{background:#fffbeb;border-color:#fde68a}.callout.warn .callout-value{color:#d97706}
.reason-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:var(--plaster);color:var(--text-secondary)}.reason-tag.ooo{background:#dbeafe;color:#1d4ed8}.reason-tag.too-many{background:#fee2e2;color:#991b1b}.reason-tag.conflict{background:#fef3c7;color:#92400e}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-secondary)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.status-card{padding:20px;cursor:pointer}.status-card:hover{box-shadow:0 8px 24px rgba(35,47,70,.08);transform:translateY(-1px)}
.status-card-top{display:flex;justify-content:space-between;align-items:center}.status-card h3{font-size:16px}.status-card p{margin:12px 0;color:var(--text-secondary)}
.status-dot{width:12px;height:12px;border-radius:50%}.dot-green{background:var(--lawn)}.dot-amber{background:var(--amber)}.dot-red{background:var(--red)}
.status-badge,.sla-pill{display:inline-block;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;margin-top:10px}.sbadge-green,.sla-pill-green{background:#dcfce7;color:#166534}.sbadge-amber,.sla-pill-warn{background:#fef3c7;color:#92400e}.sbadge-red,.sla-pill-red{background:#fee2e2;color:#991b1b}
.go{font-size:12px;color:var(--lawn);font-weight:700}.divider{height:1px;background:var(--border);margin:28px 0}
.obs-list{list-style:none;display:flex;flex-direction:column;gap:8px}.obs-list li{padding:10px 14px;border-radius:6px;font-size:13px}.obs-list.obs li{background:#f0f9ff;border-left:3px solid #0ea5e9}.obs-list.rec li{background:#f0fdf4;border-left:3px solid var(--lawn)}
.callout-card,.recaction-card{padding:16px 18px;margin-bottom:22px}.callout-item,.recaction-item{padding:9px 0;border-bottom:1px solid #f3f4f6}.callout-item:last-child,.recaction-item:last-child{border-bottom:none}.recaction-arrow{color:var(--lawn);font-weight:800;margin-right:8px}
.sc-group{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;background:white}.sc-group-btn{width:100%;display:flex;justify-content:space-between;padding:12px 14px;border:0;background:#fafafa;font-weight:700;cursor:pointer}.sc-group-count{color:var(--text-secondary);font-weight:500;margin-left:8px}.due-chip{background:#fee2e2;color:#991b1b;border-radius:999px;padding:2px 8px;font-weight:700}
.bh-card{overflow:hidden;margin-bottom:20px}.bh-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}.bh-card-title{font-weight:700}.bh-card-meta{font-size:12px;color:var(--text-secondary)}
.iq-count{display:block;font-size:11px;color:var(--text-secondary)}.tip{border-bottom:1px dotted #999;cursor:help}.tip-popup{position:absolute;z-index:999;background:#111827;color:white;font-size:12px;line-height:1.4;padding:8px 10px;border-radius:8px;width:240px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.bh-tip-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#94a3b8;color:#fff;font-size:9px;font-weight:700;font-style:normal;cursor:help;margin-left:4px;vertical-align:middle;line-height:1;flex-shrink:0}
.bh-tip-icon:hover{background:var(--dusk)}
#bh-global-tooltip{position:fixed;z-index:9999;background:#111827;color:#fff;font-size:12px;line-height:1.5;padding:10px 12px;border-radius:8px;width:230px;box-shadow:0 8px 24px rgba(0,0,0,.28);pointer-events:none;display:none}
.flag-box{padding:16px 18px;background:#fff7ed;border-color:#fed7aa}.flag-header{font-weight:800;color:#9a3412;margin-bottom:8px}.flag-body{font-size:13px;color:#7c2d12}
.role-rate-row{display:grid;grid-template-columns:170px 1fr 52px 100px;align-items:center;gap:10px;margin:10px 0}.role-rate-track{height:18px;border-radius:6px;background:var(--plaster);overflow:hidden}.role-rate-fill-green,.role-rate-fill-amber,.role-rate-fill-red{height:100%;border-radius:6px}.role-rate-fill-green{background:var(--lawn)}.role-rate-fill-amber{background:#fbbf24}.role-rate-fill-red{background:#f87171}.role-rate-pct{text-align:right;font-weight:700}
.timestamp{margin-top:24px;color:var(--text-secondary);font-size:11px}.footer{text-align:center;padding:24px;color:var(--text-secondary);font-size:11px;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:768px){.header{padding:10px 16px;height:auto;gap:12px;flex-direction:column;align-items:flex-start}.tab-nav{padding:0 16px;overflow-x:auto}.page{padding:20px 16px}.two-col,.status-grid,.kpi-3,.kpi-4{grid-template-columns:1fr}.role-rate-row{grid-template-columns:1fr}.role-rate-pct{text-align:left}}
/* BrightHire skill coverage */
.bh-card-desc{padding:14px 18px;font-size:13px;color:var(--text-secondary);line-height:1.6;background:var(--plaster);border-bottom:1px solid var(--border)}
.bh-role-tabs{display:flex;gap:6px;flex-wrap:wrap}
.bh-role-tab{border:1px solid var(--border);background:var(--white);color:var(--text-secondary);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer}
.bh-role-tab.active{background:var(--lawn);border-color:var(--lawn);color:var(--white)}
.bh-role-panel{display:none;padding:0 18px 18px}
.bh-role-panel.active{display:block}
.bh-role-meta{font-size:12px;color:var(--text-secondary);margin:14px 0;font-weight:600}
.bh-split{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.bh-group{border:1px solid var(--border);border-radius:10px;padding:14px;background:var(--white)}
.bh-group-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.bh-group-dot{width:9px;height:9px;border-radius:50%}
.bh-group-label{font-size:12px;font-weight:800;color:var(--text-secondary)}
.bh-group-label.green{color:var(--lawn)}
.bh-group-label.gap{color:#92400e}
.bh-row{display:grid;grid-template-columns:minmax(120px,180px) 1fr 42px;align-items:center;gap:10px;margin:10px 0}
.bh-skill-label{font-size:12px;color:var(--dusk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bh-track{height:16px;border-radius:999px;background:var(--plaster);overflow:hidden}
.bh-fill-green,.bh-fill-amber,.bh-fill-red{height:100%;border-radius:999px}
.bh-fill-green{background:var(--lawn)}.bh-fill-amber{background:#fbbf24}.bh-fill-red{background:#f87171}
.bh-pct-green,.bh-pct-amber,.bh-pct-red{font-size:12px;font-weight:800;text-align:right}
.bh-pct-green{color:var(--lawn)}.bh-pct-amber{color:#92400e}.bh-pct-red{color:#991b1b}
@media(max-width:768px){.bh-split{grid-template-columns:1fr}.bh-row{grid-template-columns:1fr}.bh-pct-green,.bh-pct-amber,.bh-pct-red{text-align:left}}
/* Scorecard accordion table */
:root{--table-th-padding:6px 8px;--table-td-padding:7px 8px}
.data-table,.interviewer-table,.iq-table{width:100%;border-collapse:collapse;table-layout:auto;font-size:13px}
.data-table th,.interviewer-table th,.iq-table th{padding:var(--table-th-padding)!important;font-size:11px!important;font-weight:600;color:var(--text-secondary);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--plaster);text-transform:uppercase;letter-spacing:.4px}
.data-table td,.interviewer-table td,.iq-table td{padding:var(--table-td-padding)!important;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.sc-accordion{width:760px;max-width:100%}
.sc-group{width:100%!important;max-width:100%;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--white);margin-bottom:12px}
.sc-group-btn{width:100%;min-height:52px;display:flex;align-items:center;justify-content:space-between;padding:12px 14px!important;border:0;background:#fafafa;font-size:15px;font-weight:800;cursor:pointer}
.sc-group-count{color:var(--text-secondary);font-weight:600;margin-left:8px}
.sc-group-body{background:var(--white)}
.sc-table-wrap{display:block!important;width:100%!important;max-width:100%;overflow-x:auto;border:0!important;border-top:1px solid var(--border)!important;border-radius:0!important;background:var(--white);margin:0}
.sc-table{width:100%!important;border-collapse:collapse;table-layout:fixed;font-size:13px}
.sc-table th{padding:7px 10px!important;font-size:11px!important;font-weight:700;color:var(--text-secondary);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--plaster);text-transform:uppercase;letter-spacing:.45px}
.sc-table td{padding:8px 10px!important;border-bottom:1px solid #f3f4f6;vertical-align:middle;white-space:nowrap}
.sc-table th:nth-child(1),.sc-table td:nth-child(1){width:40%}
.sc-table th:nth-child(2),.sc-table td:nth-child(2){width:14%;text-align:right}
.sc-table th:nth-child(3),.sc-table td:nth-child(3){width:22%}
.sc-table th:nth-child(4),.sc-table td:nth-child(4){width:24%;text-align:right}
.sc-table tr:last-child td{border-bottom:none}
.due-chip{display:inline-block;min-width:28px;text-align:center;background:#fee2e2;color:#991b1b;border-radius:999px;padding:2px 8px;font-weight:800}
@media(max-width:820px){.sc-accordion{width:100%}}
/* Section Shell */
.section-shell{position:relative;background:var(--white);border:1px solid #d8dde6;border-left:6px solid var(--lawn);border-radius:16px;overflow:hidden;margin-bottom:28px;box-shadow:0 8px 22px rgba(35,47,70,.07)}
.section-shell-header{padding:18px 22px 16px;border-bottom:1px solid #dfe4ec;background:#ffffff}
.section-shell-title{font-size:13px;font-weight:700;color:var(--dusk);text-transform:uppercase;letter-spacing:.65px;display:flex;align-items:center;gap:8px}
.section-shell-subtitle{margin-top:5px;font-size:12.5px;color:var(--text-secondary);line-height:1.45;max-width:760px}
.section-shell-body{padding:20px 22px 22px;background:#fff}
/* Section accent colors */
.bh-key-item{position:relative!important}.bh-key-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;font-size:11px;line-height:1.4;padding:6px 10px;border-radius:6px;white-space:normal;width:220px;z-index:100;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.18)}.bh-key-item:hover .bh-key-tooltip{display:block}
/* "What to know" and "Insights and recommendations" — navy header treatment, bookends each tab */
.section-shell[data-section*="What to know"],.section-shell[data-section*="Insights and recommendations"]{border-left:6px solid #232F46!important}
.section-shell[data-section*="What to know"] .section-shell-header,.section-shell[data-section*="Insights and recommendations"] .section-shell-header{background:#232F46!important;border-bottom:none!important;padding:15px 22px!important}
.section-shell[data-section*="What to know"] .section-shell-title,.section-shell[data-section*="Insights and recommendations"] .section-shell-title{color:#ffffff!important;letter-spacing:.7px!important;font-size:12px!important}
.section-shell[data-section*="What to know"] .section-shell-title::before,.section-shell[data-section*="Insights and recommendations"] .section-shell-title::before{display:none!important}
.section-shell[data-section*="What to know"] .section-shell-subtitle,.section-shell[data-section*="Insights and recommendations"] .section-shell-subtitle{color:rgba(255,255,255,.55)!important;margin-top:4px!important}
.section-shell[data-section="Scorecard performance"]{border-left-color:#974859!important}
.section-shell[data-section="Scorecard performance"] .section-shell-title::before{content:"✓";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#974859;color:white;font-size:12px;font-weight:900}
.section-shell[data-section*="Interview quality"],.section-shell[data-section*="quality"]{border-left-color:#85AFCC!important}
.section-shell[data-section*="Interview quality"] .section-shell-title::before,.section-shell[data-section*="quality"] .section-shell-title::before{content:"◇";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#85AFCC;color:white;font-size:12px;font-weight:900}
.section-shell[data-section*="Interview skill"],.section-shell[data-section*="skill"]{border-left-color:#BA6029!important}
.section-shell[data-section*="Interview skill"] .section-shell-title::before,.section-shell[data-section*="skill"] .section-shell-title::before{content:"◆";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#BA6029;color:white;font-size:10px;font-weight:900}
/* "Recommended" kept for legacy compatibility — new name is "What to do" above */
.section-shell[data-section="Decline summary"]{border-left-color:#974859!important}
.section-shell[data-section="Decline summary"] .section-shell-title::before{content:"↓";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#974859;color:white;font-size:12px;font-weight:900}
.section-shell[data-section="High decline flags"]{border-left-color:#CCA5A3!important}
.section-shell[data-section="High decline flags"] .section-shell-title::before{content:"⚑";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#CCA5A3;color:#5a1f1f;font-size:12px;font-weight:900}
.section-shell[data-section="Decline reasons"]{border-left-color:#85AFCC!important}
.section-shell[data-section="Decline reasons"] .section-shell-title::before{content:"⊘";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#85AFCC;color:white;font-size:12px;font-weight:900}
.section-shell[data-section="Declines by interviewer"]{border-left-color:#85AFCC!important}
.section-shell[data-section="Declines by interviewer"] .section-shell-title::before{content:"≡";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#85AFCC;color:white;font-size:12px;font-weight:900}
.section-shell[data-section="Coordination load"]{border-left-color:#BA6029!important}
.section-shell[data-section="Coordination load"] .section-shell-title::before{content:"⟳";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#BA6029;color:white;font-size:12px;font-weight:900}
/* "What to know" items — clean rows, amber left strip only, no nested boxes */
.section-shell[data-section*="What to know"] .callout-card{display:flex!important;flex-direction:column!important;gap:0!important;background:transparent!important;border:none!important;padding:0!important;border-radius:0!important}
.section-shell[data-section*="What to know"] .callout-item{display:flex!important;align-items:center!important;gap:12px!important;background:transparent!important;border:none!important;border-bottom:1px solid #f3f4f6!important;border-radius:0!important;padding:12px 14px!important;font-size:14px!important;font-weight:500!important;line-height:1.5!important;color:#232F46!important;box-shadow:none!important}
.section-shell[data-section*="What to know"] .callout-item:last-child{border-bottom:none!important}
.section-shell[data-section*="What to know"] .callout-item::before{content:"!"!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;width:20px!important;height:20px!important;min-width:20px!important;border-radius:50%!important;background:#F6BF56!important;color:#5a3b00!important;font-weight:800!important;font-size:12px!important;line-height:1!important;position:static!important;flex-shrink:0!important}
/* "Insights and recommendations" items — clean rows, green left strip only, no nested boxes */
.section-shell[data-section*="Insights and recommendations"] .recaction-card{background:transparent!important;border:none!important;padding:0!important;border-radius:0!important}
.section-shell[data-section*="Insights and recommendations"] .recaction-item{display:flex!important;align-items:center!important;background:transparent!important;border:none!important;border-bottom:1px solid #f3f4f6!important;border-radius:0!important;padding:12px 14px!important;margin-bottom:0!important}
.section-shell[data-section*="Insights and recommendations"] .recaction-item:last-child{border-bottom:none!important}
/* Table styling inside shells */
.section-shell .table-wrap,.section-shell .sc-table-wrap,.section-shell .sla-panel,.section-shell .bh-card{background:#ffffff!important;border:1px solid #d1d9e6!important;border-radius:10px!important;overflow:hidden!important;box-shadow:none!important}
.section-shell table th,.section-shell .data-table th,.section-shell .interviewer-table th,.section-shell .iq-table th,.section-shell .sc-table th{background:#f5f7fa!important;color:#6b7280!important;border-bottom:1px solid #d1d9e6!important}
.section-shell table td,.section-shell .data-table td,.section-shell .interviewer-table td,.section-shell .iq-table td,.section-shell .sc-table td{background:#ffffff!important;border-bottom:1px solid #eef2f7!important}
.section-shell table tbody tr:hover td{background:#f8fafc!important}

<header class="header">
  <div class="header-left">
    <div class="logo-dot"></div>
    <div>
      <div class="report-title" id="hdr-title">The InnerView Report</div>
      <div class="report-meta" id="hdr-meta"></div>
    </div>
  </div>
  <div class="dept-selector-wrap">
    <span class="dept-label">Department</span>
    <select class="dept-select" id="dept-select" onchange="selectDept(this.value)"><option>Loading…</option></select>
  </div>
</header>
<nav class="tab-nav">
  <button class="tab-btn active" onclick="showTab('overview',this)">Summary</button>
  <button class="tab-btn" onclick="showTab('engagement',this)">Interviewer Engagement</button>
  <button class="tab-btn" onclick="showTab('metrics',this)">Interview Metrics</button>
</nav>
<main class="page">
  <div class="tab-panel active" id="tab-overview"></div>
  <div class="tab-panel" id="tab-engagement"></div>
  <div class="tab-panel" id="tab-metrics"></div>
</main>
<footer class="footer" id="footer"></footer>
<script>
let currentDept = null;
const D = window.PORCH_DATA;
function init() {
  if (!D) { document.body.innerHTML = '<p style="padding:40px;color:red">No data found. Run build.py first.</p>'; return; }
  document.getElementById('hdr-title').textContent = D.meta.title || 'The InnerView Report';
  document.getElementById('hdr-meta').textContent = [D.meta.quarter, D.meta.period].filter(Boolean).join(' · ');
  document.getElementById('footer').textContent = 'Generated ' + D.meta.generated_date + ' · The InnerView Report';
  // Global floating tooltip for BrightHire column headers
  const tt = document.createElement('div');
  tt.id = 'bh-global-tooltip';
  document.body.appendChild(tt);
  document.addEventListener('mouseover', function(e) {
    const icon = e.target.closest('.bh-tip-icon');
    if (!icon) return;
    tt.textContent = icon.dataset.tip || '';
    tt.style.display = 'block';
  });
  document.addEventListener('mousemove', function(e) {
    if (tt.style.display === 'none') return;
    const x = e.clientX, y = e.clientY;
    const pad = 14;
    const tw = 230;
    const left = (x + pad + tw > window.innerWidth) ? x - tw - pad : x + pad;
    const top = Math.min(y - 10, window.innerHeight - 120);
    tt.style.left = left + 'px';
    tt.style.top = top + 'px';
  });
  document.addEventListener('mouseout', function(e) {
    if (!e.target.closest('.bh-tip-icon')) return;
    tt.style.display = 'none';
  });
  const sel = document.getElementById('dept-select');
  sel.innerHTML = '';
  (D.departments || []).forEach(dept => {
    const o = document.createElement('option');
    o.value = o.textContent = dept;
    sel.appendChild(o);
  });
  if (D.departments && D.departments.length) selectDept(D.departments[0]);
}
function selectDept(dept) {
  currentDept = dept;
  document.getElementById('dept-select').value = dept;
  const data = (D.data || {})[dept] || {};
  renderOverview(data);
  renderEngagement(data);
  renderMetrics(data);
}
function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + id);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
}
function switchToTab(id) {
  const btn = [...document.querySelectorAll('.tab-btn')].find(b =>
    b.textContent.toLowerCase().includes(id === 'metrics' ? 'metrics' : 'engagement')
  );
  showTab(id, btn);
}
function fmt(n) { return (n === null || n === undefined || n === '') ? '—' : Number(n).toLocaleString(); }
function empty(msg) {

function scoreChip(val) {
  if (val === null || val === undefined || val === '') return '<span class="score-chip score-null">—</span>';
  const n = Number(val);
  let cls = 'score-low';
  if (n === 100) cls = 'score-100';
  else if (n >= 80) cls = 'score-high';
  else if (n >= 60) cls = 'score-mid';
  else if (n === 0) cls = 'score-zero';
  return '<span class="score-chip ' + cls + '">' + n + '</span>';
}
function iqChip(v) { return scoreChip(v); }
function reasonTag(reason) {
  const r = (reason || '').toLowerCase();
  let cls = '';
  if (r.includes('office')) cls = 'ooo';
  else if (r.includes('too many')) cls = 'too-many';
  else if (r.includes('conflict')) cls = 'conflict';
  return '<span class="reason-tag ' + cls + '">' + (reason || 'Other') + '</span>';
}

function engagementInsights(sc, bh, data) {
  sc = sc || {}; bh = bh || []; data = data || {};
  const obs = [], rec = [];

  // ── Load balance ──────────────────────────────────────────────────────────
  const ep = (data.full_panel || data.eng_panel || []);
  if (ep.length) {
    const act    = ep.filter(i => (i.completed || 0) > 0);
    const unused = ep.length - act.length;
    const done   = act.reduce((s, i) => s + (i.completed || 0), 0);
    const t20n   = Math.max(1, Math.ceil(act.length * 0.2));
    const t20done = act.slice().sort((a, b) => b.completed - a.completed)
      .slice(0, t20n).reduce((s, i) => s + i.completed, 0);
    const t20pct = done ? Math.round(t20done / done * 100) : 0;
    const util   = Math.round(act.length / ep.length * 100);
    if (unused >= 3) {
      obs.push(unused + ' of ' + ep.length + ' panel members were untapped this period — only ' + util + '% of your eligible interviewers participated. There\'s bench capacity that isn\'t being used.');
    }
    if (t20pct >= 45) {
      obs.push('The busiest ' + t20n + ' interviewers carried ' + t20pct + '% of all interviews. That level of concentration is a risk — if any of those people leave or go heads-down, scheduling gets hard fast.');
    }
  }

  // ── Scorecard timeliness ───────────────────────────────────────────────────
  const people = sc.all_people || [];
  const SLA_HRS = 48;
  const withSub = people.filter(p => p.avg_hrs > 0);
  const over48  = withSub.filter(p => p.avg_hrs >= SLA_HRS);
  const slaPct  = withSub.length ? Math.round(over48.length / withSub.length * 100) : null;
  const stillDue = people.reduce((s, p) => s + (p.still_due || 0), 0);
  const stillDuePeople = people.filter(p => (p.still_due || 0) > 0).length;
  if (slaPct !== null && slaPct >= 30) {
    obs.push(over48.length + ' of ' + withSub.length + ' panelists (' + slaPct + '%) submitted scorecards after the 48-hour window. Late scorecards slow down hiring decisions and leave candidates waiting for feedback.');
  }
  if (stillDue > 0) {
    obs.push(stillDue + ' scorecard' + (stillDue !== 1 ? 's' : '') + ' across ' + stillDuePeople + ' interviewer' + (stillDuePeople !== 1 ? 's' : '') + ' were never submitted this period — those interviews have no documented decision on record.');
  }

  // ── BrightHire quality ─────────────────────────────────────────────────────
  const QMETRICS = ['on_time','talk_ratio','monologue','eeoc','q_opp','agenda','fb_time','fb_rate'];
  const flaggedQ = bh.filter(r => (r.count || 0) >= 5 && (r.overall ?? 100) < 80 &&
    QMETRICS.filter(m => r[m] !== null && r[m] !== undefined && r[m] < 80).length >= 3);
  if (flaggedQ.length) {
    obs.push(flaggedQ.length + ' interviewer' + (flaggedQ.length !== 1 ? 's' : '') + ' need coaching — their BrightHire scores show consistent gaps in 3+ quality signals. See the table below for specifics.');
  }

  return { obs, rec };
}

function metricsInsights(data) {
  data = data || {};
  const obs = [], rec = [];
  const s     = data.stats || {};
  const all   = data.all_interviewers || [];
  const coord = data.coordination || {};
  // Overall decline rate
  const dr = s.decline_rate_pct || 0;
  if (dr >= 20) {
    obs.push('Overall decline rate is ' + dr + '% — above the 20% concern threshold.');
    rec.push('The elevated decline rate is concentrated among a few interviewers — load distribution is the usual lever if the root cause turns out to be availability rather than fit.');
  } else if (dr >= 12) {
    obs.push('Decline rate is ' + dr + '% — approaching levels that could slow candidate throughput.');
  }
  // High individual decliners — the per-interviewer flag list now lives on the Engagement
  // tab (load-balance "Decline behavior"), so we don't repeat a count callout here.
  // The scheduling-pattern recommendation still applies as a "what to do" pointer.
  const high = all.filter(i => i.declines >= 3 && i.declines / ((i.completed || 0) + i.declines) > 0.3);
  // Top decline reason — relabel "Other" to "No reason provided" (the export marks declines
  // with no reason entered as "Other") and frame it as a participation signal when it leads.
  const reasons = data.decline_reasons || [];
  const top = reasons.length ? reasons.reduce((a, b) => (b.count || 0) > (a.count || 0) ? b : a, reasons[0]) : null;
  if (top && top.pct >= 35) {
    const rl = top.reason.toLowerCase().trim();
    if (rl === 'other') {
      obs.push('Most declines give coordinators nothing to act on — ' + top.pct + '% come with no reason, alternative time, or replacement, leaving the loop to be rebuilt from scratch.');
    } else {
      obs.push('"' + top.reason + '" is the top decline reason at ' + top.pct + '% of all declines this period.');
    }
  }
  // Avg lead time
  const avgLT = data.avg_lead_time_hrs;
  if (avgLT !== null && avgLT !== undefined && avgLT < 24) {
    obs.push('Average decline lead time is only ' + avgLT + ' hrs — interviewers are declining with less than 24 hours notice on average.');
  }
  // Coordination: reschedule rate
  const rescPct = coord.reschedule_pct || 0;
  const fac = coord.facilitated || 0;
  const can = coord.canceled || 0;
  if (rescPct >= 20) {
    obs.push(rescPct + '% of facilitated interviews required rescheduling — above the 20% threshold.');
  }
  const disr = (coord.rescheduled || 0) + (coord.canceled || 0) + (coord.changed || 0);
  const intvBase = interviewsCompleted(data);
  if (intvBase > 0 && disr > 0) {
    const per3 = (disr / intvBase * 3);
    const ratioWord = per3 >= 2.5 ? 'roughly three changes for every four interviews run'
      : per3 >= 1.8 ? 'roughly two changes for every three interviews run'
      : per3 >= 1.2 ? 'roughly one change for every two interviews run'
      : 'a light change load relative to interviews run';
    obs.push('Coordinators absorbed ' + fmt(disr) + ' schedule disruptions against ' + fmt(intvBase) + ' interviews — ' + ratioWord + '.');
  }
  // Who drives the reschedules — interviewer vs candidate (from reschedule reasons).
  const rReasons = coord.reschedule_reasons || [];
  const resTotal = coord.rescheduled || rReasons.reduce((s, r) => s + (r.count || 0), 0);
  if (resTotal > 0 && rReasons.length) {
    const intw = rReasons.filter(r => /declined|interviewer/i.test(r.reason || '')).reduce((s, r) => s + r.count, 0);
    const intwPct = Math.round(intw / resTotal * 100);
    if (intwPct >= 50) {
      obs.push('Interviewers drove ' + intwPct + '% of reschedules (vs candidates) — the churn is mostly coming from the panel side, not candidates.');
    }
  }
  // Insights & recommendations — three themed takeaways (the boxes above are the evidence,
  // so these stay generalized and story-led): calendar hygiene, coordinator time, candidate
  // experience. Calendar/coordinator always apply where there's decline/coordination signal;
  // the candidate-experience one is gated on coordination data existing.
  const hasDeclineSignal = (data.decline_reasons || []).length > 0 || all.some(i => (i.declines || 0) > 0);
  const hasCoordSignal = (coord.rescheduled || 0) + (coord.canceled || 0) + (coord.changed || 0) > 0;
  if (hasDeclineSignal || hasCoordSignal) {
    rec.push('<strong style="color:#b45309;font-weight:700">Calendar hygiene</strong> — the biggest lever sits with interviewers keeping availability accurate and honoring committed slots. Most reschedules and declines here are avoidable with cleaner upfront calendars.');
    rec.push('<strong style="color:#b45309;font-weight:700">Coordinator time</strong> — a simple expectation when declining (give a reason, suggest a swap or a new time) would turn dead-end declines into something a coordinator can act on, cutting redo work.');
  }
  if (hasCoordSignal) {
    rec.push('<strong style="color:#b45309;font-weight:700">Candidate experience</strong> — candidates absorb churn they didn\u2019t cause; fewer panel changes protect their experience.');
  }
  return { obs, rec };
}

  const gh = (data.all_interviewers || []).reduce((s, i) => s + (i.completed || 0), 0);
  const ml = (data.coordination || {}).facilitated || 0;
  return Math.max(gh, ml);
}

// engagement export. This keeps decline counts consistent everywhere. For Engineering
// this is the panel (226 declines), not the smaller engagement export (196).

  const panel = data.eng_panel || [];

  // ── Headline cards grouped by domain (Engagement / Metrics). Each card leads with the

      '<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary)">' + title + '</span>' +

    '</div>';
  // Engagement cluster

  if (slaPct !== null) {
    engCards.push(glanceCard('Scorecard SLA',

    'by interviewers'));
  if (concPct !== null) {

  // Leading cause of declines — "no reason provided" (the Other bucket). Summary-only.
  {

    if (noReasonS && topS && (topS.reason || '').trim().toLowerCase() === 'other') {
      const nrPct = noReasonS.pct != null ? Math.round(noReasonS.pct) : 0;

  const cardGrid = arr => '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">' + arr.join('') + '</div>';
  let qagBody = '';

    qagBody += groupHeader('Interviewer Engagement', 'engagement') + cardGrid(engCards) + '<div style="height:22px"></div>';
  }

    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-top:14px">' +

    'style="font-size:13px;color:' + (qNotes ? 'var(--dusk)' : '#9ca3af') + ';line-height:1.65;white-space:pre-wrap;min-height:48px;padding:10px 12px;border-radius:8px;border:1px dashed #d1d9e6;background:#fafbfc;outline:none;cursor:text" ' +
    'data-placeholder="Click here to add quarterly context — e.g. key hiring themes, org changes, or anything that adds colour to the numbers above." ' +

    (qNotes ? qNotes : '<span style="pointer-events:none">Click here to add quarterly context — e.g. key hiring themes, org changes, or anything that adds colour to the numbers above.</span>') +

    qagBody = qagBody.replace('id="' + qNotesId + '"', 'id="' + qNotesId + '" data-empty="1"');

  const qagHero = '<div style="text-align:right;flex-shrink:0;padding-left:20px">' +
      '<div style="font-size:30px;font-weight:700;line-height:1;color:var(--dusk)">' + fmt(interviewsCompleted(data)) + '</div>' +
      '<div style="font-size:11px;color:var(--text-secondary);margin-top:3px">interviews completed</div>' +
    '</div>';
  const qagHtml = '<section class="section-shell" data-section="Quarter at a glance">' +
      '<div class="section-shell-header" style="display:flex;justify-content:space-between;align-items:center">' +
        '<div>' +
          '<div class="section-shell-title">Quarter at a glance</div>' +
          '<div class="section-shell-subtitle">Headline numbers from across the report — click Details to see insights.</div>' +
        '</div>' +
        qagHero +
      '</div>' +
      '<div class="section-shell-body">' + qagBody + '</div>' +
    '</section>';
  // ── Assemble Summary: glance card-wall → roles ──
  let html = qagHtml + rolesHtml;
  // ── 3. Top & Flagged Interviewers ───────────────────────────
  if (all.length) {
    // Composite scoring: volume 40% + inverted decline rate 35% + BH 25%
    // If BH is absent, redistribute weight: volume 53% + inverted decline 47%
    const maxVol = Math.max(...all.map(i => i.completed || 0)) || 1;
    const scored = all.map(i => {
      const vol   = i.completed || 0;
      const total = vol + (i.declines || 0);
      const dr    = total > 0 ? i.declines / total : 0;
      const inv   = 1 - dr;
      // Composite = volume + decline rate only (BrightHire no longer factored in).
      const score = (vol / maxVol) * 0.53 + inv * 0.47;
      const drPct = total > 0 ? Math.round(dr * 100) : 0;
      const bhRec = bhMap[i.name];
      return { ...i, _score: score, _dr: drPct, _bh: bhRec ? bhRec.overall : null };
    });
    // Top 5 by composite — quality gate: must have completed >=1 and decline rate <=25%.
    const tops = scored
      .filter(i => {
        if ((i.completed || 0) < 1) return false;
        if (i._dr > 25) return false;   // too many declines
        return true;
      })
      .sort((a, b) => b._score - a._score)
      .slice(0, 5);
    // (Highest activity interviewers relocated to the Engagement tab, under the
    //  decline-behavior evidence in the load balance area.)
  }
  html += '<div class="timestamp">Generated ' + D.meta.generated_date + ' · Source: ModernLoop + BrightHire + Greenhouse</div>';
  document.getElementById('tab-overview').innerHTML = html;
}
// Highest activity interviewers (ICs only) — self-contained section, rendered under
// the decline-behavior evidence on the Engagement tab as the positive counterpart.
function highestActivitySection(data) {
  const all = data.all_interviewers || [];
  if (!all.length) return '';
  const maxVol = Math.max(...all.map(i => i.completed || 0)) || 1;
  const scored = all.map(i => {
    const vol = i.completed || 0;
    const total = vol + (i.declines || 0);
    const dr = total > 0 ? i.declines / total : 0;
    const score = (vol / maxVol) * 0.53 + (1 - dr) * 0.47;
    return { ...i, _score: score, _dr: total > 0 ? Math.round(dr * 100) : 0 };
  });
  const isMgr = i => (i.level || '').toUpperCase().startsWith('M');
  const icTops = scored
    .filter(i => (i.completed || 0) >= 1 && i._dr <= 25 && !isMgr(i))
    .sort((a, b) => b._score - a._score)
    .slice(0, 5);
  if (!icTops.length) return '';
  const rows = icTops.map((i, idx) => {
    const drColor = i._dr > 30 ? '#974859' : i._dr > 15 ? '#BA6029' : 'var(--text-secondary)';
    return '<tr>' +
      '<td style="font-size:12px;color:var(--text-secondary);width:24px">' + (idx + 1) + '</td>' +
      '<td style="font-weight:500">' + i.name + '</td>' +
      '<td style="font-size:12px;color:var(--text-secondary);width:42px">' + (i.level || '—') + '</td>' +
      '<td style="font-size:12px;color:var(--text-secondary)">' + (i.team || '—').replace('Pillar - ', '') + '</td>' +
      '<td style="text-align:right;color:var(--text-secondary)">' + fmt((i.completed || 0) + (i.declines || 0)) + '</td>' +
      '<td style="text-align:right;font-weight:600">' + fmt(i.completed) + '</td>' +
      '<td style="text-align:right;font-weight:600;color:' + drColor + '">' + i._dr + '%</td>' +
      '</tr>';
  }).join('');
  const body = '<div class="table-wrap" style="margin-bottom:0">' +
    '<table class="data-table"><thead><tr>' +
    '<th style="width:24px">#</th><th>Name</th><th>Level</th><th>Team</th>' +
    '<th style="text-align:right">Assigned</th>' +
    '<th style="text-align:right">Completed</th>' +
    '<th style="text-align:right">Decline Rate</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  return sectionShell('Highest activity interviewers', body,
    'Individual contributors ranked by activity — interview volume balanced against decline rate (25% or less to qualify). Managers are excluded — they carry high volume by default.');
}
// Interviewer load balance — returns section HTML (Engineering only; '' otherwise).
function loadBalanceSection(data) {
  // Use full_panel (all dept members, incl. untapped) → eng_panel → all_interviewers
  const hasFullPanel = (data.full_panel || data.eng_panel || []).length > 0;
  const engPanel = (data.full_panel || data.eng_panel || []).length > 0
    ? (data.full_panel || data.eng_panel)
    : (data.all_interviewers || []);
  const hasUntapped = (data.full_panel || data.eng_panel || []).length > 0;
  if (!engPanel.length) return '';
    const epActive   = engPanel.filter(i => (i.completed || 0) > 0);
    const epUnused   = engPanel.filter(i => (i.completed || 0) === 0);
    const totalDone  = epActive.reduce((s, i) => s + i.completed, 0);
    const avgActive  = epActive.length ? Math.round(totalDone / epActive.length) : 0;
    // Declines from the canonical engagement source (matches Summary/Metrics: 196, not panel's 226).
    const declinesReceived = totalDeclines(data);
    const medianArr  = epActive.map(i => i.completed).sort((a, b) => a - b);
    const median     = medianArr.length ? medianArr[Math.floor(medianArr.length / 2)] : 0;
    const utilPct    = Math.round(epActive.length / engPanel.length * 100);
    // Pareto: top 20%
    const top20n    = Math.max(1, Math.ceil(epActive.length * 0.2));
    const top20     = epActive.slice().sort((a, b) => b.completed - a.completed).slice(0, top20n);
    const top20done = top20.reduce((s, i) => s + i.completed, 0);
    const top20pct  = totalDone ? Math.round(top20done / totalDone * 100) : 0;
    // Distribution buckets (include 0 at top)
    const dBuckets = [
      { label: '25+',   min: 25, max: Infinity, color: '#ef4444' },
      { label: '15–24', min: 15, max: 24,        color: '#f59e0b' },
      { label: '8–14',  min: 8,  max: 14,        color: '#1B8751' },
      { label: '4–7',   min: 4,  max: 7,         color: '#1B8751' },
      { label: '1–3',   min: 1,  max: 3,         color: '#6ee7b7' },
      { label: '0 (untapped)', min: 0, max: 0,   color: '#d1d5db' },
    ];
    const bucketed = dBuckets.map(b => ({
      label: b.label, color: b.color,
      count: engPanel.filter(i => {
        const c = i.completed || 0;
        return b.min === 0 ? c === 0 : c >= b.min && c <= b.max;
      }).length,
    }));
    const maxBucket = Math.max(...bucketed.map(b => b.count), 1);
    // Top 10 by load
    const top10  = epActive.slice().sort((a, b) => b.completed - a.completed).slice(0, 10);
    const maxTop = top10[0] ? top10[0].completed : 1;
    // Team breakdown
    const teamMap = {};
    engPanel.forEach(i => {
      // Shorten team names: strip "Pillar - " and "Foundational Team - "
      const shortTeam = (i.team || 'Unknown')
        .replace('Pillar - ', '').replace('Foundational Team - ', 'FT: ');
      if (!teamMap[shortTeam]) teamMap[shortTeam] = { total: 0, active: 0, completed: 0 };
      teamMap[shortTeam].total++;
      teamMap[shortTeam].completed += (i.completed || 0);
      if ((i.completed || 0) > 0) teamMap[shortTeam].active++;
    });
    const teamRows = Object.entries(teamMap)
      .sort((a, b) => b[1].completed - a[1].completed);
    const maxTeamCompleted = Math.max(...teamRows.map(t => t[1].completed), 1);
    let lbBody = '';
    // Concentration benchmark: top 20% carrying <40% of load is healthy for a
    // small-company panel; 40-50% moderately high; >50% high (key-person risk).
    let concTone = '', concNote = '', concDot = '';
    concTone = top20pct > 50 ? 'amber' : '';
    concDot  = '';
    concNote = 'of all interviews this period';
    // KPI strip
    lbBody += '<div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px">' +
      '<div class="kpi"><div class="label">Dept panel size</div>' +
        '<div class="metric-big">' + engPanel.length + '</div>' +
        '<div class="metric-sub"><span' + (utilPct < 75 ? ' style="color:#d97706;font-weight:700"' : '') + '>' + epUnused.length + ' untapped</span> · <span' + (utilPct < 75 ? ' style="color:#d97706;font-weight:700"' : '') + '>' + utilPct + '% utilised</span></div></div>' +
      '<div class="kpi"><div class="label">Load concentration</div>' +
        '<div style="display:flex;align-items:baseline;gap:6px;margin:2px 0 8px">' +
          '<span class="metric-big' + (concTone ? ' ' + concTone : '') + '" style="margin:0">' + top20pct + '%</span>' +
          '<span style="font-size:11px;color:var(--text-secondary)">' + concDot + '</span>' +
        '</div>' +
        '<div style="display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:7px" title="Top ' + top20n + ' interviewers do ' + top20pct + '% of interviews">' +
          '<div style="width:' + top20pct + '%;background:' + (concTone === 'amber' ? '#d97706' : 'var(--lawn)') + '"></div>' +
          '<div style="width:' + (100 - top20pct) + '%;background:#e5e7eb"></div>' +
        '</div>' +
        '<div class="metric-sub">top ' + top20n + ' of ' + epActive.length + ' active interviewers conducted ' + top20pct + '% ' + concNote + '</div></div>' +
      '</div>';
    // Row 2: load by level (IC1..IC7, M3..M7)
    const levelMap = {};
    engPanel.forEach(i => {
      const lv = i.level || 'Unspecified';
      if (!levelMap[lv]) levelMap[lv] = { total: 0, active: 0, completed: 0 };
      levelMap[lv].total++;
      levelMap[lv].completed += (i.completed || 0);
      if ((i.completed || 0) > 0) levelMap[lv].active++;
    });
    // Sort: IC levels by number, then M levels by number, anything else last.
    const levelRank = lv => {
      if (lv.startsWith('IC')) return 100 + (parseInt(lv.slice(2), 10) || 0);
      if (lv.startsWith('M'))  return 200 + (parseInt(lv.slice(1), 10) || 0);
      return 999;
    };
    const levelRows = Object.entries(levelMap).sort((a, b) => levelRank(a[0]) - levelRank(b[0]));
    // Dense level table for one track (Option-3 styling: util as color dot + %, volume as number).
    const utilDot = util => util >= 70 ? '#1b8751' : util >= 40 ? '#d97706' : '#9ca3af';
    const panelTable = rows => {
      let t = '<table class="data-table" style="width:100%;font-size:12px"><thead><tr>' +
        '<th style="padding:3px 10px">Lvl</th>' +
        '<th style="text-align:right;padding:3px 6px">Elig</th>' +
        '<th style="text-align:right;padding:3px 6px">Act</th>' +
        '<th style="text-align:right;padding:3px 6px">Untapped</th>' +
        '<th style="text-align:right;padding:3px 6px">Util</th>' +
        '<th style="text-align:right;padding:3px 10px">Intv</th>' +
        '</tr></thead><tbody>';
      rows.forEach(([lv, d]) => {
        const util = d.total ? Math.round(d.active / d.total * 100) : 0;
        const idle = d.total - d.active;
        t += '<tr>' +
          '<td style="font-weight:600;padding:3px 10px">' + lv + '</td>' +
          '<td style="text-align:right;padding:3px 6px">' + d.total + '</td>' +
          '<td style="text-align:right;padding:3px 6px">' + d.active + '</td>' +
          '<td style="text-align:right;padding:3px 6px;color:' + (idle > 5 ? '#b45309' : 'var(--text-secondary)') + '">' + idle + '</td>' +
          '<td style="text-align:right;padding:3px 6px;white-space:nowrap"><span style="color:' + utilDot(util) + '">\u25CF</span> ' + util + '%</td>' +
          '<td style="text-align:right;padding:3px 10px">' + fmt(d.completed) + '</td>' +
          '</tr>';
      });
      return t + '</tbody></table>';
    };
    // Collapsible panel; `open` controls default state.
    const panel = (title, rows, open) => {
      const total = rows.reduce((s2, r) => s2 + r[1].total, 0);
      const active = rows.reduce((s2, r) => s2 + r[1].active, 0);
      const idle = total - active;
      const used = total ? Math.round(active / total * 100) : 0;
      return '<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;align-self:start">' +
        '<div onclick="toggleLevelPanel(this)" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);cursor:pointer;user-select:none">' +
          '<span style="font-weight:700;font-size:12px"><span class="lp-arrow" style="display:inline-block;width:12px">' + (open ? '\u25BE' : '\u25B8') + '</span> ' + title + '</span>' +
          '<span style="font-size:11px;color:var(--text-secondary)">' + used + '% used · ' + idle + ' untapped</span>' +
        '</div>' +
        '<div class="lp-body" style="display:' + (open ? 'block' : 'none') + '">' + panelTable(rows) + '</div>' +
      '</div>';
    };
    const icRows = levelRows.filter(([lv]) => lv.toUpperCase().startsWith('IC'));
    const mRows  = levelRows.filter(([lv]) => lv.toUpperCase().startsWith('M'));
    lbBody += '<div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:24px">' +
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:14px">Load by level</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">' +
        (icRows.length ? panel('Individual contributors', icRows, true) : '') +
        (mRows.length ? panel('Managers', mRows, false) : '') +
      '</div>' +
    '</div>';
  const subLabel = hasUntapped
    ? 'Full panel utilisation — ' + engPanel.length + ' interviewers in the dept · ' + epActive.length + ' active · ' + epUnused.length + ' untapped this period.'
    : 'Interviewer load distribution — ' + epActive.length + ' interviewers participated this period.';
  return sectionShell('Interviewer load balance', lbBody, subLabel);
}
