      body += covered.length ? covered.map(s =>
        '<div class="bh-row"><span class="bh-skill-label" title="' + s.name + '">' + s.name + '</span>' +
        '<div class="bh-track"><div class="bh-fill-green" style="width:' + s.pct + '%"></div></div>' +
        '<span class="bh-pct-green">' + s.pct + '%</span></div>'
      ).join('') : '<div style="font-size:13px;color:var(--text-secondary);font-style:italic;padding:8px 0">No skills at ≥80% coverage yet.</div>';
      body += '</div><div class="bh-group"><div class="bh-group-head"><div class="bh-group-dot" style="background:#f59e0b"></div><span class="bh-group-label gap">Coverage gaps (&lt;80%)</span></div>';
      body += gaps.length ? gaps.map(s => {
        const fillCls = s.tier === 'amber' ? 'bh-fill-amber' : 'bh-fill-red';
        const pctCls = s.tier === 'amber' ? 'bh-pct-amber' : 'bh-pct-red';
        return '<div class="bh-row"><span class="bh-skill-label" title="' + s.name + '">' + s.name + '</span>' +
          '<div class="bh-track"><div class="' + fillCls + '" style="width:' + Math.max(s.pct, 0.5) + '%"></div></div>' +
          '<span class="' + pctCls + '">' + s.pct + '%</span></div>';
      }).join('') : '<div style="font-size:13px;color:var(--text-secondary);font-style:italic;padding:8px 0">All skills well covered!</div>';
      body += '</div></div></div>';
    });
    if (ghostRoles.length) {
      body += '<div style="display:flex;gap:10px;align-items:flex-start;background:#eef4fb;border:1px solid #cfe0f4;border-radius:8px;padding:10px 12px;margin:14px 18px 18px">' +
        '<span style="font-size:14px;color:#185FA5;line-height:1.4;font-weight:700">&#9432;</span>' +
        '<span style="font-size:12px;color:#0C447C;line-height:1.5">' + ghostRoles.length + ' role' + (ghostRoles.length !== 1 ? 's' : '') + ' from this period ' + (ghostRoles.length !== 1 ? 'have' : 'has') + ' no skill coverage — BrightHire was not utilized in any of their interviews.</span>' +
        '</div>';
    }
    body += '</div>';
    html += sectionShell('Interview skill coverage · BrightHire', body, 'Shows whether the skills listed in each role\u2019s job description are being consistently assessed \u2014 each bar is the percentage of that role\u2019s interviews where the skill came up. Green bars are consistently covered; amber and red are going unassessed.');
  }


  // ── Insights and recommendations — the one consolidated box, bottom of the tab ──
  {
    const sigHtml = auto.items.map(s2 =>
      '<div class="recaction-item">' +
        '<span class="recaction-arrow" style="color:' + (s2.color === '#1B8751' ? '#1B8751' : (s2.color === '#6b7280' ? '#9ca3af' : '#BA6029')) + '">→</span>' +
        '<span><strong style="color:' + s2.color + '">' + s2.title + '</strong> — ' + s2.body + '</span>' +
      '</div>'
    ).join('');
    html += sectionShell('Insights and recommendations', '<div class="recaction-card">' + sigHtml + '</div>', 'What the data patterns suggest and where to focus.');
  }

  html += '<div class="timestamp">Generated ' + D.meta.generated_date + ' · Source: Greenhouse · BrightHire · ModernLoop</div>';
  document.getElementById('tab-engagement').innerHTML = html;
}
// ════════════════════════════════════════════════════════════════
// INTERVIEW METRICS TAB
// ════════════════════════════════════════════════════════════════
function renderMetrics(data) {
  const s     = data.stats || {};
  const coord = data.coordination || {};
  const all   = (data.all_interviewers || []).slice().sort((a,b) => (b.declines||0)-(a.declines||0));
  if (!s.total_declines && !all.length && !(coord.facilitated)) {
    document.getElementById('tab-metrics').innerHTML = empty('No metrics data for this department.');
    return;
  }
  let html = '';

  // ─── derived ──────────────────────────────────────────────────────────
  const coordFac       = coord.facilitated || 0;
  const coordRsc       = coord.rescheduled || 0;
  const coordCan       = coord.canceled || 0;
  const coordChg       = coord.changed || 0;
  const coordDisr      = coord.disruptions || (coordRsc + coordCan + coordChg);
  const coordDisrRate  = coord.disruption_rate || (coordFac ? Math.round(coordDisr/coordFac*100) : 0);
  const coordIntv      = coord.interviewer_driven_reschedules || 0;
  const coordLate      = coord.late_declines || 0;
  const coordVeryLate  = coord.very_late_declines || 0;
  const coordSameDay   = coord.same_day_declines || 0;
  const coordUniqCand  = coord.unique_candidates_affected || 0;
  const coordTotalCand = coord.total_unique_candidates || 0;
  const coordHrsLost   = coord.est_coord_hrs_lost || 0;
  const coordReasons   = coord.reschedule_reasons || [];
  const intvPct        = coordRsc ? Math.round(coordIntv/coordRsc*100) : 0;

  const dpool          = declinePool(data);
  const dTotal         = totalDeclines(data);
  const dActive        = dpool.filter(i=>(i.completed||0)>0);
  const dDecliners     = dpool.filter(i=>(i.declines||0)>0);
  const repeatDecliners = dDecliners.filter(i=>(i.declines||0)>=3);
  const oneOffDecliners = dDecliners.filter(i=>(i.declines||0)<3);
  const repeatDecl     = repeatDecliners.reduce((s,i)=>s+(i.declines||0),0);
  const repeatShare    = dTotal ? Math.round(repeatDecl/dTotal*100) : 0;
  const activeCount    = dActive.length;
  const declinerShare  = activeCount ? Math.round(dDecliners.length/activeCount*100) : 0;
  const declAsIntPct   = coordFac ? Math.round(dTotal/coordFac*100) : 0;
  const latePct        = dTotal ? Math.round(coordLate/dTotal*100) : 0;
  const veryLatePct    = dTotal ? Math.round(coordVeryLate/dTotal*100) : 0;
  const cancelRate     = coordFac ? Math.round((coord.canceled_primary||coordCan)/coordFac*100) : 0;


  // ─── SECTION 1: COORDINATION LOAD — 3 cards ─────────────────────────
  const chgCount = coord.interview_changes || 0;
  const chgRate  = coord.change_rate || 0;
  const rscIntv  = coord.rsc_interviewer_pct || 0;
  const rscCand  = coord.rsc_candidate_pct  || 0;
  let coordBody = '';
  if (coordFac === 0) {
    coordBody = empty('No coordination data for this department.');
  } else {
    const chgAmber = chgRate >= 30;
    const intvAmber = rscIntv >= 50;
    coordBody +=
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:8px">' +
        // Card 1: Interviews scheduled
        '<div class="stat-card">' +
          '<div class="stat-label">Interviews scheduled</div>' +
          '<div class="stat-value">' + fmt(coordFac) + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + fmt(coordTotalCand) + ' unique candidates</div>' +
        '</div>' +
        // Card 2: Interview changes
        '<div class="stat-card' + (chgAmber ? ' amber' : '') + '">' +
          '<div class="stat-label">Interview changes</div>' +
          '<div class="stat-value' + (chgAmber ? ' amber' : '') + '">' + fmt(chgCount) + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + chgRate + '% of scheduled interviews required a change</div>' +
        '</div>' +
        // Card 3: Who drove changes
        '<div class="stat-card' + (intvAmber ? ' amber' : '') + '">' +
          '<div class="stat-label">Who drove the changes</div>' +
          '<div class="stat-value' + (intvAmber ? ' amber' : '') + '">' + (rscIntv > 0 ? rscIntv + '%' : '—') + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + (rscIntv > 0 ? 'interviewer-initiated · ' + rscCand + '% candidate-initiated' : 'attribution data unavailable') + '</div>' +
        '</div>' +
      '</div>' +
      '<div style="font-size:11px;color:var(--text-secondary);font-style:italic;margin-bottom:20px;padding:0 2px">' +
        'A "change" includes any modification ModernLoop logged — reschedule, cancellation, panel swap, or time adjustment. Attribution % is based on reschedules where a reason was recorded.' +
      '</div>';
  }
  html += sectionShell('Coordination load', coordBody, 'Interview volume and scheduling changes this period.');

  // ─── SECTION 2: INTERVIEWER DECLINE BEHAVIOR ─────────────────────────
  {
    let declBody = '';

    // 4 mini-stats in one row
    const repeatBar =
      '<div style="display:flex;height:8px;border-radius:5px;overflow:hidden;margin:5px 0 6px">' +
      '<div style="width:'+repeatShare+'%;background:#b45309"></div>' +
      '<div style="width:'+(100-repeatShare)+'%;background:#cdd7e2"></div></div>';

    declBody +=
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">' +
        // Total declines
        '<div style="background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:14px">' +
          '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Total declines</div>' +
          '<div style="font-size:24px;font-weight:700;color:var(--dusk)">' + fmt(dTotal) + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + declAsIntPct + '% of all interviews</div>' +
        '</div>' +
        // Who declined
        '<div style="background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:14px">' +
          '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Interviewers who declined</div>' +
          '<div style="font-size:24px;font-weight:700;color:var(--dusk)">' + dDecliners.length + ' <span style="font-size:14px;font-weight:400">of ' + activeCount + '</span></div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + declinerShare + '% of active interviewers declined at least once</div>' +
        '</div>' +
        // Late declines
        '<div style="background:' + (coordLate>0?'#fff7ed':'#fafafa') + ';border:1px solid ' + (coordLate>0?'#fed7aa':'var(--border)') + ';border-radius:8px;padding:14px">' +
          '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Late declines (&lt;24 hr)</div>' +
          '<div style="font-size:24px;font-weight:700;color:' + (coordLate>0?'#b45309':'var(--lawn)') + '">' + coordLate + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + latePct + '% of all declines</div>' +
        '</div>' +
        // Very late
        '<div style="background:' + (coordVeryLate>0?'#fff1f2':'#fafafa') + ';border:1px solid ' + (coordVeryLate>0?'#fecdd3':'var(--border)') + ';border-radius:8px;padding:14px">' +
          '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Very late (&lt;4 hr)</div>' +
          '<div style="font-size:24px;font-weight:700;color:' + (coordVeryLate>0?'#991b1b':'var(--lawn)') + '">' + coordVeryLate + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary)">' + veryLatePct + '% of all declines</div>' +
        '</div>' +
      '</div>';

    // High-decliner table: ≥35% decline rate
    const highDecliners = dDecliners.filter(i => {
      const total = (i.completed||0)+(i.declines||0);
      return total > 0 && Math.round(i.declines/total*100) >= 35;
    }).sort((a,b) => {
      const ra = a.declines/((a.completed||0)+a.declines);
      const rb = b.declines/((b.completed||0)+b.declines);
      return rb - ra;
    });
    const highDeclTotal = highDecliners.reduce((s,i)=>s+(i.declines||0),0);
    const highDeclShare = dTotal ? Math.round(highDeclTotal/dTotal*100) : 0;

    if (highDecliners.length > 0) {
      declBody += '<div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:20px">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:12px">Interviewers with a decline rate above 35%</div>' +
        '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">' +
          '<strong style="color:#b45309">' + highDeclShare + '%</strong> of all declines came from these ' +
          '<strong style="color:var(--dusk)">' + highDecliners.length + ' interviewer' + (highDecliners.length!==1?'s':'') + '</strong>.' +
        '</div>' +
        '<div class="table-wrap" style="margin-bottom:0"><table class="interviewer-table" style="width:100%">' +
        '<colgroup><col style="width:60%"><col style="width:20%"><col style="width:20%"></colgroup>' +
        '<thead><tr>' +
          '<th>Interviewer</th>' +
          '<th style="text-align:right">Decline rate</th>' +
          '<th style="text-align:right">Volume</th>' +
        '</tr></thead><tbody>' +
        highDecliners.map(i => {
          const total = (i.completed||0)+(i.declines||0);
          const dr = Math.round(i.declines/total*100);
          const clr = dr>=60?'#991b1b':dr>=40?'#b45309':'var(--dusk)';
          return '<tr>' +
            '<td style="font-weight:500">' + i.name + '</td>' +
            '<td style="text-align:right;font-weight:700;color:'+clr+'">' + dr + '%</td>' +
            '<td style="text-align:right;color:var(--text-secondary)">' + i.declines + ' of ' + total + '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div></div>';
    }

    // Late decline impact note
    if (coordLate > 0 || coordVeryLate > 0) {
      declBody +=
        '<div style="border-top:1px solid var(--border);padding-top:20px">' +
        '<div style="font-size:13px;color:var(--text-secondary);line-height:1.65;padding:12px 14px;background:#fafafa;border-radius:8px;border:1px solid var(--border)">' +
          'Every late decline forces coordinators to rebuild the interview loop under time pressure — finding a replacement panelist, rescheduling the candidate, and resending calendar invites.' +
          (coordVeryLate>0 ? ' The <strong style="color:#991b1b">'+coordVeryLate+' same-day declines</strong> are the highest-risk: at that point the candidate is likely already blocked time and may experience the no-show directly.' : '') +
          ' This is one of the highest-leverage behaviors a hiring manager can address — setting a clear expectation that panelists honor committed slots (and if they can\'t, give maximum notice) directly protects candidate experience.' +
        '</div></div>';
    }

    html += sectionShell('Interviewer decline behavior', declBody, 'Who declined, how often, and when — and what it costs the process.');
  }

  // ─── HIGHEST ACTIVITY INTERVIEWERS — recognition of the load-bearers ─────
  {
    // Account Operations: volume counts are unavailable this period — the Solutions
    // Engineer req is filled (its interviewer report can no longer be pulled) and the
    // GTM Engineer / Measurement Analyst loops haven't reached ModernLoop scheduling.
    // We list the known interviewers by name instead.
    const aoOverride = currentDept === 'Account Operations';
    if (aoOverride) {
      const known = [
        { name: 'Anh Vu', role: 'GTM Engineer' },
        { name: 'Pranav Patil', role: 'Measurement Analyst' },
      ];
      const chips = known.map(k =>
        '<span style="display:inline-flex;align-items:baseline;gap:7px;background:#e8f0e9;color:#1f3b2b;font-size:13px;font-weight:600;border-radius:999px;padding:6px 14px">' + k.name +
        '<span style="font-size:11px;font-weight:400;color:#3d5c48">' + k.role + '</span></span>'
      ).join('');
      const haBody =
        '<div style="font-size:12.5px;color:var(--dusk);line-height:1.6;margin-bottom:10px">Known interviewers this period:</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">' + chips + '</div>' +
        '<div style="font-size:12px;color:var(--text-secondary);font-style:italic;line-height:1.55">Volume counts aren\u2019t available: the Solutions Engineer req is filled (closed reqs can\u2019t be pulled for past interviewer reports), and GTM Engineer / Measurement Analyst candidates haven\u2019t cleared the HM screen, so no interviews have been scheduled in ModernLoop.</div>';
      html += sectionShell('Highest activity interviewers', haBody, 'Known interviewers for this period\u2019s loops — activity counts unavailable.');
    }
    // Engineering: managers are excluded and only IC6-and-below surface here —
    // the load-balance section already makes manager volume obvious, so this
    // box spotlights the lower-level contributors instead.
    const icOnly = currentDept === 'Engineering';
    const actives = (data.all_interviewers || []).filter(i => (i.completed || 0) > 0)
      .filter(i => !icOnly || /^IC[1-6]$/.test(i.level || ''))
      .sort((a, b) => (b.completed - a.completed) || ((a.declines || 0) - (b.declines || 0)));
    if (!aoOverride && actives.length) {
      // Blended selection: top 3 by volume plus the two busiest ICs not already
      // listed (marked with an "IC" chip). Finance and Sales keep the true top 5 —
      // the blend would displace their real load-bearers — and Engineering stays
      // IC-only via the filter above. Short IC benches fill remaining slots by volume.
      const blend = !icOnly && currentDept !== 'Finance' && currentDept !== 'Sales';
      const icSlot = new Set();
      let top;
      if (blend) {
        const isIC = i => /^IC[1-6]$/.test(i.level || '');
        top = actives.slice(0, 3);
        actives.filter(i => isIC(i) && !top.includes(i)).slice(0, 2).forEach(i => { top.push(i); icSlot.add(i); });
        for (const i of actives) { if (top.length >= 5) break; if (!top.includes(i)) top.push(i); }
      } else {
        top = actives.slice(0, 5);
      }
      const totComp = actives.reduce((s2, i) => s2 + i.completed, 0);
      const rows = top.map((i, idx) => {
        const t = (i.completed || 0) + (i.declines || 0);
        const drI = t ? Math.round((i.declines || 0) / t * 100) : 0;
        const share = totComp ? Math.round(i.completed / totComp * 100) : 0;
        const rank = idx === 0
          ? '<span style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#ADD9B8;color:#1f3b2b;font-size:11px;font-weight:700;text-align:center;line-height:18px;margin-right:8px">1</span>'
          : '<span style="display:inline-block;width:18px;text-align:center;color:#9ca3af;font-size:11px;margin-right:8px">' + (idx + 1) + '</span>';
        return '<tr>' +
          '<td style="font-weight:500">' + rank + i.name +
            (i.level ? '<span style="font-size:11px;color:#9ca3af;margin-left:8px">' + i.level + '</span>' : '') +
            (icSlot.has(i) ? '<span style="background:#e8f0e9;color:#1f3b2b;font-size:10px;font-weight:700;border-radius:999px;padding:2px 8px;margin-left:8px">IC</span>' : '') + '</td>' +
          '<td style="color:var(--text-secondary)">' + (i.team || '—') + '</td>' +
          '<td style="text-align:right;font-weight:700">' + fmt(i.completed) + '</td>' +
          '<td style="text-align:right;color:var(--text-secondary)">' + share + '%</td>' +
          '<td style="text-align:right;color:var(--text-secondary)">' + (i.intw_week != null ? i.intw_week : '—') + '</td>' +
          '<td style="text-align:right;color:' + (drI >= 20 ? '#991b1b' : 'var(--text-secondary)') + '">' + (i.declines || 0) + (t ? ' (' + drI + '%)' : '') + '</td>' +
        '</tr>';
      }).join('');
      const haBody = '<div class="table-wrap" style="margin:0"><table class="data-table" style="width:100%"><thead><tr>' +
        '<th>Interviewer</th><th>Team</th><th style="text-align:right">Completed</th><th style="text-align:right">Share of dept</th><th style="text-align:right">Intw / week</th><th style="text-align:right">Declines</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
        '<div style="font-size:11px;color:var(--text-secondary);font-style:italic;margin-top:10px;padding:0 2px">High volume with a healthy decline rate is a good sign, not a concern — these are the panelists keeping loops moving.</div>';
      html += sectionShell('Highest activity interviewers', haBody, icOnly ? 'The most active IC panelists (IC6 and below) this period — manager volume is covered in the load-balance view.' : 'The most active panelists this period — the people carrying the interviewing load.');
    }
  }


  // ── Insights and recommendations — the one consolidated box, bottom of the tab ──
  {
    const GRN = '#1B8751', AMB = '#b45309', RD = '#991b1b', NEU = '#232F46', GRAY = '#6b7280';
    const mItems = [];
    const chgCountK = coord.interview_changes || 0;
    const chgRateK  = Math.round(coord.change_rate || 0);
    const rscIntvK  = coord.rsc_interviewer_pct || 0;

    if (currentDept === 'Account Operations') {
      // Curated for this period: two young open loops with no ModernLoop-scheduled
      // activity yet, so the generated patterns would mislead more than inform.
      mItems.push({ color: GRN, title: 'Two open roles are on track',
        body: 'GTM Engineer and Measurement Analyst have only been open a short window, and both are progressing as expected for this stage — candidates are still working through the HM screen.' });
      mItems.push({ color: GRN, title: 'No interviewer declines',
        body: 'None were recorded this period across these roles.' });
      mItems.push({ color: NEU, title: 'Volume counts are partial this period',
        body: 'Solutions Engineer: filled, historical interviewer report unavailable. GTM Engineer and Measurement Analyst: candidates in HM screen, no ModernLoop scheduling yet.' });
    } else {

    // 1. Volume and change load
    if (currentDept === 'Campus' && coordFac > 0) {
      // Curated pair: the manageable-load blurb stays (counts only — the rates live in
      // the churn item below to avoid repeating them), then the interviewer-driven story.
      mItems.push({ color: NEU, title: 'Change load stayed manageable',
        body: fmt(coordFac) + ' interviews were scheduled for ' + fmt(coordTotalCand) + ' candidates, with ' + fmt(coord.interview_changes || 0) + ' changes logged.' });
      // 67% = interviewer-driven share of the 6 tracked reschedule reasons
      // (4 "Interviewer declined - swap" / 2 candidate-requested). Rates stay dynamic.
      mItems.push({ color: AMB, title: 'Interviewer availability drove the churn',
        body: 'The change load was light (' + Math.round(coord.change_rate || 0) + '%), but ' + (coord.rsc_interviewer_pct || 0) + '% of tracked reschedules were interviewer declines needing swaps. The coaching opportunity lies with the junior engineers on these loops \u2014 a nudge to keep calendars up to date and honor committed interview slots.' });
    } else if (currentDept === 'Engineering' && coordFac > 0) {
      // Curated two-tone: the volume recap is dropped (Coordination load cards above
      // carry it); the count stays dynamic.
      mItems.push({ color: GRAY, title: 'Change load was moderate',
        body: '<strong style="color:' + AMB + '">schedule churn is mostly interviewer-driven</strong> \u2014 ' + fmt(coord.interview_changes || 0) + ' changes were logged this period, with interviewers initiating over half.' });
    } else if (coordFac > 0) {
      let bodyLine = fmt(coordFac) + ' interviews were scheduled for ' + fmt(coordTotalCand) + ' candidates';
      if (chgCountK > 0) {
        bodyLine += ', with ' + fmt(chgCountK) + ' changes logged (' + chgRateK + '%' + (rscIntvK >= 50 ? ', mostly interviewer-initiated at ' + rscIntvK + '%' : '') + ').';
        if (currentDept === 'Data Science') bodyLine += ' Most of this churn is internally triggered rather than candidate-driven.';
        const chgTone = chgRateK >= 45 ? { color: AMB, title: 'Change load ran heavy' }
          : chgRateK >= 30 ? { color: NEU, title: 'Change load was moderate' }
          : { color: NEU, title: 'Change load stayed manageable' };
        mItems.push({ color: chgTone.color, title: chgTone.title, body: bodyLine });
      } else {
        mItems.push({ color: GRN, title: 'A clean scheduling period', body: bodyLine + ', with no changes logged.' });
      }
    }

    // 2. Decline behavior (Engineering: suppressed per curation — replacement item TBD)
    if (currentDept === 'Engineering') {
      // no decline item for Engineering while the replacement is being chosen
    } else if (currentDept === 'Data Science' && dTotal > 0) {
      // Curated: named callout — the decline tables above carry the numbers.
      mItems.push({ color: RD, title: 'Decline behavior may be adding scheduling friction',
        body: 'Sagar and Charissa decline often enough that scheduling friction is the risk to check for. With Vandana as the hiring lead, there is an opportunity to coach on calendar hygiene \u2014 protecting interview time for her own roles would go the furthest.' });
    } else if (dTotal > 0) {
      const reasonsK = data.decline_reasons || [];
      const topK = reasonsK.length ? reasonsK.reduce((a, b) => (b.count || 0) > (a.count || 0) ? b : a, reasonsK[0]) : null;
      const noReason = topK && (topK.reason || '').trim().toLowerCase() === 'other' && (topK.pct || 0) >= 50;
      const repeatConc = repeatDecliners.length >= 2 && repeatShare >= 50;
      if (noReason && !repeatConc) {
        // Replaced per curation: the "no reason given" decline callout read as a dead end.
        // When the change count is low, note the change picture positively instead; at 10+
        // changes the change-load item above already tells that story.
        if (chgCountK < 10) {
          // The change count and driver split already appear in the change-load item
          // above, so this note adds the reliability angle (declines folded in) instead
          // of repeating those stats.
          mItems.push({ color: GRN, title: 'Scheduling stayed reliable',
            body: fmt(coordFac) + ' scheduled interviews produced ' + (chgCountK > 0 ? chgCountK + ' change' + (chgCountK !== 1 ? 's' : '') : 'no changes') + ' and ' + dTotal + ' decline' + (dTotal !== 1 ? 's' : '') + ' in total — steady coverage from this panel.' });
        }
      } else {
        let bodyLine = fmt(dTotal) + ' decline' + (dTotal !== 1 ? 's' : '') + ' this period (' + declAsIntPct + '% of scheduled interviews)';
        if (repeatConc) bodyLine += '; ' + repeatShare + '% of them trace back to ' + repeatDecliners.length + ' repeat decliners';
        let ttl, clr;
        if (repeatConc) { ttl = 'Declines trace to a few repeat decliners'; clr = AMB; }
        else if (declAsIntPct < 10) { ttl = 'Decline behavior is quiet'; clr = GRN; }
        else { ttl = 'Decline behavior at a glance'; clr = NEU; }
        mItems.push({ color: clr, title: ttl, body: bodyLine + '.' });
      }
    } else if (coordFac > 0) {
      mItems.push({ color: GRN, title: 'No interviewer declines', body: 'None were recorded this period across ' + fmt(coordFac) + ' scheduled interviews.' });
    }

    // 3. Short-notice behavior — only when material
    if (coordVeryLate >= 3 || coordLate >= 5) {
      if (currentDept === 'Engineering') {
        // Curated: candidate-experience framing, with the coaching ask pointed at the panel.
        mItems.push({ color: AMB, title: 'Late declines are a candidate-experience risk',
          body: coordLate + ' landed inside 24 hours (' + coordVeryLate + ' same-day). Candidates absorb churn they didn\u2019t cause. The coaching opportunity sits with Eng interviewers keeping calendars accurate and honoring committed slots.' });
      } else if (currentDept === 'Data Science') {
        mItems.push({ color: AMB, title: 'Late declines are a candidate-experience risk',
          body: coordLate + ' landed inside 24 hours (' + coordVeryLate + ' same-day). Candidates absorb churn they didn\u2019t cause. Two coaching angles fix most of it: cleaner upfront calendars so conflicts surface early, and treating a committed slot as a commitment.' });
      } else {
        mItems.push({ color: AMB, title: 'Short-notice drops are the costly ones',
          body: coordLate + ' declines came in under 24 hours' + (coordVeryLate ? ' (' + coordVeryLate + ' of them same-day)' : '') + ' — those are the ones coordinators can least absorb.' });
      }
    }

    }

    // Engineering: closing item — the decliner split, curated
    if (currentDept === 'Engineering') {
      mItems.push({ color: AMB, title: 'Declines trace to a repeat group \u2014 and may be a norm',
        body: '61% of active interviewers declined at least once, leaving 39% consistently reliable. Across the company\u2019s largest interviewing pool, that split suggests declining has drifted toward normal. A coaching opportunity for EMs: advocate for their ICs to stay engaged and reliable on committed loops.' });
    }

    if (!mItems.length) {
      mItems.push({ color: GRN, title: 'Scheduling ran smoothly', body: 'Nothing notable to flag this period.' });
    }

    const sigHtml = mItems.slice(0, 4).map(s2 =>
      '<div class="recaction-item">' +
        '<span class="recaction-arrow" style="color:' + (s2.color === '#1B8751' ? '#1B8751' : (s2.color === '#6b7280' ? '#9ca3af' : '#BA6029')) + '">→</span>' +
        '<span><strong style="color:' + s2.color + '">' + s2.title + '</strong> — ' + s2.body + '</span>' +
      '</div>'
    ).join('');
    html += sectionShell('Insights and recommendations', '<div class="recaction-card">' + sigHtml + '</div>', 'What the data patterns suggest and where to focus.');
  }

  html += '<div class="timestamp">Generated ' + D.meta.generated_date + ' · Source: ModernLoop decline + facilitation exports</div>';
  document.getElementById('tab-metrics').innerHTML = html;
}
init();
</script>
</body>
</html>
